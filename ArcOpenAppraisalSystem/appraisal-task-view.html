<!DOCTYPE html>
<html lang="zh-CN" ng-app="appraisalApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-OAAS档案开放鉴定系统 - 新建任务</title>
    <!-- 引入 Tailwind CSS 进行样式管理 -->
    <script src="./lib/tailwindcss.js"></script>
    <!-- 配置 Tailwind 主题颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0369A1', // 政务风主色
                        secondary: '#334155',
                        background: '#F8FAFC',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <!-- 引入 AngularJS -->
    <script src="./lib/angular.min.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="./lib/lucide.min.js"></script>
    <link rel="stylesheet" href="./main.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body ng-controller="MainController as ctrl" class="h-screen overflow-hidden flex flex-col bg-slate-50">
    
    <navbar></navbar>
    <breadcrumb></breadcrumb>
    
    <!-- 主体内容区域 -->
    <main class="overflow-y-auto flex-1 p-4 md:px-8 flex flex-col gap-5 w-full box-border relative max-w-7xl mx-auto">
        <appraisal-task-view class="flex-1 flex flex-col min-w-0 w-full"></appraisal-task-view>
    </main>

    <script>
        var app = angular.module('appraisalApp', []);

        // 重新渲染图标的服务
        app.service('IconService', function($timeout) {
            var refreshPromise;
            this.refresh = function() {
                if (refreshPromise) $timeout.cancel(refreshPromise);
                refreshPromise = 
                $timeout(function() {
                    lucide.createIcons();
                    refreshPromise = null;
                }, 50, false);
            };
        });

        app.controller('MainController', ['IconService', '$timeout', '$rootScope', function(IconService, $timeout, $rootScope) {
            var ctrl = this;
            
            // 初始化导航状态
            $timeout(function() {
                $rootScope.$broadcast('NAVIGATE', '查看任务', '鉴定任务管理');
            });
        }]);

        // 多选下拉组件
        app.component('multiSelect', {
            bindings: {
                options: '=',
                placeholder: '@',
                emptyMessage: '@'
            },
            template: `
                <div class="relative" ng-click="$event.stopPropagation()">
                    <div class="w-full px-3 py-2 border border-slate-300 rounded-md focus-within:ring-2 focus-within:ring-sky-100 focus-within:border-primary bg-white cursor-pointer min-h-[38px] flex flex-wrap gap-1 items-center" 
                         ng-click="!$ctrl.isEmpty() && ($ctrl.isOpen = !$ctrl.isOpen)"
                         ng-class="{'bg-slate-50 cursor-not-allowed': $ctrl.isEmpty()}">
                        
                        <!-- 占位符或空提示 -->
                        <span ng-if="!$ctrl.hasSelected() && !$ctrl.isEmpty()" class="text-slate-400 text-sm">{{$ctrl.placeholder}}</span>
                        <span ng-if="$ctrl.isEmpty()" class="text-slate-400 text-sm">{{$ctrl.emptyMessage || '无可用选项'}}</span>
                        
                        <!-- 已选项 -->
                        <span ng-repeat="opt in $ctrl.options | filter:{selected: true}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-sky-100 text-sky-800">
                            {{opt.name}}
                            <i data-lucide="x" class="w-3 h-3 ml-1 cursor-pointer hover:text-sky-900" ng-click="opt.selected = false; $event.stopPropagation(); $ctrl.updateIcons()"></i>
                        </span>
                        
                        <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-slate-400 transition-transform" ng-class="{'rotate-180': $ctrl.isOpen}"></i>
                    </div>
                    
                    <!-- 下拉列表 -->
                    <div ng-show="$ctrl.isOpen" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-md shadow-lg max-h-60 overflow-auto custom-scrollbar">
                        <div class="p-2.5 hover:bg-slate-50 cursor-pointer flex items-center transition-colors" 
                             ng-repeat="opt in $ctrl.options" 
                             ng-click="opt.selected = !opt.selected; $ctrl.updateIcons(); $event.stopPropagation();">
                            <div class="w-4 h-4 border rounded mr-2 flex items-center justify-center flex-shrink-0 transition-colors" 
                                 ng-class="opt.selected ? 'bg-primary border-primary' : 'border-slate-300'">
                                <i data-lucide="check" class="w-3 h-3 text-white" ng-show="opt.selected"></i>
                            </div>
                            <span class="text-sm text-slate-700 select-none">{{opt.name}}</span>
                        </div>
                    </div>
                </div>
            `,
            controller: ['$scope', '$document', 'IconService', '$timeout', function($scope, $document, IconService, $timeout) {
                var ctrl = this;
                ctrl.isOpen = false;
                
                ctrl.isEmpty = function() {
                    return !ctrl.options || ctrl.options.length === 0;
                };

                ctrl.hasSelected = function() {
                    if (ctrl.isEmpty()) return false;
                    return ctrl.options.some(function(o) { return o.selected; });
                };

                ctrl.updateIcons = function() {
                    $timeout(function() { IconService.refresh(); }, 0);
                };

                var clickHandler = function() {
                    if (ctrl.isOpen) {
                        $scope.$apply(function() {
                            ctrl.isOpen = false;
                        });
                    }
                };

                $document.on('click', clickHandler);
                $scope.$on('$destroy', function() {
                    $document.off('click', clickHandler);
                });

                ctrl.$onInit = function() {
                    ctrl.updateIcons();
                };
            }]
        });

        app.component('navbar', {
            template: `
                <nav class="bg-surface shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between sticky top-0 z-50">
                    <!-- 左侧 Logo -->
                    <div class="flex items-center space-x-2 cursor-pointer flex-1 justify-start">
                        <div class="w-8 h-8 bg-primary text-white flex items-center justify-center rounded font-bold text-xl">S</div>
                        <span class="text-xl font-bold text-slate-800 tracking-wide whitespace-nowrap">MS-OAAS档案开放鉴定系统</span>
                    </div>
                    
                    <!-- 中间功能菜单 -->
                    <div class="hidden md:flex space-x-1 flex-none justify-center">
                        <div ng-repeat="item in $ctrl.filteredMenuItems" 
                             ng-click="!item.children && $ctrl.navigate(item.name)"
                             ng-class="{ 'text-primary bg-sky-50': $ctrl.currentMenu === item.name, 'text-slate-600 hover:bg-slate-50 hover:text-slate-900': $ctrl.currentMenu !== item.name }"
                             class="relative group px-4 py-2 rounded-md cursor-pointer text-sm font-medium transition-colors duration-200 flex items-center space-x-1">
                            <span>{{item.name}}</span>
                            <i ng-if="item.children" data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <!-- 二级菜单下拉框 -->
                            <div ng-if="item.children" class="absolute top-full left-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1">
                                    <div ng-repeat="child in item.children" 
                                         ng-click="$ctrl.navigate(child, item.name); $event.stopPropagation();"
                                         ng-class="{ 'text-primary bg-sky-50': $ctrl.currentSubMenu === child, 'text-slate-600 hover:bg-sky-50 hover:text-primary': $ctrl.currentSubMenu !== child }"
                                         class="px-4 py-2 transition-colors cursor-pointer block">
                                        {{child}}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧系统栏 -->
                    <div class="flex items-center space-x-5 text-slate-500 flex-1 justify-end relative">
                        <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="lock" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="sun" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        
                        <!-- 用户切换下拉 -->
                        <div class="relative group cursor-pointer flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-600 text-xs font-bold overflow-hidden" title="{{$ctrl.currentUser.realName || '未登录'}}">
                                <span ng-if="!$ctrl.currentUser">未</span>
                                <span ng-if="$ctrl.currentUser">{{$ctrl.currentUser.realName.substring(0,1)}}</span>
                            </div>
                            <span class="text-sm font-medium text-slate-700 hidden lg:block">{{$ctrl.currentUser ? $ctrl.currentUser.realName : '未登录'}}</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <div class="absolute top-full right-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1 max-h-64 overflow-y-auto">
                                    <div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-100 bg-slate-50">切换用户 (演示)</div>
                                    <div ng-repeat="u in $ctrl.userList" 
                                         ng-click="$ctrl.switchUser(u); $event.stopPropagation();"
                                         class="px-4 py-2 hover:bg-sky-50 cursor-pointer text-sm flex flex-col"
                                         ng-class="{'bg-sky-50 text-primary font-medium': $ctrl.currentUser.id === u.id, 'text-slate-700': $ctrl.currentUser.id !== u.id}">
                                        <span>{{u.realName}} ({{u.username}})</span>
                                        <span class="text-xs text-slate-500 mt-0.5">{{u.userType}}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <i data-lucide="settings" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                    </div>
                </nav>
            `,
            controller: ['IconService', '$rootScope', function(IconService, $rootScope) {
                var ctrl = this;
                ctrl.currentMenu = '工作台';
                ctrl.currentSubMenu = '';

                ctrl.menuItems = [
                    { name: '工作台' },
                    { name: '鉴定规则配置', children: ['敏感类型管理', '敏感内容管理', '通用敏感词库', '全宗敏感词库', '错检漏检库'] },
                    { name: '鉴定任务管理' },
                    { name: '系统管理', children: ['全宗配置', '用户管理', '角色权限', '元数据配置', '鉴定流程配置', '系统参数配置', '日志管理'] }
                ];
                
                ctrl.filteredMenuItems = [];

                // 模拟用户登录
                ctrl.userList = [];
                try {
                    ctrl.userList = JSON.parse(localStorage.getItem('oaas_user_list')) || [];
                } catch(e) {}
                
                if (ctrl.userList.length === 0) {
                    ctrl.userList = [
                        { id: 1, username: 'admin', realName: '系统管理员', userType: '馆内用户' },
                        { id: 2, username: 'zhangsan', realName: '张三', userType: '馆内用户' },
                        { id: 3, username: 'lisi', realName: '李四', userType: '形成/移交单位用户' }
                    ];
                    localStorage.setItem('oaas_user_list', JSON.stringify(ctrl.userList));
                }

                try {
                    ctrl.currentUser = JSON.parse(localStorage.getItem('oaas_current_user'));
                } catch(e) {}
                
                if (!ctrl.currentUser && ctrl.userList.length > 0) {
                    ctrl.currentUser = ctrl.userList[0];
                    localStorage.setItem('oaas_current_user', JSON.stringify(ctrl.currentUser));
                }

                // 权限过滤
                ctrl.updateMenuByRole = function() {
                    if (ctrl.currentUser && ctrl.currentUser.userType === '形成/移交单位用户') {
                        // Base allowed menus
                        var allowedMenus = ['工作台', '鉴定任务管理'];
                        
                        // Load additional menus from role permissions
                        try {
                            var permissions = JSON.parse(localStorage.getItem('oaas_role_permissions')) || [];
                            var userPerm = permissions.find(function(p) { return p.username === ctrl.currentUser.username; });
                            if (userPerm && userPerm.selectedMenus && userPerm.selectedMenus.length > 0) {
                                allowedMenus = allowedMenus.concat(userPerm.selectedMenus);
                            }
                        } catch(e) {}
                        
                        // Filter the main menu based on allowed menus
                        var newMenuItems = [];
                        
                        ctrl.menuItems.forEach(function(item) {
                            if (allowedMenus.indexOf(item.name) !== -1) {
                                newMenuItems.push(angular.copy(item));
                            } else if (item.children) {
                                var filteredChildren = item.children.filter(function(child) {
                                    return allowedMenus.indexOf(child) !== -1;
                                });
                                if (filteredChildren.length > 0) {
                                    var newItem = angular.copy(item);
                                    newItem.children = filteredChildren;
                                    newMenuItems.push(newItem);
                                }
                            }
                        });
                        
                        ctrl.filteredMenuItems = newMenuItems;
                    } else {
                        ctrl.filteredMenuItems = ctrl.menuItems;
                    }
                };

                ctrl.updateMenuByRole();

                ctrl.switchUser = function(u) {
                    ctrl.currentUser = u;
                    localStorage.setItem('oaas_current_user', JSON.stringify(u));
                    window.location.href = 'index.html'; // 切换用户后回到首页
                };
                
                ctrl.navigate = function(name, parentName) {
                    var map = {
                        '工作台': 'index.html',
                        '敏感类型管理': 'sensitive-type.html',
                        '敏感内容管理': 'sensitive-content.html',
                        '通用敏感词库': 'general-sensitive-word.html',
                        '全宗配置': 'fonds-config.html',
                        '用户管理': 'user-management.html',
                        '角色权限': 'role-permission.html',
                        '全宗敏感词库': 'fonds-sensitive-word.html',
                        '错检漏检库': 'error-omission-db.html',
                        '鉴定任务管理': 'appraisal-task.html',
                        '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html',
                        '任务审核': 'appraisal-task-audit.html'
                    ,
                        '日志管理': 'log-management.html'
                    };
                    var currentPath = 'index.html';
                    var href = window.location.href;
                    var sortedMapKeys = Object.keys(map).sort(function(a, b) {
                        return map[b].length - map[a].length;
                    });
                    for (var i = 0; i < sortedMapKeys.length; i++) {
                        var key = sortedMapKeys[i];
                        if (href.indexOf(map[key]) !== -1) {
                            currentPath = map[key];
                            break;
                        }
                    }
                    
                    if (map[name]) {
                        if (map[name] === currentPath) {
                            if (parentName !== undefined) {
                                ctrl.currentSubMenu = parentName ? name : '';
                                ctrl.currentMenu = parentName || name;
                                $rootScope.$broadcast('NAVIGATE', name, parentName);
                            } else {
                                $rootScope.$broadcast('NAVIGATE', name);
                            }
                            return;
                        }
                        window.location.href = map[name];
                        return;
                    }
                    if (parentName !== undefined) {
                        ctrl.currentSubMenu = parentName ? name : '';
                        ctrl.currentMenu = parentName || name;
                        $rootScope.$broadcast('NAVIGATE', name, parentName);
                    } else {
                        $rootScope.$broadcast('NAVIGATE', name);
                    }
                };

                // 监听面包屑点击回到工作台
                $rootScope.$on('NAVIGATE', function(e, name, parentName) {
                    ctrl.currentSubMenu = parentName ? name : '';
                    ctrl.currentMenu = parentName || name;
                });

                ctrl.$onInit = function() {
                    IconService.refresh();
                };
            }]
        });

        app.component('breadcrumb', {
            template: `
                <div class="bg-white border-b border-slate-200 flex items-center text-sm font-medium relative" style="height: 40px; padding-left: 1rem; padding-right: 1rem; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none;">
                    <style>
                        .custom-tab-scroll::-webkit-scrollbar { display: none; }
                    </style>
                    <div class="flex items-center h-full custom-tab-scroll w-full">
                        <div ng-repeat="tab in $ctrl.tabs" 
                             ng-click="$ctrl.goToTab(tab)"
                             ng-right-click="$ctrl.showContextMenu($event, tab)"
                             class="flex items-center h-full px-4 border-r border-slate-200 cursor-pointer transition-colors relative group flex-shrink-0"
                             ng-class="{'bg-sky-50 text-primary border-t-2 border-t-primary': tab.active, 'text-slate-600 hover:bg-slate-50 border-t-2 border-t-transparent': !tab.active}">
                            <i ng-if="tab.name === '工作台'" data-lucide="layout-grid" class="w-4 h-4 mr-2"></i>
                            <span class="select-none">{{tab.name}}</span>
                            <div ng-if="tab.name !== '工作台'" 
                                 ng-click="$ctrl.closeTab($event, tab)" 
                                 class="ml-2 w-4 h-4 rounded-full flex items-center justify-center hover:bg-slate-200 hover:text-red-500 transition-colors"
                                 ng-class="{'opacity-100': tab.active, 'opacity-0 group-hover:opacity-100': !tab.active}">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Context Menu -->
                    <div ng-if="$ctrl.contextMenu.show" 
                         class="fixed z-[100] w-32 bg-white rounded-md shadow-lg border border-slate-200 py-1"
                         ng-style="{'left': $ctrl.contextMenu.x + 'px', 'top': $ctrl.contextMenu.y + 'px'}">
                        <div ng-click="$ctrl.closeAllTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">全部关闭</div>
                        <div ng-click="$ctrl.closeOtherTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">关闭其他</div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$rootScope', '$scope', '$document', '$timeout', function(IconService, $rootScope, $scope, $document, $timeout) {
                var ctrl = this;
                
                var urlMap = {
                    '工作台': 'index.html',
                    '敏感类型管理': 'sensitive-type.html',
                    '敏感内容管理': 'sensitive-content.html',
                    '通用敏感词库': 'general-sensitive-word.html',
                    '全宗配置': 'fonds-config.html',
                    '用户管理': 'user-management.html',
                    '角色权限': 'role-permission.html',
                    '全宗敏感词库': 'fonds-sensitive-word.html',
                    '错检漏检库': 'error-omission-db.html',
                    '鉴定任务管理': 'appraisal-task.html',
                    '新建任务': 'appraisal-task-create.html',
                    '查看任务': 'appraisal-task-view.html',
                    '修改任务': 'appraisal-task-edit.html',
                    '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html'
                ,
                    '日志管理': 'log-management.html'
                };
                
                var nameMap = {};
                for (var key in urlMap) { nameMap[urlMap[key]] = key; }
                
                ctrl.contextMenu = { show: false, x: 0, y: 0, targetTab: null };
                
                var currentUrl = 'index.html';
                var pathname = window.location.pathname || '';
                var currentFile = pathname.split('/').pop() || '';
                if (nameMap[currentFile]) {
                    currentUrl = currentFile;
                } else {
                    var href = window.location.href;
                    var sortedKeys = Object.keys(urlMap).sort(function(a, b) {
                        return urlMap[b].length - urlMap[a].length;
                    });
                    for (var i = 0; i < sortedKeys.length; i++) {
                        var key = sortedKeys[i];
                        if (href.indexOf(urlMap[key]) !== -1) {
                            currentUrl = urlMap[key];
                            break;
                        }
                    }
                }
                
                var currentName = nameMap[currentUrl] || '工作台';
                
                var storedTabs = localStorage.getItem('oaas_opened_tabs');
                if (storedTabs) {
                    try {
                        ctrl.tabs = JSON.parse(storedTabs);
                    } catch(e) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                } else {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                }

                // 兼容历史缓存格式，避免异常数据导致面包屑不显示
                if (!Array.isArray(ctrl.tabs)) {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                } else {
                    ctrl.tabs = ctrl.tabs.filter(function(t) {
                        return t && typeof t.name === 'string' && typeof t.url === 'string';
                    });
                    if (ctrl.tabs.length === 0) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                }
                
                if (!ctrl.tabs.find(function(t) { return t.name === '工作台'; })) {
                    ctrl.tabs.unshift({ name: '工作台', url: 'index.html', active: false });
                }
                
                var existingTab = ctrl.tabs.find(function(t) { return t.name === currentName; });
                if (!existingTab && currentName) {
                    ctrl.tabs.push({ name: currentName, url: currentUrl, active: true });
                }
                
                ctrl.tabs.forEach(function(t) {
                    t.active = (t.name === currentName);
                });
                
                ctrl.saveTabs = function() {
                    localStorage.setItem('oaas_opened_tabs', JSON.stringify(ctrl.tabs));
                };
                
                ctrl.saveTabs();
                
                ctrl.goToTab = function(tab) {
                    if (tab.name !== currentName) {
                        window.location.href = tab.url;
                    }
                };
                
                ctrl.closeTab = function(e, tab) {
                    if (e) {
                        e.stopPropagation();
                        e.preventDefault();
                    }
                    if (tab.name === '工作台') return;
                    
                    var index = ctrl.tabs.indexOf(tab);
                    if (index > -1) {
                        ctrl.tabs.splice(index, 1);
                        ctrl.saveTabs();
                        
                        if (tab.active) {
                            var nextTab = ctrl.tabs[index] || ctrl.tabs[index - 1] || ctrl.tabs[0];
                            window.location.href = nextTab.url;
                        }
                    }
                    ctrl.contextMenu.show = false;
                };
                
                ctrl.showContextMenu = function(e, tab) {
                    e.preventDefault();
                    ctrl.contextMenu.show = true;
                    ctrl.contextMenu.x = e.clientX;
                    ctrl.contextMenu.y = e.clientY;
                    ctrl.contextMenu.targetTab = tab;
                };
                
                ctrl.closeAllTabs = function() {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    if (currentName !== '工作台') {
                        window.location.href = 'index.html';
                    }
                };
                
                ctrl.closeOtherTabs = function() {
                    var target = ctrl.contextMenu.targetTab;
                    if (!target) return;
                    
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    if (target.name !== '工作台') {
                        ctrl.tabs.push(target);
                    }
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    
                    if (currentName !== target.name && currentName !== '工作台') {
                        window.location.href = target.url;
                    } else if (currentName === target.name) {
                        // Keep current tab active
                    }
                };
                
                var closeMenuHandler = function(e) {
                    if (ctrl.contextMenu.show) {
                        $scope.$apply(function() {
                            ctrl.contextMenu.show = false;
                        });
                    }
                };
                
                $document.on('click', closeMenuHandler);
                $scope.$on('$destroy', function() {
                    $document.off('click', closeMenuHandler);
                });
                
                ctrl.$onInit = function() {
                    $timeout(function() { IconService.refresh(); }, 0);
                };
            }]
        });

        // Ensure ng-right-click is registered
        if (!app._invokeQueue.some(function(item) { return item[1] === 'directive' && item[2][0] === 'ngRightClick'; })) {
            app.directive('ngRightClick', ['$parse', function($parse) {
                return function(scope, element, attrs) {
                    var fn = $parse(attrs.ngRightClick);
                    element.bind('contextmenu', function(event) {
                        scope.$apply(function() {
                            event.preventDefault();
                            fn(scope, {$event: event});
                        });
                    });
                };
            }]);
        }

        app.component('appraisalTaskView', {
            template: `
                <div class="bg-white rounded-lg shadow-sm border border-slate-100 flex-1 p-6 flex flex-col">
                    <div class="w-full flex-1 flex flex-col">
                        <!-- 任务名称居中显示 -->
                        <div class="text-center mb-8 border-b border-slate-100 pb-4">
                            <h3 class="text-2xl font-bold text-slate-800">{{$ctrl.task.title || '鉴定任务名称'}}</h3>
                        </div>

                        <!-- 表单信息展示区 -->
                        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-8 bg-slate-50 p-6 rounded-lg border border-slate-100">
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">全宗号</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.fondsCode || '默认全宗号'}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">全宗名称</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.fondsName || '默认全宗名称'}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">鉴定年度</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.year || '2023'}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">档案门类</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.category || '文书档案'}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">数据总量</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.total || 0}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">开放数量</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.opened || 0}}</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm text-slate-500 mb-1">受控数量</span>
                                <span class="text-base font-medium text-slate-800">{{$ctrl.task.checked || 0}}</span>
                            </div>
                        </div>

                        <!-- 按钮区 -->
                        <div class="flex items-center space-x-3 mb-4">
                            <button class="bg-primary hover:bg-sky-800 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center shadow-sm">
                                <i data-lucide="upload" class="w-4 h-4 mr-1.5"></i>上传数据
                            </button>
                            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center shadow-sm">
                                <i data-lucide="trash-2" class="w-4 h-4 mr-1.5"></i>删除数据
                            </button>
                            <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center shadow-sm">
                                <i data-lucide="play-circle" class="w-4 h-4 mr-1.5"></i>开放鉴定
                            </button>
                        </div>

                        <!-- 数据表格区 -->
                        <div class="bg-white border border-slate-200 rounded-md overflow-hidden flex-1 flex flex-col">
                            <div class="overflow-x-auto flex-1">
                                <table class="w-full text-left text-sm whitespace-nowrap">
                                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 sticky top-0 z-10">
                                        <tr>
                                            <th class="px-4 py-3 font-medium w-12 text-center">
                                                <input type="checkbox" class="rounded border-slate-300 text-primary focus:ring-primary" />
                                            </th>
                                            <th class="px-4 py-3 font-medium w-16">序号</th>
                                            <th class="px-4 py-3 font-medium">全宗号</th>
                                            <th class="px-4 py-3 font-medium">档号</th>
                                            <th class="px-4 py-3 font-medium">文件题名</th>
                                            <th class="px-4 py-3 font-medium">责任者</th>
                                            <th class="px-4 py-3 font-medium">保管期限</th>
                                            <th class="px-4 py-3 font-medium">成文日期</th>
                                            <th class="px-4 py-3 font-medium">AI鉴定结果</th>
                                            <th class="px-4 py-3 font-medium">人工复核结果</th>
                                            <th class="px-4 py-3 font-medium text-center">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        <tr ng-repeat="item in $ctrl.paginatedList" class="hover:bg-slate-50 transition-colors">
                                            <td class="px-4 py-3 text-center">
                                                <input type="checkbox" class="rounded border-slate-300 text-primary focus:ring-primary" />
                                            </td>
                                            <td class="px-4 py-3 text-slate-500">{{($ctrl.currentPage - 1) * $ctrl.pageSize + $index + 1}}</td>
                                            <td class="px-4 py-3 text-slate-600">{{item.fondsCode}}</td>
                                            <td class="px-4 py-3 text-slate-800 font-medium">{{item.archiveCode}}</td>
                                            <td class="px-4 py-3 text-slate-800">{{item.title}}</td>
                                            <td class="px-4 py-3 text-slate-600">{{item.responsible}}</td>
                                            <td class="px-4 py-3 text-slate-600">{{item.retention}}</td>
                                            <td class="px-4 py-3 text-slate-600">{{item.date}}</td>
                                            <td class="px-4 py-3">
                                                <span class="px-2 py-1 rounded-full text-xs font-medium" 
                                                      ng-class="item.aiResult === '开放' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'">
                                                    {{item.aiResult}}
                                                </span>
                                            </td>
                                            <td class="px-4 py-3">
                                                <span class="px-2 py-1 rounded-full text-xs font-medium" 
                                                      ng-class="item.manualResult === '开放' ? 'bg-emerald-100 text-emerald-700' : (item.manualResult === '控制' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600')">
                                                    {{item.manualResult || '待复核'}}
                                                </span>
                                            </td>
                                            <td class="px-4 py-3 text-center">
                                                <button ng-click="$ctrl.viewDetail(item)" class="text-primary hover:text-sky-700 transition-colors focus:outline-none" title="查看">
                                                    <i data-lucide="eye" class="w-4 h-4 mx-auto"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <tr ng-if="!$ctrl.dataList || $ctrl.dataList.length === 0">
                                            <td colspan="11" class="px-4 py-8 text-center text-slate-500">
                                                <div class="flex flex-col items-center justify-center">
                                                    <i data-lucide="inbox" class="w-10 h-10 text-slate-300 mb-2"></i>
                                                    <p>暂无数据</p>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <!-- 分页 -->
                            <div class="border-t border-slate-200 px-4 py-3 flex items-center justify-between bg-slate-50">
                                <div class="text-sm text-slate-500">
                                    共 {{$ctrl.totalItems || 0}} 条记录
                                </div>
                                <div class="flex items-center space-x-2">
                                    <button ng-click="$ctrl.prevPage()" ng-disabled="$ctrl.currentPage === 1" class="px-3 py-1 border border-slate-300 rounded text-sm bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">上一页</button>
                                    <span class="text-sm text-slate-600 px-2">{{$ctrl.currentPage}} / {{$ctrl.totalPages}}</span>
                                    <button ng-click="$ctrl.nextPage()" ng-disabled="$ctrl.currentPage === $ctrl.totalPages" class="px-3 py-1 border border-slate-300 rounded text-sm bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">下一页</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$timeout', function(IconService, $timeout) {
                var ctrl = this;
                
                ctrl.$onInit = function() {
                    // Try to load task from localStorage
                    var storedTask = localStorage.getItem('oaas_current_task');
                    if (storedTask) {
                        try {
                            ctrl.task = JSON.parse(storedTask);
                            // Assign some default mock values if not present
                            ctrl.task.fondsCode = ctrl.task.fondsCode || '101';
                            ctrl.task.fondsName = ctrl.task.fondsName || '测试全宗';
                            ctrl.task.year = ctrl.task.year || '2023';
                            ctrl.task.category = ctrl.task.category || '文书档案';
                        } catch(e) {
                            console.error('Failed to parse stored task', e);
                            ctrl.task = {
                                title: '未知任务',
                                fondsCode: '101',
                                fondsName: '测试全宗',
                                year: '2023',
                                category: '文书档案',
                                total: 0,
                                opened: 0,
                                checked: 0
                            };
                        }
                    } else {
                        ctrl.task = {
                            title: '未知任务',
                            fondsCode: '101',
                            fondsName: '测试全宗',
                            year: '2023',
                            category: '文书档案',
                            total: 0,
                            opened: 0,
                            checked: 0
                        };
                    }

                    // Mock data list
                    ctrl.dataList = [];
                    var responsibles = ['办公室', '人事处', '财务处', '保卫处', '审计处'];
                    var retentions = ['永久', '30年', '10年'];
                    var results = ['开放', '控制', '待复核'];
                    
                    // 生成 40 条数据（2页）
                    for (var i = 1; i <= 40; i++) {
                        var day = (i < 10 ? '0' + i : (i > 28 ? 28 : i));
                        var aiRes = results[i % 2];
                        var manRes = results[i % 3];
                        
                        // 初审阶段的鉴定任务数据，人工复核结果全部为待复核
                        // 根据系统状态定义，'已完成'状态对应初审阶段（AI鉴定完成，准备人工初审）
                        var isPreliminaryReview = (ctrl.task.status === '已完成' || !ctrl.task.status);
                        var finalManualResult = isPreliminaryReview ? '待复核' : ((i % 4 === 0) ? '待复核' : manRes);
                        
                        var archiveCode = ctrl.task.fondsCode + '-' + ctrl.task.year + '-WS-' + (1000 + i).toString().substring(1);
                        
                        // 检查是否有本地缓存的人工审核结果
                        try {
                            var reviewed = JSON.parse(localStorage.getItem('oaas_reviewed_results')) || {};
                            if (reviewed[archiveCode]) {
                                finalManualResult = reviewed[archiveCode];
                            }
                        } catch(e) {}

                        ctrl.dataList.push({
                            fondsCode: ctrl.task.fondsCode,
                            archiveCode: archiveCode,
                            title: '2023年度第' + i + '项工作执行报告',
                            responsible: responsibles[i % 5],
                            retention: retentions[i % 3],
                            date: ctrl.task.year + '-05-' + day,
                            aiResult: aiRes,
                            manualResult: finalManualResult
                        });
                    }
                    
                    ctrl.totalItems = ctrl.dataList.length;
                    ctrl.currentPage = 1;
                    ctrl.pageSize = 20;
                    ctrl.totalPages = Math.ceil(ctrl.totalItems / ctrl.pageSize) || 1;
                    
                    ctrl.updatePagination = function() {
                        var start = (ctrl.currentPage - 1) * ctrl.pageSize;
                        var end = start + ctrl.pageSize;
                        ctrl.paginatedList = ctrl.dataList.slice(start, end);
                        $timeout(function() { IconService.refresh(); }, 0, false);
                    };
                    
                    ctrl.prevPage = function() {
                        if (ctrl.currentPage > 1) {
                            ctrl.currentPage--;
                            ctrl.updatePagination();
                        }
                    };
                    
                    ctrl.nextPage = function() {
                        if (ctrl.currentPage < ctrl.totalPages) {
                            ctrl.currentPage++;
                            ctrl.updatePagination();
                        }
                    };

                    ctrl.viewDetail = function(item) {
                        localStorage.setItem('oaas_current_document', JSON.stringify(item));
                        window.open('appraisal-detail.html', '_blank');
                    };

                    ctrl.updatePagination();

                    // 监听窗口重新获得焦点，刷新复核结果
                    window.addEventListener('focus', function() {
                        try {
                            var reviewed = JSON.parse(localStorage.getItem('oaas_reviewed_results')) || {};
                            var hasChanges = false;
                            ctrl.dataList.forEach(function(item) {
                                if (reviewed[item.archiveCode] && item.manualResult !== reviewed[item.archiveCode]) {
                                    item.manualResult = reviewed[item.archiveCode];
                                    hasChanges = true;
                                }
                            });
                            if (hasChanges) {
                                $timeout(function() {
                                    // 触发视图更新
                                });
                            }
                        } catch(e) {}
                    });
                };
            }]
        });
    </script>
</body>
</html>
