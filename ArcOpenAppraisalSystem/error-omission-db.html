<!DOCTYPE html>
<html lang="zh-CN" ng-app="appraisalApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-OAAS档案开放鉴定系统 - 错检漏检库</title>
    <!-- 引入 Tailwind CSS 进行样式管理 -->
    <script src="./lib/tailwindcss.js"></script>
    <!-- 配置 Tailwind 主题颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0369A1', // 政务风主色
                        secondary: '#334155',
                        background: '#F8FAFC',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <!-- 引入 AngularJS -->
    <script src="./lib/angular.min.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="./lib/lucide.min.js"></script>
    <link rel="stylesheet" href="./main.css">
</head>
<body ng-controller="MainController as ctrl" class="h-screen overflow-hidden flex flex-col bg-slate-50">
    
    <navbar></navbar>
    <breadcrumb></breadcrumb>
    
    <!-- 主体内容区域 -->
    <main class="overflow-y-auto flex-1 p-4 md:px-8 flex flex-col lg:flex-row gap-5 w-full box-border relative">
        <!-- 错检漏检库管理视图 -->
        <error-omission-manage class="flex-1 flex flex-col min-w-0 w-full"></error-omission-manage>
    </main>

    <script>
        var app = angular.module('appraisalApp', []);

        // 重新渲染图标的服务
        app.service('IconService', function($timeout) {
            var refreshPromise;
            this.refresh = function() {
                if (refreshPromise) $timeout.cancel(refreshPromise);
                refreshPromise = 
                $timeout(function() {
                    lucide.createIcons();
                    refreshPromise = null;
                }, 50, false);
            };
        });

        // 模拟全局状态服务
        app.factory('ConfigService', function() {
            var defaultTypes = [
                { id: 1, name: '通用敏感规则', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 2, name: '政治类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 3, name: '民族宗教类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 4, name: '涉外类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 5, name: '历史类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 6, name: '国土类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 7, name: '文化类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 8, name: '军事类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 9, name: '经济类档案', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 10, name: '国家安全类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 11, name: '干部人事类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 12, name: '司法执法类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 13, name: '纪检监察类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 14, name: '科技类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 15, name: '公共安全类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 16, name: '个人信息类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 17, name: '数据安全类', controlFlag: '受控', createdAt: '2025-10-01 10:00:00', selected: false },
                { id: 18, name: '开放规则', controlFlag: '开放', createdAt: '2025-10-01 10:00:00', selected: false }
            ];
            var storedTypes = localStorage.getItem('oaas_sensitive_types');
            var sensitiveTypes = storedTypes ? JSON.parse(storedTypes) : defaultTypes;
            
            return {
                sensitiveTypes: sensitiveTypes,
 chunk: '李四的家庭住址是朝阳区某某街道', detail: '包含明确的个人隐私住址信息，模型未检出。', selected: false },
                    { id: 2, type: ctrl.sensitiveTypes[2], chunk: '2023年第四季度营收目标为5000万', detail: '涉及公司内部商业机密数据，模型漏检。', selected: false }
                ];

                ctrl.showErrorForm = false;
                ctrl.showOmissionForm = false;
                ctrl.isEdit = false;
                ctrl.errorFormData = {};
                ctrl.omissionFormData = {};
                ctrl.selectAllError = false;
                ctrl.selectAllOmission = false;

                ctrl.$onInit = function() {
                    IconService.refresh();
                };

                ctrl.switchTab = function(tab) {
                    ctrl.activeTab = tab;
                    IconService.refresh();
                };

                ctrl.batchImport = function() {
                    alert('请选择要导入的 ' + (ctrl.activeTab === 'error' ? '错检库' : '漏检库') + ' Excel/CSV 文件');
                };

                ctrl.batchExport = function() {
                    var list = ctrl.activeTab === 'error' ? ctrl.errorList : ctrl.omissionList;
                    var selectedCount = list.filter(function(item) { return item.selected; }).length;
                    var typeName = ctrl.activeTab === 'error' ? '错检库' : '漏检库';
                    
                    if (selectedCount === 0) {
                        alert('将导出所有 ' + typeName + ' 数据');
                    } else {
                        alert('将导出选中的 ' + selectedCount + ' 项 ' + typeName + ' 数据');
                    }
                };

                ctrl.toggleAll = function(type) {
                    if (type === 'error') {
                        ctrl.errorList.forEach(function(item) { item.selected = ctrl.selectAllError; });
                    } else {
                        ctrl.omissionList.forEach(function(item) { item.selected = ctrl.selectAllOmission; });
                    }
                };

                ctrl.updateSelectAll = function(type) {
                    if (type === 'error') {
                        if (ctrl.errorList.length === 0) { ctrl.selectAllError = false; return; }
                        ctrl.selectAllError = ctrl.errorList.every(function(item) { return item.selected; });
                    } else {
                        if (ctrl.omissionList.length === 0) { ctrl.selectAllOmission = false; return; }
                        ctrl.selectAllOmission = ctrl.omissionList.every(function(item) { return item.selected; });
                    }
                };

                ctrl.hasSelected = function() {
                    if (ctrl.activeTab === 'error') {
                        return ctrl.errorList.some(function(item) { return item.selected; });
                    } else {
                        return ctrl.omissionList.some(function(item) { return item.selected; });
                    }
                };

                ctrl.batchDelete = function() {
                    if (ctrl.activeTab === 'error') {
                        var selectedItems = ctrl.errorList.filter(function(item) { return item.selected; });
                        if (selectedItems.length === 0) return;
                        if (confirm('确定要删除选中的 ' + selectedItems.length + ' 项错检记录吗？')) {
                            ctrl.errorList = ctrl.errorList.filter(function(item) { return !item.selected; });
                            ctrl.selectAllError = false;
                        }
                    } else {
                        var selectedItems = ctrl.omissionList.filter(function(item) { return item.selected; });
                        if (selectedItems.length === 0) return;
                        if (confirm('确定要删除选中的 ' + selectedItems.length + ' 项漏检记录吗？')) {
                            ctrl.omissionList = ctrl.omissionList.filter(function(item) { return !item.selected; });
                            ctrl.selectAllOmission = false;
                        }
                    }
                    IconService.refresh();
                };

                ctrl.openForm = function() {
                    ctrl.isEdit = false;
                    if (ctrl.activeTab === 'error') {
                        ctrl.errorFormData = {};
                        ctrl.showErrorForm = true;
                    } else {
                        ctrl.omissionFormData = {};
                        ctrl.showOmissionForm = true;
                    }
                    IconService.refresh();
                };

                ctrl.editItem = function(item, type) {
                    ctrl.isEdit = true;
                    if (type === 'error') {
                        ctrl.errorFormData = angular.copy(item);
                        ctrl.showErrorForm = true;
                    } else {
                        ctrl.omissionFormData = angular.copy(item);
                        ctrl.omissionFormData.type = ctrl.sensitiveTypes.find(function(t) { return t.id === item.type.id; });
                        ctrl.showOmissionForm = true;
                    }
                    IconService.refresh();
                };

                ctrl.deleteItem = function(item, type) {
                    if (confirm('确定要删除该条记录吗？')) {
                        if (type === 'error') {
                            var index = ctrl.errorList.findIndex(function(i) { return i.id === item.id; });
                            if (index > -1) {
                                ctrl.errorList.splice(index, 1);
                                ctrl.updateSelectAll('error');
                            }
                        } else {
                            var index = ctrl.omissionList.findIndex(function(i) { return i.id === item.id; });
                            if (index > -1) {
                                ctrl.omissionList.splice(index, 1);
                                ctrl.updateSelectAll('omission');
                            }
                        }
                    }
                };

                ctrl.closeForm = function() {
                    ctrl.showErrorForm = false;
                    ctrl.showOmissionForm = false;
                };

                ctrl.saveErrorForm = function() {
                    if (!ctrl.errorFormData.errorType) { alert('请选择错检类型'); return; }
                    if (!ctrl.errorFormData.chunk) { alert('请输入错检语块'); return; }
                    
                    if (ctrl.isEdit) {
                        var index = ctrl.errorList.findIndex(function(i) { return i.id === ctrl.errorFormData.id; });
                        if (index > -1) {
                            var updatedItem = angular.copy(ctrl.errorFormData);
                            updatedItem.selected = ctrl.errorList[index].selected;
                            ctrl.errorList[index] = updatedItem;
                        }
                    } else {
                        ctrl.errorFormData.id = Date.now();
                        ctrl.errorFormData.selected = false;
                        ctrl.errorList.push(angular.copy(ctrl.errorFormData));
                    }
                    ctrl.closeForm();
                    IconService.refresh();
                };

                ctrl.saveOmissionForm = function() {
                    if (!ctrl.omissionFormData.type) { alert('请选择漏检敏感类型'); return; }
                    if (!ctrl.omissionFormData.chunk) { alert('请输入漏检语块'); return; }
                    
                    if (ctrl.isEdit) {
                        var index = ctrl.omissionList.findIndex(function(i) { return i.id === ctrl.omissionFormData.id; });
                        if (index > -1) {
                            var updatedItem = angular.copy(ctrl.omissionFormData);
                            updatedItem.selected = ctrl.omissionList[index].selected;
                            ctrl.omissionList[index] = updatedItem;
                        }
                    } else {
                        ctrl.omissionFormData.id = Date.now();
                        ctrl.omissionFormData.selected = false;
                        ctrl.omissionList.push(angular.copy(ctrl.omissionFormData));
                    }
                    ctrl.closeForm();
                    IconService.refresh();
                };
            }]
        });
    </script>
</body>
</html>
