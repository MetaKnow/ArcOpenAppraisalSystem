<!DOCTYPE html>
<html lang="zh-CN" ng-app="appraisalApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-OAAS档案开放鉴定系统 - 元数据配置</title>
    <script src="./lib/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0369A1',
                        secondary: '#334155',
                        background: '#F8FAFC',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <script src="./lib/angular.min.js"></script>
    <script src="./lib/lucide.min.js"></script>
    <link rel="stylesheet" href="./main.css">
</head>
<body ng-controller="MainController as ctrl" class="h-screen overflow-hidden flex flex-col bg-slate-50">
    
    <navbar></navbar>
    <breadcrumb></breadcrumb>
    
    <main class="overflow-y-auto flex-1 p-4 md:px-8 flex flex-col lg:flex-row gap-5 w-full box-border relative">
        <metadata-config-manage class="flex-1 flex flex-col min-w-0 w-full"></metadata-config-manage>
    </main>

    <script>
        var app = angular.module('appraisalApp', []);

        app.service('IconService', function($timeout) {
            var refreshPromise;
            this.refresh = function() {
                if (refreshPromise) $timeout.cancel(refreshPromise);
                refreshPromise = 
                $timeout(function() { lucide.createIcons(); }, 0);
            };
        });

        app.controller('MainController', ['IconService', '$timeout', '$rootScope', function(IconService, $timeout, $rootScope) {
            $timeout(function() {
                $rootScope.$broadcast('NAVIGATE', '元数据配置', '系统管理');
            });
        }]);

        app.component('navbar', {
            template: `
                <nav class="bg-surface shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between sticky top-0 z-50">
                    <!-- 左侧 Logo -->
                    <div class="flex items-center space-x-2 cursor-pointer flex-1 justify-start">
                        <div class="w-8 h-8 bg-primary text-white flex items-center justify-center rounded font-bold text-xl">S</div>
                        <span class="text-xl font-bold text-slate-800 tracking-wide whitespace-nowrap">MS-OAAS档案开放鉴定系统</span>
                    </div>
                    
                    <!-- 中间功能菜单 -->
                    <div class="hidden md:flex space-x-1 flex-none justify-center">
                        <div ng-repeat="item in $ctrl.filteredMenuItems" 
                             ng-click="!item.children && $ctrl.navigate(item.name)"
                             ng-class="{ 'text-primary bg-sky-50': $ctrl.currentMenu === item.name, 'text-slate-600 hover:bg-slate-50 hover:text-slate-900': $ctrl.currentMenu !== item.name }"
                             class="relative group px-4 py-2 rounded-md cursor-pointer text-sm font-medium transition-colors duration-200 flex items-center space-x-1">
                            <span>{{item.name}}</span>
                            <i ng-if="item.children" data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <!-- 二级菜单下拉框 -->
                            <div ng-if="item.children" class="absolute top-full left-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1">
                                    <div ng-repeat="child in item.children" 
                                         ng-click="$ctrl.navigate(child, item.name); $event.stopPropagation();"
                                         ng-class="{ 'text-primary bg-sky-50': $ctrl.currentSubMenu === child, 'text-slate-600 hover:bg-sky-50 hover:text-primary': $ctrl.currentSubMenu !== child }"
                                         class="px-4 py-2 transition-colors cursor-pointer block">
                                        {{child}}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧系统栏 -->
                    <div class="flex items-center space-x-5 text-slate-500 flex-1 justify-end relative">
                        <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="lock" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="sun" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        
                        <!-- 用户切换下拉 -->
                        <div class="relative group cursor-pointer flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-600 text-xs font-bold overflow-hidden" title="{{$ctrl.currentUser.realName || '未登录'}}">
                                <span ng-if="!$ctrl.currentUser">未</span>
                                <span ng-if="$ctrl.currentUser">{{$ctrl.currentUser.realName.substring(0,1)}}</span>
                            </div>
                            <span class="text-sm font-medium text-slate-700 hidden lg:block">{{$ctrl.currentUser ? $ctrl.currentUser.realName : '未登录'}}</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <div class="absolute top-full right-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1 max-h-64 overflow-y-auto">
                                    <div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-100 bg-slate-50">切换用户 (演示)</div>
                                    <div ng-repeat="u in $ctrl.userList" 
                                         ng-click="$ctrl.switchUser(u); $event.stopPropagation();"
                                         class="px-4 py-2 hover:bg-sky-50 cursor-pointer text-sm flex flex-col"
                                         ng-class="{'bg-sky-50 text-primary font-medium': $ctrl.currentUser.id === u.id, 'text-slate-700': $ctrl.currentUser.id !== u.id}">
                                        <span>{{u.realName}} ({{u.username}})</span>
                                        <span class="text-xs text-slate-500 mt-0.5">{{u.userType}}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <i data-lucide="settings" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                    </div>
                </nav>
            `,
            controller: ['IconService', '$rootScope', function(IconService, $rootScope) {
                var ctrl = this;
                ctrl.currentMenu = '工作台';
                ctrl.currentSubMenu = '';

                ctrl.menuItems = [
                    { name: '工作台' },
                    { name: '鉴定规则配置', children: ['敏感类型管理', '敏感内容管理', '通用敏感词库', '全宗敏感词库', '错检漏检库'] },
                    { name: '鉴定任务管理' },
                    { name: '系统管理', children: ['全宗配置', '用户管理', '角色权限', '元数据配置', '鉴定流程配置', '系统参数配置', '日志管理'] }
                ];
                
                ctrl.filteredMenuItems = [];

                // 模拟用户登录
                ctrl.userList = [];
                try {
                    ctrl.userList = JSON.parse(localStorage.getItem('oaas_user_list')) || [];
                } catch(e) {}
                
                if (ctrl.userList.length === 0) {
                    ctrl.userList = [
                        { id: 1, username: 'admin', realName: '系统管理员', userType: '馆内用户' },
                        { id: 2, username: 'zhangsan', realName: '张三', userType: '馆内用户' },
                        { id: 3, username: 'lisi', realName: '李四', userType: '形成/移交单位用户' }
                    ];
                    localStorage.setItem('oaas_user_list', JSON.stringify(ctrl.userList));
                }

                try {
                    ctrl.currentUser = JSON.parse(localStorage.getItem('oaas_current_user'));
                } catch(e) {}
                
                if (!ctrl.currentUser && ctrl.userList.length > 0) {
                    ctrl.currentUser = ctrl.userList[0];
                    localStorage.setItem('oaas_current_user', JSON.stringify(ctrl.currentUser));
                }

                // 权限过滤
                ctrl.updateMenuByRole = function() {
                    if (ctrl.currentUser && ctrl.currentUser.userType === '形成/移交单位用户') {
                        // Base allowed menus
                        var allowedMenus = ['工作台', '鉴定任务管理'];
                        
                        // Load additional menus from role permissions
                        try {
                            var permissions = JSON.parse(localStorage.getItem('oaas_role_permissions')) || [];
                            var userPerm = permissions.find(function(p) { return p.username === ctrl.currentUser.username; });
                            if (userPerm && userPerm.selectedMenus && userPerm.selectedMenus.length > 0) {
                                allowedMenus = allowedMenus.concat(userPerm.selectedMenus);
                            }
                        } catch(e) {}
                        
                        // Filter the main menu based on allowed menus
                        var newMenuItems = [];
                        
                        ctrl.menuItems.forEach(function(item) {
                            if (allowedMenus.indexOf(item.name) !== -1) {
                                newMenuItems.push(angular.copy(item));
                            } else if (item.children) {
                                var filteredChildren = item.children.filter(function(child) {
                                    return allowedMenus.indexOf(child) !== -1;
                                });
                                if (filteredChildren.length > 0) {
                                    var newItem = angular.copy(item);
                                    newItem.children = filteredChildren;
                                    newMenuItems.push(newItem);
                                }
                            }
                        });
                        
                        ctrl.filteredMenuItems = newMenuItems;
                    } else {
                        ctrl.filteredMenuItems = ctrl.menuItems;
                    }
                };

                ctrl.updateMenuByRole();

                ctrl.switchUser = function(u) {
                    ctrl.currentUser = u;
                    localStorage.setItem('oaas_current_user', JSON.stringify(u));
                    window.location.href = 'index.html'; // 切换用户后回到首页
                };
                
                ctrl.navigate = function(name, parentName) {
                    var map = {
                        '工作台': 'index.html',
                        '敏感类型管理': 'sensitive-type.html',
                        '敏感内容管理': 'sensitive-content.html',
                        '通用敏感词库': 'general-sensitive-word.html',
                        '全宗配置': 'fonds-config.html',
                        '用户管理': 'user-management.html',
                        '角色权限': 'role-permission.html',
                        '全宗敏感词库': 'fonds-sensitive-word.html',
                        '错检漏检库': 'error-omission-db.html',
                        '鉴定任务管理': 'appraisal-task.html',
                        '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html',
                        '任务审核': 'appraisal-task-audit.html'
                    ,
                        '日志管理': 'log-management.html'
                    };
                    var currentPath = 'index.html';
                    var href = window.location.href;
                    var sortedMapKeys = Object.keys(map).sort(function(a, b) {
                        return map[b].length - map[a].length;
                    });
                    for (var i = 0; i < sortedMapKeys.length; i++) {
                        var key = sortedMapKeys[i];
                        if (href.indexOf(map[key]) !== -1) {
                            currentPath = map[key];
                            break;
                        }
                    }
                    
                    if (map[name]) {
                        if (map[name] === currentPath) {
                            if (parentName !== undefined) {
                                ctrl.currentSubMenu = parentName ? name : '';
                                ctrl.currentMenu = parentName || name;
                                $rootScope.$broadcast('NAVIGATE', name, parentName);
                            } else {
                                $rootScope.$broadcast('NAVIGATE', name);
                            }
                            return;
                        }
                        window.location.href = map[name];
                        return;
                    }
                    if (parentName !== undefined) {
                        ctrl.currentSubMenu = parentName ? name : '';
                        ctrl.currentMenu = parentName || name;
                        $rootScope.$broadcast('NAVIGATE', name, parentName);
                    } else {
                        $rootScope.$broadcast('NAVIGATE', name);
                    }
                };

                // 监听面包屑点击回到工作台
                $rootScope.$on('NAVIGATE', function(e, name, parentName) {
                    ctrl.currentSubMenu = parentName ? name : '';
                    ctrl.currentMenu = parentName || name;
                });

                ctrl.$onInit = function() {
                    IconService.refresh();
                };
            }]
        });

        app.component('breadcrumb', {
            template: `
                <div class="bg-white border-b border-slate-200 flex items-center text-sm font-medium relative" style="height: 40px; padding-left: 1rem; padding-right: 1rem; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none;">
                    <style>
                        .custom-tab-scroll::-webkit-scrollbar { display: none; }
                    </style>
                    <div class="flex items-center h-full custom-tab-scroll w-full">
                        <div ng-repeat="tab in $ctrl.tabs" 
                             ng-click="$ctrl.goToTab(tab)"
                             ng-right-click="$ctrl.showContextMenu($event, tab)"
                             class="flex items-center h-full px-4 border-r border-slate-200 cursor-pointer transition-colors relative group flex-shrink-0"
                             ng-class="{'bg-sky-50 text-primary border-t-2 border-t-primary': tab.active, 'text-slate-600 hover:bg-slate-50 border-t-2 border-t-transparent': !tab.active}">
                            <i ng-if="tab.name === '工作台'" data-lucide="layout-grid" class="w-4 h-4 mr-2"></i>
                            <span class="select-none">{{tab.name}}</span>
                            <div ng-if="tab.name !== '工作台'" 
                                 ng-click="$ctrl.closeTab($event, tab)" 
                                 class="ml-2 w-4 h-4 rounded-full flex items-center justify-center hover:bg-slate-200 hover:text-red-500 transition-colors"
                                 ng-class="{'opacity-100': tab.active, 'opacity-0 group-hover:opacity-100': !tab.active}">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Context Menu -->
                    <div ng-if="$ctrl.contextMenu.show" 
                         class="fixed z-[100] w-32 bg-white rounded-md shadow-lg border border-slate-200 py-1"
                         ng-style="{'left': $ctrl.contextMenu.x + 'px', 'top': $ctrl.contextMenu.y + 'px'}">
                        <div ng-click="$ctrl.closeAllTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">全部关闭</div>
                        <div ng-click="$ctrl.closeOtherTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">关闭其他</div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$rootScope', '$scope', '$document', '$timeout', function(IconService, $rootScope, $scope, $document, $timeout) {
                var ctrl = this;
                
                var urlMap = {
                    '工作台': 'index.html',
                    '敏感类型管理': 'sensitive-type.html',
                    '敏感内容管理': 'sensitive-content.html',
                    '通用敏感词库': 'general-sensitive-word.html',
                    '全宗配置': 'fonds-config.html',
                    '用户管理': 'user-management.html',
                    '角色权限': 'role-permission.html',
                    '全宗敏感词库': 'fonds-sensitive-word.html',
                    '错检漏检库': 'error-omission-db.html',
                    '鉴定任务管理': 'appraisal-task.html',
                    '新建任务': 'appraisal-task-create.html',
                    '查看任务': 'appraisal-task-view.html',
                    '修改任务': 'appraisal-task-edit.html',
                    '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html'
                ,
                    '日志管理': 'log-management.html'
                };
                
                var nameMap = {};
                for (var key in urlMap) { nameMap[urlMap[key]] = key; }
                
                ctrl.contextMenu = { show: false, x: 0, y: 0, targetTab: null };
                
                var currentUrl = 'index.html';
                var pathname = window.location.pathname || '';
                var currentFile = pathname.split('/').pop() || '';
                if (nameMap[currentFile]) {
                    currentUrl = currentFile;
                } else {
                    var href = window.location.href;
                    var sortedKeys = Object.keys(urlMap).sort(function(a, b) {
                        return urlMap[b].length - urlMap[a].length;
                    });
                    for (var i = 0; i < sortedKeys.length; i++) {
                        var key = sortedKeys[i];
                        if (href.indexOf(urlMap[key]) !== -1) {
                            currentUrl = urlMap[key];
                            break;
                        }
                    }
                }
                
                var currentName = nameMap[currentUrl] || '工作台';
                
                var storedTabs = localStorage.getItem('oaas_opened_tabs');
                if (storedTabs) {
                    try {
                        ctrl.tabs = JSON.parse(storedTabs);
                    } catch(e) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                } else {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                }

                // 兼容历史缓存格式，避免异常数据导致面包屑不显示
                if (!Array.isArray(ctrl.tabs)) {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                } else {
                    ctrl.tabs = ctrl.tabs.filter(function(t) {
                        return t && typeof t.name === 'string' && typeof t.url === 'string';
                    });
                    if (ctrl.tabs.length === 0) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                }
                
                if (!ctrl.tabs.find(function(t) { return t.name === '工作台'; })) {
                    ctrl.tabs.unshift({ name: '工作台', url: 'index.html', active: false });
                }
                
                var existingTab = ctrl.tabs.find(function(t) { return t.name === currentName; });
                if (!existingTab && currentName) {
                    ctrl.tabs.push({ name: currentName, url: currentUrl, active: true });
                }
                
                ctrl.tabs.forEach(function(t) {
                    t.active = (t.name === currentName);
                });
                
                ctrl.saveTabs = function() {
                    localStorage.setItem('oaas_opened_tabs', JSON.stringify(ctrl.tabs));
                };
                
                ctrl.saveTabs();
                
                ctrl.goToTab = function(tab) {
                    if (tab.name !== currentName) {
                        window.location.href = tab.url;
                    }
                };
                
                ctrl.closeTab = function(e, tab) {
                    if (e) {
                        e.stopPropagation();
                        e.preventDefault();
                    }
                    if (tab.name === '工作台') return;
                    
                    var index = ctrl.tabs.indexOf(tab);
                    if (index > -1) {
                        ctrl.tabs.splice(index, 1);
                        ctrl.saveTabs();
                        
                        if (tab.active) {
                            var nextTab = ctrl.tabs[index] || ctrl.tabs[index - 1] || ctrl.tabs[0];
                            window.location.href = nextTab.url;
                        }
                    }
                    ctrl.contextMenu.show = false;
                };
                
                ctrl.showContextMenu = function(e, tab) {
                    e.preventDefault();
                    ctrl.contextMenu.show = true;
                    ctrl.contextMenu.x = e.clientX;
                    ctrl.contextMenu.y = e.clientY;
                    ctrl.contextMenu.targetTab = tab;
                };
                
                ctrl.closeAllTabs = function() {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    if (currentName !== '工作台') {
                        window.location.href = 'index.html';
                    }
                };
                
                ctrl.closeOtherTabs = function() {
                    var target = ctrl.contextMenu.targetTab;
                    if (!target) return;
                    
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    if (target.name !== '工作台') {
                        ctrl.tabs.push(target);
                    }
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    
                    if (currentName !== target.name && currentName !== '工作台') {
                        window.location.href = target.url;
                    } else if (currentName === target.name) {
                        // Keep current tab active
                    }
                };
                
                var closeMenuHandler = function(e) {
                    if (ctrl.contextMenu.show) {
                        $scope.$apply(function() {
                            ctrl.contextMenu.show = false;
                        });
                    }
                };
                
                $document.on('click', closeMenuHandler);
                $scope.$on('$destroy', function() {
                    $document.off('click', closeMenuHandler);
                });
                
                ctrl.$onInit = function() {
                    $timeout(function() { IconService.refresh(); }, 0);
                };
            }]
        });

        // Ensure ng-right-click is registered
        if (!app._invokeQueue.some(function(item) { return item[1] === 'directive' && item[2][0] === 'ngRightClick'; })) {
            app.directive('ngRightClick', ['$parse', function($parse) {
                return function(scope, element, attrs) {
                    var fn = $parse(attrs.ngRightClick);
                    element.bind('contextmenu', function(event) {
                        scope.$apply(function() {
                            event.preventDefault();
                            fn(scope, {$event: event});
                        });
                    });
                };
            }]);
        }

        app.component('metadataConfigManage', {
            template: `
                <div class="bg-white rounded-lg shadow-sm border border-slate-100 flex-1 p-5 flex flex-col h-full relative">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                        <h2 class="text-lg font-bold text-slate-800">元数据配置</h2>
                        <div class="flex items-center space-x-3">
                            <button ng-click="$ctrl.batchImport()" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                <i data-lucide="upload" class="w-4 h-4 mr-1"></i> 批量导入
                            </button>
                            <button ng-click="$ctrl.batchExport()" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                <i data-lucide="download" class="w-4 h-4 mr-1"></i> 批量导出
                            </button>
                            <button ng-click="$ctrl.openForm()" class="bg-primary hover:bg-sky-800 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增门类
                            </button>
                            <button ng-click="$ctrl.batchDelete()" ng-disabled="!$ctrl.hasSelected()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 disabled:opacity-50 disabled:cursor-not-allowed px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                <i data-lucide="trash-2" class="w-4 h-4 mr-1"></i> 删除门类
                            </button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                    <th class="px-4 py-3 font-medium w-12">
                                        <input type="checkbox" ng-model="$ctrl.selectAll" ng-change="$ctrl.toggleAll()" class="rounded border-slate-300 text-primary focus:ring-primary cursor-pointer w-4 h-4">
                                    </th>
                                    <th class="px-4 py-3 font-medium w-16">序号</th>
                                    <th class="px-4 py-3 font-medium">门类代码</th>
                                    <th class="px-4 py-3 font-medium">门类名称</th>
                                    <th class="px-4 py-3 font-medium">元数据数量</th>
                                    <th class="px-4 py-3 font-medium text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr ng-repeat="item in $ctrl.list" class="border-b border-slate-100 hover:bg-slate-50 transition-colors text-sm">
                                    <td class="px-4 py-3">
                                        <input type="checkbox" ng-model="item.selected" ng-change="$ctrl.updateSelectAll()" class="rounded border-slate-300 text-primary focus:ring-primary cursor-pointer w-4 h-4">
                                    </td>
                                    <td class="px-4 py-3 text-slate-500">{{$index + 1}}</td>
                                    <td class="px-4 py-3 text-slate-800">{{item.categoryNo}}</td>
                                    <td class="px-4 py-3 text-slate-800">{{item.categoryName}}</td>
                                    <td class="px-4 py-3 text-slate-500">{{item.metadataList ? item.metadataList.length : 0}} 个</td>
                                    <td class="px-4 py-3 text-right space-x-3 whitespace-nowrap">
                                        <button ng-click="$ctrl.openMetadataSettings(item)" class="text-blue-600 hover:text-blue-800 font-medium">设置元数据</button>
                                        <button ng-click="$ctrl.viewMetadata(item)" class="text-sky-600 hover:text-sky-800 font-medium">查看元数据</button>
                                        <button ng-click="$ctrl.editItem(item)" class="text-blue-600 hover:text-blue-800 font-medium">修改门类</button>
                                    </td>
                                </tr>
                                <tr ng-if="$ctrl.list.length === 0">
                                    <td colspan="6" class="px-4 py-8 text-center text-slate-500">暂无数据</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 门类表单弹窗 -->
                    <div ng-if="$ctrl.showForm" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[100]">
                        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                                <h3 class="font-bold text-lg text-slate-800">{{ $ctrl.isEdit ? '修改' : '新增' }}门类</h3>
                                <button ng-click="$ctrl.closeForm()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="p-6 space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">门类代码 <span class="text-red-500">*</span></label>
                                    <input type="text" ng-model="$ctrl.formData.categoryNo" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" placeholder="请输入门类代码">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">门类名称 <span class="text-red-500">*</span></label>
                                    <input type="text" ng-model="$ctrl.formData.categoryName" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" placeholder="请输入门类名称">
                                </div>
                            </div>
                            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                                <button ng-click="$ctrl.closeForm()" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100 transition-colors text-sm font-medium">取消</button>
                                <button ng-click="$ctrl.saveForm()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-sky-800 transition-colors text-sm font-medium">保存</button>
                            </div>
                        </div>
                    </div>

                    <!-- 元数据设置/查看全屏侧滑视图 -->
                    <div ng-if="$ctrl.showMetadataView" class="absolute inset-0 bg-white z-[90] flex flex-col h-full shadow-sm rounded-lg overflow-hidden animate-[slideIn_0.3s_ease-out]">
                        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                            <div class="flex items-center">
                                <button ng-click="$ctrl.closeMetadataView()" class="mr-4 text-slate-400 hover:text-slate-600 transition-colors">
                                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                                </button>
                                <h3 class="font-bold text-lg text-slate-800">
                                    {{ $ctrl.isViewingOnly ? '查看' : '设置' }}元数据 <span class="text-sm font-normal text-slate-500 ml-2">({{$ctrl.currentCategory.categoryName}})</span>
                                </h3>
                            </div>
                            <div class="flex space-x-3" ng-if="!$ctrl.isViewingOnly">
                                <button ng-click="$ctrl.batchImportMetadata()" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                    <i data-lucide="upload" class="w-4 h-4 mr-1"></i> 批量导入
                                </button>
                                <button ng-click="$ctrl.batchExportMetadata()" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                    <i data-lucide="download" class="w-4 h-4 mr-1"></i> 批量导出
                                </button>
                                <button ng-click="$ctrl.openMetadataForm()" class="bg-primary hover:bg-sky-800 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                    <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增元数据
                                </button>
                                <button ng-click="$ctrl.batchDeleteMetadata()" ng-disabled="!$ctrl.hasSelectedMetadata()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 disabled:opacity-50 disabled:cursor-not-allowed px-4 py-2 rounded-md text-sm transition-colors flex items-center">
                                    <i data-lucide="trash-2" class="w-4 h-4 mr-1"></i> 批量删除
                                </button>
                            </div>
                        </div>

                        <div class="flex-1 p-6 overflow-y-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                        <th class="px-4 py-3 font-medium w-12" ng-if="!$ctrl.isViewingOnly">
                                            <input type="checkbox" ng-model="$ctrl.selectAllMetadata" ng-change="$ctrl.toggleAllMetadata()" class="rounded border-slate-300 text-primary focus:ring-primary cursor-pointer w-4 h-4">
                                        </th>
                                        <th class="px-4 py-3 font-medium w-16">序号</th>
                                        <th class="px-4 py-3 font-medium">元数据名称</th>
                                        <th class="px-4 py-3 font-medium">字段类型</th>
                                        <th class="px-4 py-3 font-medium">长度</th>
                                        <th class="px-4 py-3 font-medium text-right" ng-if="!$ctrl.isViewingOnly">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr ng-repeat="meta in $ctrl.currentCategory.metadataList" class="border-b border-slate-100 hover:bg-slate-50 transition-colors text-sm">
                                        <td class="px-4 py-3" ng-if="!$ctrl.isViewingOnly">
                                            <input type="checkbox" ng-model="meta.selected" ng-change="$ctrl.updateSelectAllMetadata()" class="rounded border-slate-300 text-primary focus:ring-primary cursor-pointer w-4 h-4">
                                        </td>
                                        <td class="px-4 py-3 text-slate-500">{{$index + 1}}</td>
                                        <td class="px-4 py-3 text-slate-800">{{meta.name}}</td>
                                        <td class="px-4 py-3 text-slate-800">
                                            <span class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs">{{meta.type}}</span>
                                        </td>
                                        <td class="px-4 py-3 text-slate-800">{{meta.length || '-'}}</td>
                                        <td class="px-4 py-3 text-right space-x-3" ng-if="!$ctrl.isViewingOnly">
                                            <button ng-click="$ctrl.editMetadata(meta)" class="text-blue-600 hover:text-blue-800 font-medium">修改</button>
                                            <button ng-click="$ctrl.deleteMetadata(meta)" class="text-red-600 hover:text-red-800 font-medium">删除</button>
                                        </td>
                                    </tr>
                                    <tr ng-if="!$ctrl.currentCategory.metadataList || $ctrl.currentCategory.metadataList.length === 0">
                                        <td colspan="{{$ctrl.isViewingOnly ? 4 : 6}}" class="px-4 py-8 text-center text-slate-500">该门类暂无元数据配置</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 新增/修改元数据弹窗 -->
                    <div ng-if="$ctrl.showMetadataForm" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[110]">
                        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                                <h3 class="font-bold text-lg text-slate-800">{{ $ctrl.isEditMetadata ? '修改' : '新增' }}元数据</h3>
                                <button ng-click="$ctrl.closeMetadataForm()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="p-6 space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">元数据名称 <span class="text-red-500">*</span></label>
                                    <input type="text" ng-model="$ctrl.metaFormData.name" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" placeholder="请输入元数据名称">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">字段类型 <span class="text-red-500">*</span></label>
                                    <select ng-model="$ctrl.metaFormData.type" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                                        <option value="">请选择字段类型</option>
                                        <option value="字符串">字符串</option>
                                        <option value="数字">数字</option>
                                        <option value="日期时间">日期时间</option>
                                        <option value="布尔值">布尔值</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">长度</label>
                                    <input type="number" ng-model="$ctrl.metaFormData.length" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" placeholder="例如：255 (选填)">
                                </div>
                            </div>
                            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                                <button ng-click="$ctrl.closeMetadataForm()" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100 transition-colors text-sm font-medium">取消</button>
                                <button ng-click="$ctrl.saveMetadataForm()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-sky-800 transition-colors text-sm font-medium">保存</button>
                            </div>
                        </div>
                    </div>
                    
                    <style>
                        @keyframes slideIn {
                            from { transform: translateX(20px); opacity: 0; }
                            to { transform: translateX(0); opacity: 1; }
                        }
                    </style>
                </div>
            `,
            controller: ['IconService', '$timeout', function(IconService, $timeout) {
                var ctrl = this;
                
                var defaultMetadata = [
                    { id: 101, name: '全宗号', type: '字符串', length: 50, selected: false },
                    { id: 102, name: '档号', type: '字符串', length: 100, selected: false },
                    { id: 103, name: '文件题名', type: '字符串', length: 255, selected: false },
                    { id: 104, name: '责任者', type: '字符串', length: 100, selected: false },
                    { id: 105, name: '保管期限', type: '字符串', length: 20, selected: false },
                    { id: 106, name: '成文日期', type: '日期时间', length: null, selected: false }
                ];

                var storedList = localStorage.getItem('oaas_metadata_category_list');
                var needReset = false;
                if (storedList) {
                    try {
                        ctrl.list = JSON.parse(storedList);
                        // 简单判断是否已经包含了新需求中的字段
                        if (ctrl.list.length > 0 && ctrl.list[0].metadataList && ctrl.list[0].metadataList.length > 0) {
                            if (ctrl.list[0].metadataList[0].name !== '全宗号') {
                                needReset = true;
                            }
                        } else {
                            needReset = true;
                        }
                    } catch(e) {
                        needReset = true;
                    }
                } else {
                    needReset = true;
                }

                if (needReset) {
                    ctrl.list = [
                        { id: 1, categoryNo: 'WS', categoryName: '文书档案', selected: false, metadataList: angular.copy(defaultMetadata) },
                        { id: 2, categoryNo: 'ZP', categoryName: '照片档案', selected: false, metadataList: angular.copy(defaultMetadata) },
                        { id: 3, categoryNo: 'KJ', categoryName: '科技档案', selected: false, metadataList: angular.copy(defaultMetadata) }
                    ];
                    localStorage.setItem('oaas_metadata_category_list', JSON.stringify(ctrl.list));
                }

                ctrl.saveData = function() {
                    localStorage.setItem('oaas_metadata_category_list', JSON.stringify(ctrl.list));
                };

                ctrl.showForm = false;
                ctrl.isEdit = false;
                ctrl.formData = {};
                ctrl.selectAll = false;

                // 元数据视图状态
                ctrl.showMetadataView = false;
                ctrl.isViewingOnly = false;
                ctrl.currentCategory = null;
                ctrl.selectAllMetadata = false;

                // 元数据表单状态
                ctrl.showMetadataForm = false;
                ctrl.isEditMetadata = false;
                ctrl.metaFormData = {};

                ctrl.$onInit = function() {
                    IconService.refresh();
                };

                // ===== 门类管理相关方法 =====
                
                ctrl.batchImport = function() { alert('请选择要导入的门类配置 Excel/CSV 文件'); };

                ctrl.batchExport = function() {
                    if (!ctrl.hasSelected()) {
                        alert('将导出所有门类及元数据配置');
                    } else {
                        var selectedCount = ctrl.list.filter(function(item) { return item.selected; }).length;
                        alert('将导出选中的 ' + selectedCount + ' 项门类及元数据配置');
                    }
                };

                ctrl.toggleAll = function() {
                    ctrl.list.forEach(function(item) { item.selected = ctrl.selectAll; });
                };

                ctrl.updateSelectAll = function() {
                    if (ctrl.list.length === 0) {
                        ctrl.selectAll = false; return;
                    }
                    ctrl.selectAll = ctrl.list.every(function(item) { return item.selected; });
                };

                ctrl.hasSelected = function() {
                    return ctrl.list.some(function(item) { return item.selected; });
                };

                ctrl.batchDelete = function() {
                    var selectedItems = ctrl.list.filter(function(item) { return item.selected; });
                    if (selectedItems.length === 0) return;
                    
                    if (confirm('确定要删除选中的 ' + selectedItems.length + ' 项门类吗？')) {
                        ctrl.list = ctrl.list.filter(function(item) { return !item.selected; });
                        ctrl.selectAll = false;
                        ctrl.saveData();
                        IconService.refresh();
                    }
                };

                ctrl.openForm = function() {
                    ctrl.isEdit = false;
                    ctrl.formData = {};
                    ctrl.showForm = true;
                    IconService.refresh();
                };

                ctrl.editItem = function(item) {
                    ctrl.isEdit = true;
                    ctrl.formData = angular.copy(item);
                    ctrl.showForm = true;
                    IconService.refresh();
                };

                ctrl.closeForm = function() { ctrl.showForm = false; };

                ctrl.saveForm = function() {
                    if (!ctrl.formData.categoryNo) { alert('请输入门类代码'); return; }
                    if (!ctrl.formData.categoryName) { alert('请输入门类名称'); return; }
                    
                    if (ctrl.isEdit) {
                        var index = ctrl.list.findIndex(function(i) { return i.id === ctrl.formData.id; });
                        if (index > -1) {
                            var updatedItem = angular.copy(ctrl.formData);
                            updatedItem.selected = ctrl.list[index].selected;
                            // 保留原有的元数据列表
                            updatedItem.metadataList = ctrl.list[index].metadataList || [];
                            ctrl.list[index] = updatedItem;
                        }
                    } else {
                        ctrl.formData.id = Date.now();
                        ctrl.formData.selected = false;
                        ctrl.formData.metadataList = [];
                        ctrl.list.push(angular.copy(ctrl.formData));
                    }
                    ctrl.saveData();
                    ctrl.showForm = false;
                    IconService.refresh();
                };

                // ===== 元数据管理相关方法 =====

                ctrl.batchImportMetadata = function() {
                    alert('请选择要导入的元数据 Excel/CSV 文件');
                };

                ctrl.batchExportMetadata = function() {
                    if (!ctrl.hasSelectedMetadata()) {
                        alert('将导出该门类下的所有元数据配置');
                    } else {
                        var selectedCount = ctrl.currentCategory.metadataList.filter(function(item) { return item.selected; }).length;
                        alert('将导出选中的 ' + selectedCount + ' 项元数据配置');
                    }
                };

                ctrl.toggleAllMetadata = function() {
                    if (!ctrl.currentCategory || !ctrl.currentCategory.metadataList) return;
                    ctrl.currentCategory.metadataList.forEach(function(item) { item.selected = ctrl.selectAllMetadata; });
                };

                ctrl.updateSelectAllMetadata = function() {
                    if (!ctrl.currentCategory || !ctrl.currentCategory.metadataList || ctrl.currentCategory.metadataList.length === 0) {
                        ctrl.selectAllMetadata = false; return;
                    }
                    ctrl.selectAllMetadata = ctrl.currentCategory.metadataList.every(function(item) { return item.selected; });
                };

                ctrl.hasSelectedMetadata = function() {
                    if (!ctrl.currentCategory || !ctrl.currentCategory.metadataList) return false;
                    return ctrl.currentCategory.metadataList.some(function(item) { return item.selected; });
                };

                ctrl.batchDeleteMetadata = function() {
                    if (!ctrl.currentCategory || !ctrl.currentCategory.metadataList) return;
                    var selectedItems = ctrl.currentCategory.metadataList.filter(function(item) { return item.selected; });
                    if (selectedItems.length === 0) return;
                    
                    if (confirm('确定要删除选中的 ' + selectedItems.length + ' 项元数据吗？')) {
                        ctrl.currentCategory.metadataList = ctrl.currentCategory.metadataList.filter(function(item) { return !item.selected; });
                        ctrl.selectAllMetadata = false;
                        ctrl.saveData();
                        IconService.refresh();
                    }
                };

                ctrl.openMetadataSettings = function(category) {
                    ctrl.currentCategory = category;
                    ctrl.isViewingOnly = false;
                    ctrl.selectAllMetadata = false;
                    if (ctrl.currentCategory.metadataList) {
                        ctrl.currentCategory.metadataList.forEach(function(item) { item.selected = false; });
                    }
                    ctrl.showMetadataView = true;
                    $timeout(function() { IconService.refresh(); }, 50, false);
                };

                ctrl.viewMetadata = function(category) {
                    ctrl.currentCategory = category;
                    ctrl.isViewingOnly = true;
                    ctrl.showMetadataView = true;
                    $timeout(function() { IconService.refresh(); }, 50, false);
                };

                ctrl.closeMetadataView = function() {
                    ctrl.showMetadataView = false;
                    ctrl.currentCategory = null;
                };

                ctrl.openMetadataForm = function() {
                    ctrl.isEditMetadata = false;
                    ctrl.metaFormData = { type: '' };
                    ctrl.showMetadataForm = true;
                    $timeout(function() { IconService.refresh(); }, 0);
                };

                ctrl.editMetadata = function(meta) {
                    ctrl.isEditMetadata = true;
                    ctrl.metaFormData = angular.copy(meta);
                    ctrl.showMetadataForm = true;
                    $timeout(function() { IconService.refresh(); }, 0);
                };

                ctrl.deleteMetadata = function(meta) {
                    if (confirm('确定要删除元数据 "' + meta.name + '" 吗？')) {
                        var index = ctrl.currentCategory.metadataList.findIndex(function(i) { return i.id === meta.id; });
                        if (index > -1) {
                            ctrl.currentCategory.metadataList.splice(index, 1);
                            ctrl.saveData(); // 立即持久化
                        }
                    }
                };

                ctrl.closeMetadataForm = function() {
                    ctrl.showMetadataForm = false;
                };

                ctrl.saveMetadataForm = function() {
                    if (!ctrl.metaFormData.name) { alert('请输入元数据名称'); return; }
                    if (!ctrl.metaFormData.type) { alert('请选择字段类型'); return; }

                    if (!ctrl.currentCategory.metadataList) {
                        ctrl.currentCategory.metadataList = [];
                    }

                    if (ctrl.isEditMetadata) {
                        var index = ctrl.currentCategory.metadataList.findIndex(function(i) { return i.id === ctrl.metaFormData.id; });
                        if (index > -1) {
                            ctrl.currentCategory.metadataList[index] = angular.copy(ctrl.metaFormData);
                        }
                    } else {
                        ctrl.metaFormData.id = Date.now();
                        ctrl.currentCategory.metadataList.push(angular.copy(ctrl.metaFormData));
                    }
                    
                    ctrl.saveData(); // 持久化更改
                    ctrl.showMetadataForm = false;
                    $timeout(function() { IconService.refresh(); }, 0);
                };
            }]
        });
    </script>
</body>
</html>
