                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">控制标识</label>
                                    <input type="text" ng-value="$ctrl.formData.type.controlFlag || '自动获取'" disabled class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-md cursor-not-allowed">
                                    <p class="text-xs text-slate-400 mt-1">根据选择的敏感类型自动填充</p>
                                </div>
                                <div class="flex items-center pt-2">
                                    <label class="text-sm font-medium text-slate-700 mr-3">是否启用</label>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" ng-model="$ctrl.formData.enabled" class="sr-only peer">
                                        <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                    </label>
                                </div>
                            </div>
                            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                                <button ng-click="$ctrl.closeForm()" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100 transition-colors text-sm font-medium">取消</button>
                                <button ng-click="$ctrl.saveForm()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-sky-800 transition-colors text-sm font-medium">保存</button>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            controller: ['IconService', 'ConfigService', '$timeout', function(IconService, ConfigService, $timeout) {
                var ctrl = this;
                
                // 获取敏感类型选项数据
                ctrl.sensitiveTypes = ConfigService.sensitiveTypes;
                
                var storedContents = localStorage.getItem('oaas_sensitive_contents_v2');
                if (storedContents) {
                    try {
                        ctrl.list = JSON.parse(storedContents);
                    } catch(e) {
                        ctrl.list = [
                            { id: 1, title: '通用敏感内容', content: '（一）涉及我党和国家重大问题、重大政治事件尚未作出结论的、不宜公开的，对社会开放会影响党内团结、党和国家机关工作正常开展的档案；\n（二）涉及各级党和政府领导人及社会各界著名爱国进步人士的政治历史评价及工作与生活中不宜公开的，对社会开放有损个人形象、人格尊严和声誉的档案；\n（三）涉及我党和国家秘密工作的组织关系、工作方法、策略手段、情报来源的，对社会开放会使保护党和国家安全与利益的措施、手段的可靠性降低或者失效的档案；\n（四）涉及我党和国家及其领导人与外国政党组织及其领导人之间秘密关系的，对社会开放会影响两党、两国正常关系以及其他对外关系的档案；\n（五）涉及民国时期敌特机关破坏我党地下组织的，为进行策反纯属捏造的，对社会开放会损害我党和国家及其领导人形象的档案；\n（六）涉及领土、边界中敏感问题和战略部署、国防设施、军事要地、军品贸易、军工科研及生产的，对社会开放不利于维护国家主权和领土完整，危害国家的战略防御能力的档案；\n（七）涉及民族纠纷、民族矛盾和宗教、统战、侨务工作中内定的方针、政策的，对社会开放会影响民族团结、社会稳定和不利于国家统一的档案；\n（八）涉及国内行政区域之间的边界问题，对社会开放后可能激发边界纠纷、影响社会稳定和人民团结的档案；\n（九）涉及准确记载风俗民情，对社会开放后可能资敌军事、经济战略，或损害民族形象的档案；\n（十）涉及我国科学技术的关键技术、技术诀窍、传统工艺、配方、重要资源的，对社会开放会削弱我国经济、科技实力或使国民经济遭受损失的档案；\n（十一）涉及与国外科技交流、经济合作、贸易往来、外事工作中内部掌握的政策、策略及对具体事件的处理意见、方案的，对社会开放会使我国在对外活动中处于不利地位或在政治上造成被动、经济上造成损失的档案；\n（十二）涉及外国在华机构形成的，对社会开放会引起档案所有权纠纷的档案；\n（十三）涉及著作权、发明权、专利权的，对社会开放会造成侵权诉讼并有损国家利益的档案；\n（十四）涉及尚有法律效力的中外产权、债权，对社会开放会引起外事纠纷并有损国家利益的档案；\n（十五）涉及司法、监察、纪检及组织人事工作中对有关人员违纪违法的调查与具体审理情况的，对社会开放会造成不良政治影响或不利于审理人员及举报人等人身安全的档案；\n（十六）涉及公民隐私的，对社会开放会损害公民声誉和权益的档案；\n（十七）涉及台、港、澳同胞和海外华侨中爱国进步人士的，对社会开放会损害其声誉和权益的档案；\n（十八）涉及民国时期军、警、宪、特组织及人员方面的，对社会开放在一定时期内可能对某些方面带来不良影响的档案；\n（十九）机关、单位及个人移交、捐赠、寄存档案时明确提出不能开放的档案；\n（二十）除上述范围外，其他影响党和国家利益的档案。', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '通用敏感规则'; }) || { name: '通用敏感规则', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 2, title: '政治类档案敏感内容', content: '（一）涉及重大政治事件及敏感历史问题的材料\n1、涉及尚未形成统一结论或仍存在争议的重大历史事件\n2、涉及内部研究、讨论重大政治事件定性的内容\n3、涉及可能引发现实误读或争议的历史评价\n（二）涉及党的内部工作及运行机制的材料\n1、涉及党内重要会议讨论过程、不同意见及未公开内容\n2、涉及组织决策形成过程、酝酿情况及内部记录\n3、涉及尚未公开的工作机制、运行规则及具体执行细节\n（三）涉及干部人事及组织处理情况的材料\n1、涉及干部考察、任免、考核评价等具体内容\n2、涉及组织审查、纪律处理、历史问题审定情况\n3、涉及未公开的人事调整方案及酝酿过程\n（四）涉及政治安全与社会稳定的材料\n1、涉及影响国家政治安全的重要情况及研判信息\n2、涉及群体性事件、突发事件的处置过程及细节\n3、涉及维稳部署、应急预案及具体执行措施\n（五）涉及内部信访及举报材料\n1、涉及群众来信来访、举报控告的具体内容\n2、涉及检举揭发材料及相关调查核实过程\n3、涉及尚未核实或已否定但可能造成影响的信息\n（六）涉及意识形态领域敏感内容的材料\n1、涉及内部意识形态工作部署、研判及处置措施\n2、涉及对特定思潮、观点的内部分析及应对策略\n3、涉及未公开的宣传口径及舆论引导方案\n（七）涉及涉外政治关系的材料\n1、涉及对外政策内部讨论、策略及未公开立场\n2、涉及涉外敏感事件处置及沟通情况\n3、涉及国际关系中敏感问题的内部分析与判断\n（八）涉及专案、专项工作及秘密调查的材料\n1、涉及各类专案调查过程、证据材料及结论\n2、涉及专项整治、专项行动的具体部署及实施细节\n3、涉及尚未公开或不宜公开的调查对象及处理情况\n（九）涉及内部统计、分析及研判信息的材料\n1、涉及内部统计数据、分析报告及趋势研判\n2、涉及敏感领域基础数据及其解读\n3、涉及可能被误用或误读的数据性内容\n（十）涉及个人政治历史及评价的材料\n1、涉及个人政治表现、历史问题及组织评价\n2、涉及未经公开的鉴定意见、审查结论\n3、涉及可能影响个人及家庭成员权益的内容\n（十一）涉及特定历史时期形成的敏感材料\n1、涉及历次政治运动中形成的处理、结论及相关记录\n2、涉及特殊历史条件下采取的措施及执行情况\n3、涉及相关人员处理过程及历史背景细节\n（十二）涉及未公开政策及重要文件的材料\n1、涉及尚未公开发布的政策文件及其起草过程\n2、涉及政策调整背景、依据及内部讨论情况\n3、涉及政策执行中的具体操作细节\n（十三）涉及可能引发社会不稳定的材料\n1、涉及可能激化社会矛盾或引发群体性反应的内容\n2、涉及易被曲解、断章取义的敏感信息\n3、涉及可能损害党和国家形象的相关材料\n（十四）其他需要控制开放的政治类档案\n1、依法依规认定为不宜公开的其他政治类材料\n2、经鉴定认为开放后可能产生不良政治影响或社会影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '政治类'; }) || { name: '政治类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 3, title: '民族宗教类档案敏感内容', content: '（一）涉及民族成分及民族关系敏感信息的材料\n1、涉及个人或群体民族成分认定、变更及历史争议的内容\n2、涉及民族矛盾、民族冲突、群体性事件的内容\n3、涉及对特定民族带有歧视性、贬损性或不当评价的内容\n（二）涉及民族地区稳定与安全的材料\n1、涉及民族地区群体性事件处置过程的内容\n2、涉及影响民族团结、社会稳定的敏感情况\n3、涉及民族地区维稳措施、应急处置方案及具体执行细节\n（三）涉及民族政策内部执行情况的材料\n1、涉及民族政策制定、调整的内部讨论及未公开内容\n2、涉及政策执行中的具体问题、偏差及整改情况\n3、涉及未公开的专项工作部署及实施方案\n（四）涉及宗教活动及宗教事务管理的材料\n1、涉及宗教活动场所审批、管理及内部情况的内容\n2、涉及宗教团体内部管理、人员任免及运行情况\n3、涉及非法宗教活动、地下宗教组织及处置情况\n（五）涉及宗教信仰及个人隐私的材料\n1、涉及个人宗教信仰状况、宗教活动参与情况\n2、涉及宗教人士个人背景、社会关系及相关评价\n3、涉及可能影响个人名誉及合法权益的宗教信息\n（六）涉及宗教领域敏感事件的材料\n1、涉及宗教领域群体性事件、冲突及处理过程\n2、涉及境内外宗教势力活动及其影响情况\n3、涉及尚未公开或存在争议的宗教事件定性内容\n（七）涉及民族宗教工作对象信息的材料\n1、涉及重点人员、重点群体名单及相关信息\n2、涉及调查摸底、统计分析等基础性数据\n3、涉及帮扶、管控、教育转化等具体措施及对象情况\n（八）涉及涉外民族宗教事务的材料\n1、涉及与境外宗教组织、民族组织交流合作的具体情况\n2、涉及涉外宗教活动审批、监管及处理情况\n3、涉及国际敏感问题及相关立场、应对措施\n（九）涉及历史遗留民族宗教问题的材料\n1、涉及历史上民族纠纷、宗教冲突及处理结论\n2、涉及尚未彻底解决或存在争议的问题\n3、涉及历史评价可能引发现实影响的内容\n（十）涉及民族宗教领域内部工作机制的材料\n1、涉及内部工作流程、管理制度及运行机制细节\n2、涉及专项行动、整治工作方案及执行细节\n（十一）其他需要控制开放的民族宗教类档案\n1、依法依规认定为不宜公开的其他相关内容\n2、经鉴定认为开放后可能影响民族团结、宗教和谐或社会稳定的材料', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '民族宗教类'; }) || { name: '民族宗教类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 4, title: '涉外类档案敏感内容', content: '（一）涉及国家对外关系与外交事务的材料\n1、涉及对外政策内部研究、讨论及未公开立场的内容\n2、涉及双边、多边关系中的敏感问题及沟通细节\n3、涉及外交谈判过程、策略安排及未公开成果\n（二）涉及涉外谈判与协议的材料\n1、涉及尚未公开或未生效的国际协议、备忘录内容\n2、涉及谈判底线、让步条件及策略性安排\n3、涉及谈判分歧、内部评估及风险研判\n（三）涉及涉外经济与合作项目的材料\n1、涉及重大对外投资、援助项目的内部评估及决策过程\n2、涉及项目实施中的问题、争议及处理情况\n3、涉及未公开的商业条款、技术细节及利益分配\n（四）涉及涉外安全与敏感事务的材料\n1、涉及跨境安全合作、联合行动及具体安排\n2、涉及反恐、反间谍、执法协作等敏感信息\n3、涉及境外突发事件应对及处置细节\n（五）涉及境外组织及人员信息的材料\n1、涉及境外机构、组织内部情况及合作细节\n2、涉及外籍人员身份信息、活动情况及评价\n3、涉及境外重点人员名单及相关情况\n（六）涉及涉外信息报送与内部研判的材料\n1、涉及对外形势分析、国别研究及内部报告\n2、涉及国际舆情分析及应对策略\n3、涉及未公开的情报性、研判性信息\n（七）涉及涉外文化与意识形态交流的材料\n1、涉及对外宣传策略、文化输出安排及具体执行细节\n2、涉及对外舆论引导方案及内部口径\n3、涉及敏感议题的对外表达及应对策略\n（八）涉及涉外纠纷与争议处理的材料\n1、涉及国际争端、法律纠纷及仲裁案件的处理过程\n2、涉及对外索赔、赔偿及责任认定的内容\n3、涉及尚未结案或存在争议的涉外事项\n（九）涉及涉外管理与审批事项的材料\n1、涉及涉外活动审批、监管及内部流程细节\n2、涉及签证、出入境管理及特殊审批情况\n3、涉及涉外单位监管、检查及处理情况\n（十）涉及未公开涉外政策及工作机制的材料\n1、涉及涉外管理制度、工作机制及运行细节\n2、涉及专项涉外工作部署及执行方案\n3、涉及内部协调机制及跨部门协作情况\n（十一）涉及可能影响国家形象及对外关系的材料\n1、涉及可能引发国际误读或外交争议的内容\n2、涉及对外评价不当或敏感表述\n3、涉及可能损害国家利益或国际信誉的材料\n（十二）其他需要控制开放的涉外类档案\n1、依法依规认定为不宜公开的其他涉外内容\n2、经鉴定认为开放后可能对国家利益、对外关系产生不良影响的材料', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '涉外类'; }) || { name: '涉外类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 5, title: '历史类档案敏感内容', content: '（一）涉及重大历史事件敏感评价的材料\n1、涉及尚未形成统一结论或仍存在争议的历史事件评价\n2、涉及对重大历史事件的内部研究、不同观点及讨论过程\n3、涉及可能引发现实误读或争议的历史定性与表述\n（二）涉及历史人物评价及定性的材料\n1、涉及对历史人物未公开或尚未统一口径的评价意见\n2、涉及对相关人员功过是非的内部讨论与结论\n3、涉及可能影响后人名誉或引发社会争议的内容\n（三）涉及历史遗留问题处理的材料\n1、涉及历史问题复查、甄别、平反及处理过程\n2、涉及尚未彻底解决或仍存在争议的历史遗留问题\n3、涉及申诉、复议及相关处理意见\n（四）涉及特定历史时期敏感内容的材料\n1、涉及特殊历史阶段形成的内部处理、整治及政策执行情况\n2、涉及非常时期采取的特殊措施及其具体执行细节\n3、涉及相关人员处理情况及背景细节\n（五）涉及历史档案中个人隐私与名誉的材料\n1、涉及个人家庭出身、社会关系、历史问题等详细情况\n2、涉及未经核实或带有指控性质的信息\n3、涉及可能对个人及其后代产生负面影响的内容\n（六）涉及历史档案中内部决策过程的材料\n1、涉及历史时期重大决策的形成过程及内部讨论\n2、涉及不同意见、争议及未公开的决策依据\n3、涉及尚未公开的会议记录、纪要及相关材料\n（七）涉及历史数据及统计分析的材料\n1、涉及历史时期敏感数据、统计资料及其分析报告\n2、涉及可能被误读或断章取义的数据性内容\n3、涉及未公开或未经权威发布的数据资料\n（八）涉及历史涉外关系与事件的材料\n1、涉及历史上的对外关系、外交活动及内部情况\n2、涉及国际争议、冲突及处理过程的细节\n3、涉及未公开或敏感的历史涉外立场与判断\n（九）涉及历史文化及意识形态敏感内容的材料\n1、涉及特定历史阶段意识形态斗争及相关材料\n2、涉及可能引发现实意识形态争议的内容\n3、涉及未公开的宣传策略及思想引导情况\n（十）涉及档案真实性、完整性存在争议的材料\n1、涉及来源不明、真实性存疑的历史档案\n2、涉及内容不完整、可能引发误解的材料\n3、涉及未经鉴定或尚未形成权威结论的档案\n（十一）涉及尚未解密或达到开放期限的材料\n1、涉及仍在保密期限内的历史档案\n2、涉及虽已解密但尚不具备开放条件的内容\n3、涉及依法应延迟开放的档案\n（十二）涉及可能引发社会不稳定或负面影响的材料\n1、涉及可能激化社会矛盾或引发群体性反应的内容\n2、涉及容易被曲解、误用或断章取义的材料\n3、涉及可能对国家形象或社会认知产生不良影响的内容\n（十三）其他需要控制开放的历史类档案\n1、依法依规认定为不宜公开的其他历史类材料\n2、经鉴定认为开放后可能产生不良社会影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '历史类'; }) || { name: '历史类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 6, title: '国土类档案敏感内容', content: '（一）涉及国土空间敏感信息的材料\n1、涉及未公开的国土空间规划、控制性详细规划及调整方案\n2、涉及重点区域、特殊用途区域的空间布局及功能定位\n3、涉及可能被用于规避监管或不当利用的空间信息\n（二）涉及测绘与地理信息安全的材料\n1、涉及高精度测绘数据、坐标系统及基础地理信息成果\n2、涉及未公开的地形图、地籍图及遥感影像资料\n3、涉及可能影响国家安全或公共安全的地理信息数据\n（三）涉及自然资源储量与分布的材料\n1、涉及矿产资源、能源资源等储量及分布情况\n2、涉及资源勘查成果、评估报告及技术数据\n3、涉及未公开的资源开发潜力及战略储备信息\n（四）涉及土地权属与使用情况的材料\n1、涉及土地权属争议、纠纷处理过程及相关证据\n2、涉及未公开的土地确权、登记及历史沿革信息\n3、涉及可能影响权益或引发纠纷的权属资料\n（五）涉及重大项目用地与规划审批的材料\n1、涉及重大建设项目选址、用地审批及内部评估过程\n2、涉及项目调整、变更及审批争议情况\n3、涉及未公开的项目布局及实施细节\n（六）涉及生态环境敏感区域的材料\n1、涉及生态保护红线、自然保护区核心区域信息\n2、涉及环境敏感点、脆弱区域分布及评估情况\n3、涉及可能被不当利用或破坏的生态资源信息\n（七）涉及国土执法与监管工作的材料\n1、涉及违法用地查处、执法行动及具体过程\n2、涉及执法对象信息、调查取证及处理情况\n3、涉及内部监管机制、检查方案及执行细节\n（八）涉及灾害防治与风险评估的材料\n1、涉及地质灾害隐患点分布及监测数据\n2、涉及灾害风险评估、预警体系及应对措施\n3、涉及可能引发恐慌或被误用的风险信息\n（九）涉及涉外及敏感区域国土信息的材料\n1、涉及边境地区、争议区域的国土信息及相关资料\n2、涉及涉外资源开发、合作项目的具体情况\n3、涉及可能影响国家主权或权益的相关内容\n（十）涉及国土领域内部决策与工作机制的材料\n1、涉及政策制定、规划调整的内部讨论过程\n2、涉及未公开的管理制度、审批流程及运行机制\n3、涉及专项行动、整治工作方案及执行细节\n（十一）涉及数据安全与信息系统的材料\n1、涉及国土信息系统架构、数据库结构及运行情况\n2、涉及数据采集、处理、共享及安全防护措施\n3、涉及可能被用于非法获取或篡改数据的信息\n（十二）涉及可能影响公共利益与社会稳定的材料\n1、涉及可能引发土地纠纷、社会矛盾的内容\n2、涉及敏感区域开发、征收拆迁等相关情况\n3、涉及可能被曲解或误用的信息\n（十三）其他需要控制开放的国土类档案\n1、依法依规认定为不宜公开的其他国土类材料\n2、经鉴定认为开放后可能对资源安全、生态安全或社会稳定产生不良影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '国土类'; }) || { name: '国土类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 7, title: '文化类档案敏感内容', content: '（一）涉及意识形态导向与宣传口径的材料\n1、涉及未公开的宣传策略、舆论引导方案及内部口径\n2、涉及对特定思想文化现象的内部分析、研判及应对措施\n3、涉及可能引发现实意识形态争议的敏感内容\n（二）涉及未公开出版、传播管控内容的材料\n1、涉及出版审查、删改意见及处理过程\n2、涉及被限制传播或下架的作品及原因说明\n3、涉及内部审读、审查机制及具体执行细节\n（三）涉及文化领域敏感事件的材料\n1、涉及文化事件争议、舆情事件及处置过程\n2、涉及对相关人员或作品的处理意见及内部讨论\n3、涉及可能引发社会争议或群体性讨论的内容\n（四）涉及著作权及知识产权敏感信息的材料\n1、涉及未公开的版权归属、授权协议及交易条款\n2、涉及文化产品开发、改编及商业合作细节\n3、涉及可能引发纠纷的权益分配及争议情况\n（五）涉及文化单位内部管理的材料\n1、涉及文化机构内部决策、会议记录及讨论过程\n2、涉及人事安排、评价考核及内部处理情况\n3、涉及未公开的运营策略及发展规划\n（六）涉及民族、宗教、地域文化敏感内容的材料\n1、涉及可能引发民族、宗教或地域争议的文化表达\n2、涉及对特定群体带有争议性的评价或描述\n3、涉及敏感题材创作及其内部讨论情况\n（七）涉及文物与文化资源安全的材料\n1、涉及重要文物具体存放位置、安防措施等信息\n2、涉及未公开的考古发掘地点、进展及成果细节\n3、涉及文化遗产保护中的薄弱环节或风险点\n（八）涉及涉外文化交流敏感内容的材料\n1、涉及对外文化交流中的内部策略、合作细节\n2、涉及国际文化争议、版权纠纷及处理过程\n3、涉及未公开的对外文化传播安排\n（九）涉及个人名誉与隐私的文化类材料\n1、涉及文艺工作者、研究人员的负面评价或争议信息\n2、涉及未经核实的传闻性、评价性内容\n3、涉及可能对个人及相关群体造成不良影响的内容\n（十）其他不宜开放的文化类档案\n1、依法依规认定不宜公开的相关材料\n2、经鉴定认为开放后可能引发较大社会争议或不良舆情的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '文化类'; }) || { name: '文化类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 8, title: '军事类档案敏感内容', content: '（一）涉及作战行动与军事部署的敏感材料\n1、涉及作战计划、战役部署、行动方案及作战指令的内容\n2、涉及部队调动、兵力部署、机动路线及战备调整的内容\n3、涉及军事演习中真实战术运用、作战方法及评估分析的内容\n4、涉及作战行动总结、战损情况及作战能力评估的内容\n（二）涉及武器装备与军事技术的材料\n1、涉及武器装备设计原理、结构图纸及技术参数的内容\n2、涉及新型装备研发过程、试验数据及阶段性成果的内容\n3、涉及军工科研项目核心技术、关键工艺及制造方法的内容\n4、涉及武器系统性能评估、测试结果及改进方案的内容\n5、涉及电子战、导弹、无人系统等关键军事技术细节\n（三）涉及军事情报与侦察反侦察的材料\n1、涉及情报来源渠道、获取方式及运作机制的内容\n2、涉及情报分析方法、模型体系及研判流程的内容\n3、涉及侦察监视系统部署、能力范围及运行机制的内容\n4、涉及密码通信、破译技术及加密体系相关内容\n5、涉及反情报、反间谍及安全防护体系的具体措施\n（四）涉及指挥通信与信息系统的材料\n1、涉及军事指挥控制体系架构及运行机制的内容\n2、涉及通信网络结构、节点布局及运行保障体系的内容\n3、涉及加密通信协议、密钥管理及信息安全机制的内容\n4、涉及战场信息系统、数据链系统及协同指挥机制的内容\n5、涉及应急通信保障方案及战时通信组织方式的内容\n（五）涉及军事人员与组织编制的材料\n1、涉及现役部队编制结构、单位序列及组织体系的内容\n2、涉及特殊作战力量、重点军事单位及其职能配置的内容\n3、涉及军官名册、关键岗位人员及其职责分布的内容\n4、涉及军事科研、技术骨干人员身份及组织关系的内容\n5、涉及训练体系、战术教育及能力建设相关数据\n（六）涉及军事设施与战略布局的材料\n1、涉及军事基地、机场、港口及后勤保障设施布局的内容\n2、涉及战略导弹阵地、雷达站及防空体系部署信息的内容\n3、涉及军事仓储体系、物资储备及保障能力配置的内容\n4、涉及军事交通网络、战略通道及调度体系的内容\n5、涉及战区划分、防御体系及区域部署结构的内容\n（七）涉及未公开军事活动与动态任务的材料\n1、涉及正在执行或尚未完成的军事任务及行动内容\n2、涉及未公开军事演习全过程及内部评估材料\n3、涉及仍处于保密期的历史军事活动档案\n4、涉及突发军事行动、应急响应及处置过程的内容\n5、涉及未公开的跨区域军事协同与联合作战活动\n（八）涉及涉外军事事务与国际军事关系的材料\n1、涉及军事合作协议、技术交流及联合行动细节的内容\n2、涉及涉外军事演习组织、实施及评估情况的内容\n3、涉及军事技术引进、输出及限制性合作的内容\n4、涉及与境外军事机构交流、沟通及协作的具体情况\n5、涉及国际军事冲突相关立场、应对策略及内部研判\n（九）涉及历史军事事件与遗留问题的材料\n1、涉及历史战役、军事行动及未完全解密档案的内容\n2、涉及军事冲突、战争事件及处理结论的内容\n3、涉及历史军事决策过程及未公开评价材料\n4、涉及仍存在争议或可能影响现实判断的历史军事信息\n5、涉及军事失败、事故及重大事件内部总结材料\n（十）涉及军事管理制度与运行机制的材料\n1、涉及内部军事管理制度、运行规则及组织机制细节\n2、涉及军事改革方案、调整过程及未公开讨论内容\n3、涉及专项军事整顿、行动方案及执行过程细节\n4、涉及军事安全保密制度及内部控制机制具体内容\n5、涉及战备管理体系及运行保障机制细节\n（十一）其他需要控制开放的军事类档案\n1、依法依规认定为涉及国家安全、国防利益的不宜公开内容\n2、经鉴定认为公开后可能泄露军事能力、作战体系或安全布局的内容\n3、涉及国家防御能力评估及敏感战略信息的其他材料\n4、涉及尚未解密或明确规定保密期限未到期的军事档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '军事类'; }) || { name: '军事类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 9, title: '经济类档案敏感内容', content: '（一）涉及国家宏观经济决策与调控的敏感材料\n1、涉及宏观经济政策制定、调整及内部论证过程的内容\n2、涉及财政政策、货币政策、产业政策的内部讨论及未公开方案\n3、涉及经济运行分析、预测模型及敏感研判结论的内容\n4、涉及重大经济决策前的论证材料、会议纪要及分歧意见\n（二）涉及财政收支与国有资产管理的材料\n1、涉及财政预算编制、执行情况及内部调整细节的内容\n2、涉及国有资产配置、处置、重组及评估的敏感信息\n3、涉及专项资金、转移支付及重点项目资金使用明细\n4、涉及尚未公开的审计结果、整改意见及风险评估报告\n（三）涉及金融市场与金融监管的材料\n1、涉及金融监管政策制定、内部研究及风险预警内容\n2、涉及银行、证券、保险等金融机构内部经营数据与风险状况\n3、涉及金融市场异常波动分析及处置措施的内部记录\n4、涉及货币发行、流动性调控及金融稳定措施细节\n（四）涉及企业经营与商业秘密的材料\n1、涉及企业核心经营数据、财务报表及盈利结构的内容\n2、涉及企业战略规划、市场布局及竞争策略的敏感信息\n3、涉及商业合同、合作协议中未公开的关键条款\n4、涉及企业技术秘密、工艺流程及核心竞争力相关内容\n（五）涉及重大项目投资与基础设施建设的材料\n1、涉及重大工程项目立项论证、投资决策及内部评估材料\n2、涉及基础设施建设资金来源、成本结构及收益测算\n3、涉及PPP项目、政府投资项目的详细运作机制\n4、涉及未公开的项目风险评估及审查意见\n（六）涉及对外经济贸易与涉外经济合作的材料\n1、涉及贸易谈判、关税调整及协议磋商的内部过程\n2、涉及进出口管制、配额管理及敏感商品流通信息\n3、涉及涉外投资合作、跨境并购及资本流动细节\n4、涉及国际经济制裁应对措施及内部策略分析\n（七）涉及价格体系与市场调控的材料\n1、涉及重要商品、能源、粮食等价格调控机制的内部资料\n2、涉及价格形成机制分析及调控措施细节\n3、涉及市场异常价格波动的研判与干预方案\n4、涉及未公开的价格监测数据及预警信息\n（八）涉及统计数据与经济运行基础数据的材料\n1、涉及尚未公开的经济统计原始数据及分项数据\n2、涉及区域经济运行详细数据及对比分析结果\n3、涉及行业运行监测数据及敏感指标变化情况\n4、涉及可能影响市场预期的未发布统计信息\n（九）涉及金融风险与经济安全的材料\n1、涉及系统性金融风险评估及预警机制细节\n2、涉及债务风险、地方政府隐性债务相关敏感信息\n3、涉及重大经济风险事件处置过程及内部研判\n4、涉及经济安全战略、应急预案及防控机制\n（十）涉及历史经济事件与政策调整过程的材料\n1、涉及重大经济改革决策过程及内部争论材料\n2、涉及历史性经济危机、调整政策的未解密档案\n3、涉及对现行政策仍可能产生影响的历史经济数据\n4、涉及尚未公开的经济政策评估与修正记录\n（十一）其他需要控制开放的经济类档案\n1、依法认定可能影响经济安全、市场秩序或金融稳定的内容\n2、涉及国家经济战略、产业安全及核心竞争力的敏感信息\n3、经鉴定认为公开后可能引发市场波动或不当预期的材料\n4、涉及尚未解密或明确规定保密期限未到期的经济档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '经济类'; }) || { name: '经济类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 10, title: '国家安全类档案敏感内容', content: '（一）涉及国家安全战略与总体布局的敏感材料\n1、涉及国家安全战略规划、顶层设计及内部论证过程的内容\n2、涉及国家安全形势研判、风险评估及战略判断的内部材料\n3、涉及国家安全重大决策形成过程及分歧意见的内容\n4、涉及总体安全观落实路径及内部实施方案\n（二）涉及国家安全体制机制与运行体系的材料\n1、涉及国家安全工作机构设置、职责分工及运行机制细节\n2、涉及国家安全协调机制、联动机制及工作流程的内容\n3、涉及安全治理体系、风险防控体系的内部设计方案\n4、涉及专项安全行动组织方式及内部工作机制\n（三）涉及情报信息与反情报体系的材料\n1、涉及国家情报来源渠道、获取方式及运作机制的内容\n2、涉及情报分析研判模型、流程及内部方法体系\n3、涉及反间谍、反渗透、反颠覆等工作机制及实施细节\n4、涉及情报人员组织结构、协作关系及身份信息\n（四）涉及关键基础设施与安全保障体系的材料\n1、涉及能源、交通、通信、水利等关键基础设施安全防护方案\n2、涉及关键信息基础设施（CII）网络结构及安全防护体系\n3、涉及数据安全体系、网络安全防护架构及运行机制\n4、涉及国家重要系统的灾备体系及应急恢复机制\n（五）涉及网络安全与信息安全的材料\n1、涉及网络攻击防御技术、监测体系及处置机制的内容\n2、涉及网络安全事件应急响应流程及处置记录\n3、涉及密码技术、加密体系及密钥管理机制的内容\n4、涉及重大网络安全漏洞、风险评估及修复方案\n（六）涉及公共安全与社会稳定的材料\n1、涉及重大突发事件、群体性事件处置过程及内部研判\n2、涉及公共安全风险预警机制及应急预案细节\n3、涉及社会治理中重点风险区域、重点问题分析材料\n4、涉及可能引发社会不稳定的风险评估与控制方案\n（七）涉及反恐怖主义与极端主义防控的材料\n1、涉及反恐行动部署、处置过程及技术手段的内容\n2、涉及恐怖活动预警信息、监测机制及研判模型\n3、涉及极端主义防控措施及内部工作机制\n4、涉及涉恐案件侦查过程及证据链分析材料\n（八）涉及国土安全与边境管理的材料\n1、涉及边境管控体系、巡逻机制及防控部署的内容\n2、涉及海关安全监管、出入境管理及风险控制措施\n3、涉及领土安全风险评估及敏感区域防护方案\n4、涉及边境突发事件处置过程及应对机制\n（九）涉及涉外安全与国际安全合作的材料\n1、涉及国际安全合作机制、交流内容及内部评估材料\n2、涉及对外安全风险分析及应对策略的内部研判\n3、涉及跨境安全事件处置及协调机制细节\n4、涉及与境外机构合作中的敏感安全信息\n（十）涉及生物、科技与新型安全领域的材料\n1、涉及生物安全风险评估及防控体系的内容\n2、涉及人工智能、量子技术等新兴领域安全评估材料\n3、涉及重大科技成果转化中的安全风险控制机制\n4、涉及关键核心技术安全保护策略及内部方案\n（十一）涉及国家安全事件与历史案例的材料\n1、涉及重大国家安全事件调查、处置及结论性材料\n2、涉及历史安全事故、危机事件的未公开档案\n3、涉及仍在影响现实安全判断的历史分析材料\n4、涉及尚未解密或存在争议的国家安全事件记录\n（十二）其他需要控制开放的国家安全类档案\n1、依法认定可能危害国家安全、利益或社会稳定的内容\n2、涉及国家安全能力体系、运行机制及核心能力暴露风险内容\n3、经鉴定认为公开后可能引发安全风险或被利用的材料\n4、涉及尚未解密或保密期限未届满的国家安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '国家安全类'; }) || { name: '国家安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 11, title: '干部人事类档案敏感内容', content: '（一）涉及干部个人基本信息与隐私的敏感材料\n1、涉及干部身份证明、家庭成员、社会关系及背景情况的详细信息\n2、涉及个人住址、联系方式、健康状况及其他隐私性内容\n3、涉及婚姻状况、家庭变动及私密生活相关记录\n4、涉及可能影响个人名誉或合法权益的内部评价材料\n（二）涉及干部任免、考核与评价的材料\n1、涉及干部任免、调动、晋升等尚未公开或内部决策过程的材料\n2、涉及干部考核结果、测评数据及内部评价意见\n3、涉及组织考察材料、推荐意见及不同意见记录\n4、涉及干部选拔任用过程中的讨论、比较及未定结论内容\n（三）涉及干部监督、审查与问责的材料\n1、涉及干部纪律审查、调查核实及处理过程的内部材料\n2、涉及违纪违法问题线索、调查取证及阶段性结论\n3、涉及组织处理、处分决定及执行过程的敏感内容\n4、涉及尚未公开的监督检查报告及整改情况\n（四）涉及重点干部与特殊岗位人员信息的材料\n1、涉及领导干部、关键岗位干部的详细履职情况\n2、涉及涉密岗位人员、特殊系统干部的身份及职责信息\n3、涉及后备干部名单、培养计划及梯队建设信息\n4、涉及重点保护对象或敏感岗位人员的组织关系信息\n（五）涉及干部档案管理与组织工作机制的材料\n1、涉及干部档案审核、整理、管理流程及内部规范\n2、涉及干部选拔任用制度、操作流程及执行细节\n3、涉及组织人事部门内部工作机制及操作办法\n4、涉及干部管理系统、信息平台及数据结构细节\n（六）涉及干部交流、挂职与境外经历的材料\n1、涉及干部跨地区、跨部门交流及任职安排的内部信息\n2、涉及挂职锻炼、专项任务及履职过程的详细记录\n3、涉及涉外培训、境外学习及交流活动的敏感信息\n4、涉及境外经历背景核查及评价材料\n（七）涉及干部薪酬、待遇与福利的材料\n1、涉及干部工资、津贴、补贴及福利待遇的具体标准\n2、涉及特殊待遇、保障政策及执行细则\n3、涉及内部薪酬结构调整及分配机制\n4、涉及可能影响公平性的待遇差异数据\n（八）涉及干部人事历史遗留问题的材料\n1、涉及历史干部调整、平反、处理及复核过程材料\n2、涉及历史遗留人事问题的调查结论及内部意见\n3、涉及对现行组织关系可能产生影响的历史档案\n4、涉及尚未完全澄清或存在争议的人事记录\n（九）涉及干部信息系统与数据安全的材料\n1、涉及干部信息管理系统结构、权限设计及运行机制\n2、涉及干部数据库字段结构及敏感数据存储方式\n3、涉及信息系统安全策略、访问控制及日志机制\n4、涉及数据接口、交换机制及安全防护措施\n（十）其他需要控制开放的干部人事类档案\n1、依法依规认定可能影响组织管理秩序或干部合法权益的内容\n2、涉及组织人事工作内部规则、策略及未公开制度文件\n3、经鉴定认为公开后可能引发不当解读或社会影响的材料\n4、涉及尚未解密或明确规定保密期限未届满的人事档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '干部人事类'; }) || { name: '干部人事类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 12, title: '司法执法类档案敏感内容', content: '（一）涉及案件侦查与调查过程的敏感材料\n1、涉及刑事、行政案件侦查、调查、取证全过程的内部材料\n2、涉及案件线索来源、侦查手段及技术措施的内容\n3、涉及尚未侦破案件的调查进展及分析研判材料\n4、涉及跨部门联合调查、协作机制及具体执行细节\n（二）涉及证据材料与取证技术的内容\n1、涉及证据收集、固定、鉴定及分析全过程材料\n2、涉及物证、书证、电子数据等证据的提取与技术方法\n3、涉及技术侦查措施（监听、监控、追踪等）的实施细节\n4、涉及鉴定机构、鉴定方法及鉴定过程的技术信息\n（三）涉及案件审理与司法裁判内部过程的材料\n1、涉及法院内部合议、讨论及裁判形成过程的材料\n2、涉及尚未公开判决案件的审理过程及争议意见\n3、涉及检察机关审查起诉阶段的内部审查意见\n4、涉及司法机关内部法律适用分析及分歧讨论内容\n（四）涉及执法行动与执法部署的材料\n1、涉及公安、司法行政等部门执法行动部署及实施方案\n2、涉及突发事件处置、应急执法及现场指挥调度内容\n3、涉及专项执法行动（如扫黑除恶等）内部计划与执行细节\n4、涉及执法协作机制及跨区域联合执法过程材料\n（五）涉及涉案人员与相关主体隐私的材料\n1、涉及犯罪嫌疑人、被告人、受害人及证人个人信息\n2、涉及涉案人员家庭情况、社会关系及隐私信息\n3、涉及未成年人涉案信息及保护性措施相关内容\n4、涉及可能影响当事人名誉、隐私及合法权益的材料\n（六）涉及司法技术与执法能力的材料\n1、涉及执法技术手段（如大数据侦查、人工智能辅助办案）\n2、涉及司法鉴定技术方法及核心技术参数\n3、涉及执法装备性能、使用方式及能力边界\n4、涉及执法信息系统结构、权限及安全机制\n（七）涉及未结案件与敏感案件的材料\n1、涉及正在审理或尚未作出终审裁判的案件材料\n2、涉及重大、复杂或社会影响较大的未决案件信息\n3、涉及可能引发社会关注或舆情风险的案件细节\n4、涉及再审、复核及申诉过程中的内部审查材料\n（八）涉及司法监督与内部管理的材料\n1、涉及司法机关内部监督检查、审务督察及整改材料\n2、涉及执法质量评估、内部问责及处理过程\n3、涉及司法人员纪律审查及内部调查材料\n4、涉及内部考核体系及评价机制细节\n（九）涉及跨境司法与国际执法合作的材料\n1、涉及国际司法协助、引渡及跨境执法合作细节\n2、涉及境外案件调查协作及信息交换内容\n3、涉及涉外司法谈判、协商及内部立场材料\n4、涉及国际敏感案件的处置策略及内部研判\n（十）涉及历史司法案件与未解密档案的材料\n1、涉及历史重大案件未公开审理或未完全解密材料\n2、涉及冤错案件调查、复核及内部评估过程\n3、涉及历史执法方式、制度调整及内部总结材料\n4、涉及仍可能影响现实司法判断的历史案件信息\n（十一）其他需要控制开放的司法执法类档案\n1、依法认定可能影响司法公正、执法安全或社会稳定的内容\n2、涉及执法能力边界、技术手段及行动模式暴露风险内容\n3、经鉴定认为公开后可能影响案件公正审理的材料\n4、涉及尚未解密或明确规定保密期限未届满的司法档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '司法执法类'; }) || { name: '司法执法类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 13, title: '纪检监察类档案敏感内容', content: '（一）涉及线索受理与初核阶段的敏感材料\n1、涉及问题线索来源、举报渠道及受理过程的内容\n2、涉及初步核查、函询、谈话等前期调查材料\n3、涉及尚未查实或正在核实中的问题线索信息\n4、涉及线索分流、处置意见及内部研判过程\n（二）涉及纪律审查与监察调查全过程材料\n1、涉及立案审查调查的过程记录及工作方案\n2、涉及调查取证、谈话笔录及内部调查材料\n3、涉及审查调查进展情况及阶段性结论\n4、涉及跨部门协作调查及联合处置机制细节\n（三）涉及涉案人员身份及个人敏感信息\n1、涉及被审查调查对象的详细身份信息及社会关系\n2、涉及涉案人员家庭情况、财产状况及隐私信息\n3、涉及证人、证言提供者及相关人员身份保护信息\n4、涉及可能影响个人名誉、隐私及合法权益的内容\n（四）涉及处分决定与组织处理过程的材料\n1、涉及纪律处分、组织处理的讨论过程及形成意见\n2、涉及处分建议、审议记录及内部不同意见\n3、涉及尚未正式公布的处理决定及执行过程\n4、涉及处分执行后的跟踪情况及内部评估材料\n（五）涉及反腐败专项工作与行动部署的材料\n1、涉及专项监督检查、巡视巡察的具体部署方案\n2、涉及反腐败专项行动的组织方式及执行细节\n3、涉及重点领域监督检查计划及内部工作安排\n4、涉及问题整改方案及督办落实过程材料\n（六）涉及巡视巡察与监督检查过程材料\n1、涉及巡视巡察工作方案、路线安排及内部部署\n2、涉及巡视发现问题的原始材料及分析报告\n3、涉及整改建议、反馈意见及内部沟通记录\n4、涉及尚未公开的巡视成果及阶段性结论\n（七）涉及干部监督与政治生态分析材料\n1、涉及干部廉政情况评估及内部监督报告\n2、涉及政治生态研判、风险分析及内部判断\n3、涉及干部监督管理中的重点关注对象信息\n4、涉及内部廉政档案及动态监督数据\n（八）涉及案件审理与内部审议过程材料\n1、涉及纪检监察机关案件审理委员会讨论记录\n2、涉及案件定性、量纪过程中的内部意见分歧\n3、涉及复核、复审及再审议过程材料\n4、涉及尚未最终定论案件的审理意见\n（九）涉及技术调查与监察手段的材料\n1、涉及电子数据取证、数据分析及技术调查方法\n2、涉及监控、追踪、信息分析等监察技术手段细节\n3、涉及监察信息系统结构、权限及运行机制\n4、涉及调查技术能力及方法体系的具体内容\n（十）涉及涉外纪检监察与国际合作材料\n1、涉及国际反腐败合作机制及内部协作内容\n2、涉及跨境追逃追赃、国际协查过程及策略\n3、涉及境外调查协作及信息交换细节\n4、涉及涉外案件研判及内部处置方案\n（十一）涉及历史案件与未解密纪检档案\n1、涉及历史重大违纪违法案件调查全过程材料\n2、涉及尚未公开或仍在复核的历史案件档案\n3、涉及案件复盘分析及内部总结材料\n4、涉及可能影响现实判断的历史监督信息\n（十二）其他需要控制开放的纪检监察类档案\n1、依法依规认定可能影响执纪安全、监督权威或社会稳定的内容\n2、涉及纪检监察工作机制、策略及未公开制度文件\n3、经鉴定认为公开后可能影响案件公正性或监督效果的材料\n4、涉及尚未解密或保密期限未届满的纪检监察档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '纪检监察类'; }) || { name: '纪检监察类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 14, title: '科技类档案敏感内容', content: '（一）涉及核心技术与关键科技能力的敏感材料\n1、涉及国家或行业核心技术原理、关键算法及实现路径的内容\n2、涉及高端制造、先进材料、精密工艺等关键技术细节\n3、涉及尚未公开或仍处于研发阶段的核心技术方案\n4、涉及技术性能极限参数及能力边界的测试数据\n（二）涉及科研项目研发全过程的材料\n1、涉及重大科研项目立项论证、技术路线选择及内部评审材料\n2、涉及科研过程中的实验记录、阶段性成果及失败数据\n3、涉及科研攻关中的关键突破路径及技术细节\n4、涉及项目验收评估、内部质询及争议性结论\n（三）涉及国家战略科技力量与布局的材料\n1、涉及国家重点实验室、科研机构的核心能力配置\n2、涉及科研资源布局、科研方向规划及内部战略设计\n3、涉及重大科技专项组织方式及任务分配机制\n4、涉及科研体系梯队建设及核心人才结构信息\n（四）涉及前沿科技与新兴技术安全的材料\n1、涉及人工智能、量子信息、生物技术等前沿领域核心方法\n2、涉及可能影响国家安全的新兴技术应用方案\n3、涉及技术融合路径及系统级架构设计\n4、涉及技术风险评估及安全边界分析\n（五）涉及军民融合与敏感技术转化的材料\n1、涉及军民两用技术转化路径及应用场景细节\n2、涉及军用技术向民用转化过程中的核心参数\n3、涉及敏感技术产业化方案及实施路径\n4、涉及技术扩散风险评估及控制措施\n（六）涉及知识产权与核心商业技术的材料\n1、涉及核心专利、专有技术及技术秘密的详细内容\n2、涉及企业或科研机构核心竞争力技术体系\n3、涉及技术授权、转让及合作中的关键条款\n4、涉及商业技术竞争策略及技术壁垒构建方式\n（七）涉及实验数据与技术测试结果的材料\n1、涉及关键实验原始数据及完整实验过程记录\n2、涉及性能测试结果、对比分析及评估报告\n3、涉及失败实验数据及技术改进路径\n4、涉及敏感设备测试方法及技术验证过程\n（八）涉及科研合作与涉外科技交流的材料\n1、涉及国际科研合作项目的内部协议及技术分工\n2、涉及涉外技术交流中的核心技术信息共享内容\n3、涉及跨国科研合作中的技术限制条款\n4、涉及技术引进、消化吸收及再创新过程细节\n（九）涉及科研人员与组织体系的材料\n1、涉及科研团队结构、核心成员及分工细节\n2、涉及关键科研人员的技术贡献及能力评估\n3、涉及科研组织内部管理机制及运行规则\n4、涉及人才梯队建设及培养体系细节\n（十）涉及科技风险与安全评估的材料\n1、涉及技术应用可能带来的安全风险评估报告\n2、涉及科技伦理审查、风险控制及合规性分析\n3、涉及重大科技系统安全漏洞及防护方案\n4、涉及技术滥用风险及防控机制\n（十一）涉及历史科研成果与未解密档案的材料\n1、涉及历史重大科研突破的未公开技术细节\n2、涉及仍处于保密期的科研项目档案\n3、涉及科技发展过程中的关键技术演进路径\n4、涉及尚未解密或仍受保护的科研成果资料\n（十二）其他需要控制开放的科技类档案\n1、依法认定可能影响国家科技安全或核心竞争力的内容\n2、涉及关键技术体系、能力结构及实现路径暴露风险内容\n3、经鉴定认为公开后可能导致技术泄露或被逆向利用的材料\n4、涉及尚未解密或保密期限未届满的科技档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '科技类'; }) || { name: '科技类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 15, title: '公共安全类档案敏感内容', content: '（一）涉及公共安全风险监测与预警的敏感材料\n1、涉及公共安全风险监测体系、指标模型及预警机制细节\n2、涉及风险评估结果、研判结论及内部预警信息\n3、涉及重大风险隐患排查、识别及处置建议的内容\n4、涉及尚未公开的安全风险等级划分及调整依据\n（二）涉及突发事件与应急处置全过程的材料\n1、涉及自然灾害、事故灾难等突发事件处置全过程记录\n2、涉及应急指挥调度、资源调配及现场决策过程\n3、涉及应急响应方案、行动路线及执行细节\n4、涉及事件初期研判、信息报送及内部沟通记录\n（三）涉及社会治安与重点领域治理的材料\n1、涉及社会治安防控体系、布控机制及运行方式\n2、涉及重点区域、重点行业治安治理措施及内部部署\n3、涉及治安形势分析、研判报告及敏感统计数据\n4、涉及未公开的专项整治行动方案及执行细节\n（四）涉及重大事故与安全事件调查的材料\n1、涉及生产安全事故、交通事故等调查全过程材料\n2、涉及事故原因分析、责任认定及内部技术鉴定\n3、涉及事故处置过程、救援指挥及应急措施细节\n4、涉及尚未公开或未最终定论的事故调查报告\n（五）涉及公共安全防控体系与运行机制的材料\n1、涉及公共安全管理体系架构及运行机制细节\n2、涉及跨部门协同防控机制及工作流程\n3、涉及安全监管制度设计及内部执行标准\n4、涉及风险防控策略及内部控制方案\n（六）涉及重点人群与重点场所管理的材料\n1、涉及重点人群分类管理、动态监测及评估信息\n2、涉及重点场所（大型活动、交通枢纽等）安全布控方案\n3、涉及敏感区域安全防护措施及运行机制\n4、涉及治安重点对象的内部管理及监测记录\n（七）涉及公共安全技术与监测系统的材料\n1、涉及视频监控、传感器网络及公共安全监测系统结构\n2、涉及大数据分析、AI预警模型及技术实现细节\n3、涉及安全指挥平台、数据接口及运行机制\n4、涉及系统漏洞、应急备份及安全防护措施\n（八）涉及反恐维稳与特殊安全行动的材料\n1、涉及反恐行动部署、策略及执行过程细节\n2、涉及维稳行动方案及内部指挥调度记录\n3、涉及特殊安全任务执行过程及阶段性总结\n4、涉及风险人员、风险事件的内部处置机制\n（九）涉及涉外公共安全与跨境协作的材料\n1、涉及跨境安全合作、信息共享及联合行动细节\n2、涉及境外安全风险输入研判及应对措施\n3、涉及国际公共安全事件协调与处置过程\n4、涉及涉外安全机制及内部沟通内容\n（十）涉及历史公共安全事件与未解密档案的材料\n1、涉及重大历史公共安全事件全过程档案\n2、涉及未公开或仍在评估的安全事件调查材料\n3、涉及历史安全制度演变及内部总结分析\n4、涉及可能影响现实安全判断的历史风险信息\n（十一）其他需要控制开放的公共安全类档案\n1、依法认定可能影响公共安全、社会秩序或应急能力的内容\n2、涉及安全防控能力、体系结构及运行机制暴露风险内容\n3、经鉴定认为公开后可能引发社会恐慌或误判的材料\n4、涉及尚未解密或保密期限未届满的公共安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '公共安全类'; }) || { name: '公共安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 16, title: '个人信息类档案敏感内容', content: '（一）涉及身份识别与敏感标识信息的材料\n1、涉及身份证号、护照号、社保号等唯一身份识别信息\n2、涉及个人生物识别信息（指纹、虹膜、人脸特征等）\n3、涉及精确住址、定位轨迹及出行记录\n4、涉及联系方式（电话、邮箱等）在非授权范围内的完整信息\n（二）涉及个人隐私与生活信息的材料\n1、涉及个人婚姻状况、家庭关系及亲属信息\n2、涉及个人健康状况、病史及体检结果等医疗信息\n3、涉及财产状况、收入水平及资产明细\n4、涉及个人消费行为、生活习惯及日常活动记录\n（三）涉及未成年人及特殊群体信息的材料\n1、涉及未成年人身份信息、学习生活及成长记录\n2、涉及特殊保护群体（如残障人士）详细个人信息\n3、涉及社会救助对象、帮扶对象的详细情况\n4、涉及可能影响弱势群体权益的敏感数据\n（四）涉及个人信用与社会评价的材料\n1、涉及个人信用记录、信用评分及评估报告\n2、涉及社会评价、内部测评及行为评价信息\n3、涉及征信系统中未公开的个人数据\n4、涉及影响个人声誉的内部评价材料\n（五）涉及职业经历与组织关系的材料\n1、涉及个人详细工作履历及岗位变动记录\n2、涉及组织内部考核评价及绩效记录\n3、涉及内部培训、晋升及任职过程材料\n4、涉及敏感行业或岗位的工作内容细节\n（六）涉及个人敏感行为与事件记录的材料\n1、涉及个人违法违规记录及调查处理情况（未公开部分）\n2、涉及个人参与敏感事件的记录及关联信息\n3、涉及个人在执法、司法或行政处理中形成的详细记录\n4、涉及可能引发社会歧视或不当解读的行为记录\n（七）涉及通信与数字行为数据的材料\n1、涉及通信记录（通话、短信、即时通信内容）\n2、涉及网络行为日志、浏览记录及平台使用数据\n3、涉及电子邮件、社交媒体账号的非公开内容\n4、涉及数字身份行为画像及分析结果\n（八）涉及个人心理与行为分析的材料\n1、涉及心理测评结果及心理健康评估报告\n2、涉及行为分析模型输出及风险判断结果\n3、涉及个人性格、倾向及敏感行为特征分析\n4、涉及可能影响个人名誉的内部心理评估\n（九）涉及跨境与特殊背景信息的材料\n1、涉及出入境记录及跨境活动详细信息\n2、涉及境外学习、工作及生活的详细记录\n3、涉及涉外背景调查及评估材料\n4、涉及可能影响国家安全或个人安全的跨境数据\n（十）其他需要控制开放的个人信息类档案\n1、依法认定可能侵害个人隐私权、名誉权或合法权益的内容\n2、涉及敏感个人数据集合、画像及关联分析结果\n3、经鉴定认为公开后可能被滥用或造成风险的数据\n4、涉及尚未脱敏或不符合公开标准的个人信息档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '个人信息类'; }) || { name: '个人信息类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 17, title: '数据安全类档案敏感内容', content: '（一）涉及重要数据与敏感数据资源的材料\n1、涉及国家重要数据资源目录、分级分类及管理规则的内容\n2、涉及重要数据采集范围、字段结构及数据标准的详细信息\n3、涉及高价值敏感数据资源的分布、规模及存储情况\n4、涉及未公开的数据资源整合、治理及共享方案\n（二）涉及数据安全治理体系与制度机制的材料\n1、涉及数据安全管理制度、标准体系及实施细则\n2、涉及数据分级分类方法、判定规则及技术标准\n3、涉及数据安全治理架构及运行机制设计\n4、涉及数据安全责任体系及内部管理流程\n（三）涉及数据流通与共享机制的材料\n1、涉及跨部门、跨行业数据共享机制及技术实现方式\n2、涉及数据交换平台架构、接口设计及运行规则\n3、涉及数据流通路径、流转规则及控制机制细节\n4、涉及敏感数据共享审批流程及内部控制措施\n（四）涉及数据存储与基础设施安全的材料\n1、涉及数据中心布局、架构设计及运行机制\n2、涉及云平台架构、资源调度及安全防护体系\n3、涉及数据备份、灾备体系及恢复机制细节\n4、涉及存储加密方式、密钥管理及安全策略\n（五）涉及数据处理与分析能力的材料\n1、涉及大数据分析模型、算法体系及实现路径\n2、涉及人工智能数据处理流程及模型结构\n3、涉及数据挖掘方法及核心分析能力细节\n4、涉及数据处理性能指标及能力边界\n（六）涉及个人信息与隐私数据处理的材料\n1、涉及个人信息处理流程、脱敏规则及技术方案\n2、涉及用户画像、行为分析及数据建模结果\n3、涉及敏感个人数据处理机制及权限控制体系\n4、涉及隐私计算、联邦学习等关键技术实现细节\n（七）涉及行业敏感数据与商业数据的材料\n1、涉及金融、医疗、能源、交通等行业核心数据结构\n2、涉及企业经营数据、交易数据及运营分析结果\n3、涉及行业数据共享机制及商业化使用路径\n4、涉及数据资产评估及数据要素定价机制\n（八）涉及网络与系统数据安全的材料\n1、涉及数据安全防护系统架构及技术实现细节\n2、涉及网络安全监测数据及攻击防御分析结果\n3、涉及日志系统、审计机制及行为追踪规则\n4、涉及安全漏洞、风险事件及处置过程数据\n（九）涉及跨境数据流动与国际合作的材料\n1、涉及跨境数据传输规则及审批机制\n2、涉及国际数据合作协议及技术实现细节\n3、涉及数据出境安全评估及风险控制措施\n4、涉及境外数据流动路径及监管策略\n（十）涉及数据安全事件与风险处置的材料\n1、涉及重大数据泄露、攻击事件的调查全过程材料\n2、涉及数据安全事故原因分析及内部复盘报告\n3、涉及应急响应机制及处置流程细节\n4、涉及风险评估模型及预警机制数据\n（十一）涉及新兴技术与前沿数据安全能力的材料\n1、涉及人工智能数据安全、模型安全及对抗技术\n2、涉及量子加密、隐私计算等前沿技术实现路径\n3、涉及数据安全自动化防护与智能决策系统结构\n4、涉及技术验证、实验数据及能力评估结果\n（十二）其他需要控制开放的数据安全类档案\n1、依法认定可能危害国家数据安全或重要数据资源安全的内容\n2、涉及数据安全能力体系、关键技术及防护机制暴露风险内容\n3、经鉴定认为公开后可能被用于攻击、滥用或逆向利用的数据材料\n4、涉及尚未解密或保密期限未届满的数据安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '数据安全类'; }) || { name: '数据安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 18, title: '开放规则内容', content: '（一）已公开或依法可公开类\n1、已通过正式渠道发布（政府公报、官网、出版物）\n2、已超过法定保密期限且完成解密程序\n3、明确标注为“公开档案”或“公开信息”\n已纳入信息公开目录范围\n（二）非敏感一般性事务类\n1、日常行政管理、一般性工作记录\n2、不涉及决策过程、内部讨论或争议内容\n3、不涉及安全、保密、执法、经济敏感事项\n4、不影响组织运行与外部安全判断\n（三）统计汇总与概括性信息\n1、已脱敏的统计数据（宏观层面）\n2、汇总性报告（不含明细与敏感字段）\n3、年度总结类、工作概况类材料\n4、不可逆去标识化后的数据集\n（四）历史性一般档案（无现实影响）\n1、已完成历史阶段且无现实安全影响的记录\n2、不涉及未解密事项或持续影响判断的信息\n3、不涉及敏感人物、机构或能力暴露\n4、已过一定时间窗口（由行业标准或规定确定）\n（五）已脱敏或去标识化数据\n1、个人信息已完全匿名化处理\n2、关键字段已删除或不可恢复\n3、无法识别具体对象或关联关系\n4、不具备重识别风险的数据\n（六）公开性强的制度与规范类文件\n1、已公开的法律法规、政策文件\n2、已发布的制度、标准、操作规范\n3、宣传类、说明类、解释类材料\n4、不涉及内部制定过程的最终版本', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '开放规则'; }) || { name: '开放规则', controlFlag: '开放' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false }
                        ];
                    }
                } else {
                    ctrl.list = [
                            { id: 1, title: '通用敏感内容', content: '（一）涉及我党和国家重大问题、重大政治事件尚未作出结论的、不宜公开的，对社会开放会影响党内团结、党和国家机关工作正常开展的档案；\n（二）涉及各级党和政府领导人及社会各界著名爱国进步人士的政治历史评价及工作与生活中不宜公开的，对社会开放有损个人形象、人格尊严和声誉的档案；\n（三）涉及我党和国家秘密工作的组织关系、工作方法、策略手段、情报来源的，对社会开放会使保护党和国家安全与利益的措施、手段的可靠性降低或者失效的档案；\n（四）涉及我党和国家及其领导人与外国政党组织及其领导人之间秘密关系的，对社会开放会影响两党、两国正常关系以及其他对外关系的档案；\n（五）涉及民国时期敌特机关破坏我党地下组织的，为进行策反纯属捏造的，对社会开放会损害我党和国家及其领导人形象的档案；\n（六）涉及领土、边界中敏感问题和战略部署、国防设施、军事要地、军品贸易、军工科研及生产的，对社会开放不利于维护国家主权和领土完整，危害国家的战略防御能力的档案；\n（七）涉及民族纠纷、民族矛盾和宗教、统战、侨务工作中内定的方针、政策的，对社会开放会影响民族团结、社会稳定和不利于国家统一的档案；\n（八）涉及国内行政区域之间的边界问题，对社会开放后可能激发边界纠纷、影响社会稳定和人民团结的档案；\n（九）涉及准确记载风俗民情，对社会开放后可能资敌军事、经济战略，或损害民族形象的档案；\n（十）涉及我国科学技术的关键技术、技术诀窍、传统工艺、配方、重要资源的，对社会开放会削弱我国经济、科技实力或使国民经济遭受损失的档案；\n（十一）涉及与国外科技交流、经济合作、贸易往来、外事工作中内部掌握的政策、策略及对具体事件的处理意见、方案的，对社会开放会使我国在对外活动中处于不利地位或在政治上造成被动、经济上造成损失的档案；\n（十二）涉及外国在华机构形成的，对社会开放会引起档案所有权纠纷的档案；\n（十三）涉及著作权、发明权、专利权的，对社会开放会造成侵权诉讼并有损国家利益的档案；\n（十四）涉及尚有法律效力的中外产权、债权，对社会开放会引起外事纠纷并有损国家利益的档案；\n（十五）涉及司法、监察、纪检及组织人事工作中对有关人员违纪违法的调查与具体审理情况的，对社会开放会造成不良政治影响或不利于审理人员及举报人等人身安全的档案；\n（十六）涉及公民隐私的，对社会开放会损害公民声誉和权益的档案；\n（十七）涉及台、港、澳同胞和海外华侨中爱国进步人士的，对社会开放会损害其声誉和权益的档案；\n（十八）涉及民国时期军、警、宪、特组织及人员方面的，对社会开放在一定时期内可能对某些方面带来不良影响的档案；\n（十九）机关、单位及个人移交、捐赠、寄存档案时明确提出不能开放的档案；\n（二十）除上述范围外，其他影响党和国家利益的档案。', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '通用敏感规则'; }) || { name: '通用敏感规则', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 2, title: '政治类档案敏感内容', content: '（一）涉及重大政治事件及敏感历史问题的材料\n1、涉及尚未形成统一结论或仍存在争议的重大历史事件\n2、涉及内部研究、讨论重大政治事件定性的内容\n3、涉及可能引发现实误读或争议的历史评价\n（二）涉及党的内部工作及运行机制的材料\n1、涉及党内重要会议讨论过程、不同意见及未公开内容\n2、涉及组织决策形成过程、酝酿情况及内部记录\n3、涉及尚未公开的工作机制、运行规则及具体执行细节\n（三）涉及干部人事及组织处理情况的材料\n1、涉及干部考察、任免、考核评价等具体内容\n2、涉及组织审查、纪律处理、历史问题审定情况\n3、涉及未公开的人事调整方案及酝酿过程\n（四）涉及政治安全与社会稳定的材料\n1、涉及影响国家政治安全的重要情况及研判信息\n2、涉及群体性事件、突发事件的处置过程及细节\n3、涉及维稳部署、应急预案及具体执行措施\n（五）涉及内部信访及举报材料\n1、涉及群众来信来访、举报控告的具体内容\n2、涉及检举揭发材料及相关调查核实过程\n3、涉及尚未核实或已否定但可能造成影响的信息\n（六）涉及意识形态领域敏感内容的材料\n1、涉及内部意识形态工作部署、研判及处置措施\n2、涉及对特定思潮、观点的内部分析及应对策略\n3、涉及未公开的宣传口径及舆论引导方案\n（七）涉及涉外政治关系的材料\n1、涉及对外政策内部讨论、策略及未公开立场\n2、涉及涉外敏感事件处置及沟通情况\n3、涉及国际关系中敏感问题的内部分析与判断\n（八）涉及专案、专项工作及秘密调查的材料\n1、涉及各类专案调查过程、证据材料及结论\n2、涉及专项整治、专项行动的具体部署及实施细节\n3、涉及尚未公开或不宜公开的调查对象及处理情况\n（九）涉及内部统计、分析及研判信息的材料\n1、涉及内部统计数据、分析报告及趋势研判\n2、涉及敏感领域基础数据及其解读\n3、涉及可能被误用或误读的数据性内容\n（十）涉及个人政治历史及评价的材料\n1、涉及个人政治表现、历史问题及组织评价\n2、涉及未经公开的鉴定意见、审查结论\n3、涉及可能影响个人及家庭成员权益的内容\n（十一）涉及特定历史时期形成的敏感材料\n1、涉及历次政治运动中形成的处理、结论及相关记录\n2、涉及特殊历史条件下采取的措施及执行情况\n3、涉及相关人员处理过程及历史背景细节\n（十二）涉及未公开政策及重要文件的材料\n1、涉及尚未公开发布的政策文件及其起草过程\n2、涉及政策调整背景、依据及内部讨论情况\n3、涉及政策执行中的具体操作细节\n（十三）涉及可能引发社会不稳定的材料\n1、涉及可能激化社会矛盾或引发群体性反应的内容\n2、涉及易被曲解、断章取义的敏感信息\n3、涉及可能损害党和国家形象的相关材料\n（十四）其他需要控制开放的政治类档案\n1、依法依规认定为不宜公开的其他政治类材料\n2、经鉴定认为开放后可能产生不良政治影响或社会影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '政治类'; }) || { name: '政治类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 3, title: '民族宗教类档案敏感内容', content: '（一）涉及民族成分及民族关系敏感信息的材料\n1、涉及个人或群体民族成分认定、变更及历史争议的内容\n2、涉及民族矛盾、民族冲突、群体性事件的内容\n3、涉及对特定民族带有歧视性、贬损性或不当评价的内容\n（二）涉及民族地区稳定与安全的材料\n1、涉及民族地区群体性事件处置过程的内容\n2、涉及影响民族团结、社会稳定的敏感情况\n3、涉及民族地区维稳措施、应急处置方案及具体执行细节\n（三）涉及民族政策内部执行情况的材料\n1、涉及民族政策制定、调整的内部讨论及未公开内容\n2、涉及政策执行中的具体问题、偏差及整改情况\n3、涉及未公开的专项工作部署及实施方案\n（四）涉及宗教活动及宗教事务管理的材料\n1、涉及宗教活动场所审批、管理及内部情况的内容\n2、涉及宗教团体内部管理、人员任免及运行情况\n3、涉及非法宗教活动、地下宗教组织及处置情况\n（五）涉及宗教信仰及个人隐私的材料\n1、涉及个人宗教信仰状况、宗教活动参与情况\n2、涉及宗教人士个人背景、社会关系及相关评价\n3、涉及可能影响个人名誉及合法权益的宗教信息\n（六）涉及宗教领域敏感事件的材料\n1、涉及宗教领域群体性事件、冲突及处理过程\n2、涉及境内外宗教势力活动及其影响情况\n3、涉及尚未公开或存在争议的宗教事件定性内容\n（七）涉及民族宗教工作对象信息的材料\n1、涉及重点人员、重点群体名单及相关信息\n2、涉及调查摸底、统计分析等基础性数据\n3、涉及帮扶、管控、教育转化等具体措施及对象情况\n（八）涉及涉外民族宗教事务的材料\n1、涉及与境外宗教组织、民族组织交流合作的具体情况\n2、涉及涉外宗教活动审批、监管及处理情况\n3、涉及国际敏感问题及相关立场、应对措施\n（九）涉及历史遗留民族宗教问题的材料\n1、涉及历史上民族纠纷、宗教冲突及处理结论\n2、涉及尚未彻底解决或存在争议的问题\n3、涉及历史评价可能引发现实影响的内容\n（十）涉及民族宗教领域内部工作机制的材料\n1、涉及内部工作流程、管理制度及运行机制细节\n2、涉及专项行动、整治工作方案及执行细节\n（十一）其他需要控制开放的民族宗教类档案\n1、依法依规认定为不宜公开的其他相关内容\n2、经鉴定认为开放后可能影响民族团结、宗教和谐或社会稳定的材料', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '民族宗教类'; }) || { name: '民族宗教类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 4, title: '涉外类档案敏感内容', content: '（一）涉及国家对外关系与外交事务的材料\n1、涉及对外政策内部研究、讨论及未公开立场的内容\n2、涉及双边、多边关系中的敏感问题及沟通细节\n3、涉及外交谈判过程、策略安排及未公开成果\n（二）涉及涉外谈判与协议的材料\n1、涉及尚未公开或未生效的国际协议、备忘录内容\n2、涉及谈判底线、让步条件及策略性安排\n3、涉及谈判分歧、内部评估及风险研判\n（三）涉及涉外经济与合作项目的材料\n1、涉及重大对外投资、援助项目的内部评估及决策过程\n2、涉及项目实施中的问题、争议及处理情况\n3、涉及未公开的商业条款、技术细节及利益分配\n（四）涉及涉外安全与敏感事务的材料\n1、涉及跨境安全合作、联合行动及具体安排\n2、涉及反恐、反间谍、执法协作等敏感信息\n3、涉及境外突发事件应对及处置细节\n（五）涉及境外组织及人员信息的材料\n1、涉及境外机构、组织内部情况及合作细节\n2、涉及外籍人员身份信息、活动情况及评价\n3、涉及境外重点人员名单及相关情况\n（六）涉及涉外信息报送与内部研判的材料\n1、涉及对外形势分析、国别研究及内部报告\n2、涉及国际舆情分析及应对策略\n3、涉及未公开的情报性、研判性信息\n（七）涉及涉外文化与意识形态交流的材料\n1、涉及对外宣传策略、文化输出安排及具体执行细节\n2、涉及对外舆论引导方案及内部口径\n3、涉及敏感议题的对外表达及应对策略\n（八）涉及涉外纠纷与争议处理的材料\n1、涉及国际争端、法律纠纷及仲裁案件的处理过程\n2、涉及对外索赔、赔偿及责任认定的内容\n3、涉及尚未结案或存在争议的涉外事项\n（九）涉及涉外管理与审批事项的材料\n1、涉及涉外活动审批、监管及内部流程细节\n2、涉及签证、出入境管理及特殊审批情况\n3、涉及涉外单位监管、检查及处理情况\n（十）涉及未公开涉外政策及工作机制的材料\n1、涉及涉外管理制度、工作机制及运行细节\n2、涉及专项涉外工作部署及执行方案\n3、涉及内部协调机制及跨部门协作情况\n（十一）涉及可能影响国家形象及对外关系的材料\n1、涉及可能引发国际误读或外交争议的内容\n2、涉及对外评价不当或敏感表述\n3、涉及可能损害国家利益或国际信誉的材料\n（十二）其他需要控制开放的涉外类档案\n1、依法依规认定为不宜公开的其他涉外内容\n2、经鉴定认为开放后可能对国家利益、对外关系产生不良影响的材料', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '涉外类'; }) || { name: '涉外类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 5, title: '历史类档案敏感内容', content: '（一）涉及重大历史事件敏感评价的材料\n1、涉及尚未形成统一结论或仍存在争议的历史事件评价\n2、涉及对重大历史事件的内部研究、不同观点及讨论过程\n3、涉及可能引发现实误读或争议的历史定性与表述\n（二）涉及历史人物评价及定性的材料\n1、涉及对历史人物未公开或尚未统一口径的评价意见\n2、涉及对相关人员功过是非的内部讨论与结论\n3、涉及可能影响后人名誉或引发社会争议的内容\n（三）涉及历史遗留问题处理的材料\n1、涉及历史问题复查、甄别、平反及处理过程\n2、涉及尚未彻底解决或仍存在争议的历史遗留问题\n3、涉及申诉、复议及相关处理意见\n（四）涉及特定历史时期敏感内容的材料\n1、涉及特殊历史阶段形成的内部处理、整治及政策执行情况\n2、涉及非常时期采取的特殊措施及其具体执行细节\n3、涉及相关人员处理情况及背景细节\n（五）涉及历史档案中个人隐私与名誉的材料\n1、涉及个人家庭出身、社会关系、历史问题等详细情况\n2、涉及未经核实或带有指控性质的信息\n3、涉及可能对个人及其后代产生负面影响的内容\n（六）涉及历史档案中内部决策过程的材料\n1、涉及历史时期重大决策的形成过程及内部讨论\n2、涉及不同意见、争议及未公开的决策依据\n3、涉及尚未公开的会议记录、纪要及相关材料\n（七）涉及历史数据及统计分析的材料\n1、涉及历史时期敏感数据、统计资料及其分析报告\n2、涉及可能被误读或断章取义的数据性内容\n3、涉及未公开或未经权威发布的数据资料\n（八）涉及历史涉外关系与事件的材料\n1、涉及历史上的对外关系、外交活动及内部情况\n2、涉及国际争议、冲突及处理过程的细节\n3、涉及未公开或敏感的历史涉外立场与判断\n（九）涉及历史文化及意识形态敏感内容的材料\n1、涉及特定历史阶段意识形态斗争及相关材料\n2、涉及可能引发现实意识形态争议的内容\n3、涉及未公开的宣传策略及思想引导情况\n（十）涉及档案真实性、完整性存在争议的材料\n1、涉及来源不明、真实性存疑的历史档案\n2、涉及内容不完整、可能引发误解的材料\n3、涉及未经鉴定或尚未形成权威结论的档案\n（十一）涉及尚未解密或达到开放期限的材料\n1、涉及仍在保密期限内的历史档案\n2、涉及虽已解密但尚不具备开放条件的内容\n3、涉及依法应延迟开放的档案\n（十二）涉及可能引发社会不稳定或负面影响的材料\n1、涉及可能激化社会矛盾或引发群体性反应的内容\n2、涉及容易被曲解、误用或断章取义的材料\n3、涉及可能对国家形象或社会认知产生不良影响的内容\n（十三）其他需要控制开放的历史类档案\n1、依法依规认定为不宜公开的其他历史类材料\n2、经鉴定认为开放后可能产生不良社会影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '历史类'; }) || { name: '历史类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 6, title: '国土类档案敏感内容', content: '（一）涉及国土空间敏感信息的材料\n1、涉及未公开的国土空间规划、控制性详细规划及调整方案\n2、涉及重点区域、特殊用途区域的空间布局及功能定位\n3、涉及可能被用于规避监管或不当利用的空间信息\n（二）涉及测绘与地理信息安全的材料\n1、涉及高精度测绘数据、坐标系统及基础地理信息成果\n2、涉及未公开的地形图、地籍图及遥感影像资料\n3、涉及可能影响国家安全或公共安全的地理信息数据\n（三）涉及自然资源储量与分布的材料\n1、涉及矿产资源、能源资源等储量及分布情况\n2、涉及资源勘查成果、评估报告及技术数据\n3、涉及未公开的资源开发潜力及战略储备信息\n（四）涉及土地权属与使用情况的材料\n1、涉及土地权属争议、纠纷处理过程及相关证据\n2、涉及未公开的土地确权、登记及历史沿革信息\n3、涉及可能影响权益或引发纠纷的权属资料\n（五）涉及重大项目用地与规划审批的材料\n1、涉及重大建设项目选址、用地审批及内部评估过程\n2、涉及项目调整、变更及审批争议情况\n3、涉及未公开的项目布局及实施细节\n（六）涉及生态环境敏感区域的材料\n1、涉及生态保护红线、自然保护区核心区域信息\n2、涉及环境敏感点、脆弱区域分布及评估情况\n3、涉及可能被不当利用或破坏的生态资源信息\n（七）涉及国土执法与监管工作的材料\n1、涉及违法用地查处、执法行动及具体过程\n2、涉及执法对象信息、调查取证及处理情况\n3、涉及内部监管机制、检查方案及执行细节\n（八）涉及灾害防治与风险评估的材料\n1、涉及地质灾害隐患点分布及监测数据\n2、涉及灾害风险评估、预警体系及应对措施\n3、涉及可能引发恐慌或被误用的风险信息\n（九）涉及涉外及敏感区域国土信息的材料\n1、涉及边境地区、争议区域的国土信息及相关资料\n2、涉及涉外资源开发、合作项目的具体情况\n3、涉及可能影响国家主权或权益的相关内容\n（十）涉及国土领域内部决策与工作机制的材料\n1、涉及政策制定、规划调整的内部讨论过程\n2、涉及未公开的管理制度、审批流程及运行机制\n3、涉及专项行动、整治工作方案及执行细节\n（十一）涉及数据安全与信息系统的材料\n1、涉及国土信息系统架构、数据库结构及运行情况\n2、涉及数据采集、处理、共享及安全防护措施\n3、涉及可能被用于非法获取或篡改数据的信息\n（十二）涉及可能影响公共利益与社会稳定的材料\n1、涉及可能引发土地纠纷、社会矛盾的内容\n2、涉及敏感区域开发、征收拆迁等相关情况\n3、涉及可能被曲解或误用的信息\n（十三）其他需要控制开放的国土类档案\n1、依法依规认定为不宜公开的其他国土类材料\n2、经鉴定认为开放后可能对资源安全、生态安全或社会稳定产生不良影响的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '国土类'; }) || { name: '国土类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 7, title: '文化类档案敏感内容', content: '（一）涉及意识形态导向与宣传口径的材料\n1、涉及未公开的宣传策略、舆论引导方案及内部口径\n2、涉及对特定思想文化现象的内部分析、研判及应对措施\n3、涉及可能引发现实意识形态争议的敏感内容\n（二）涉及未公开出版、传播管控内容的材料\n1、涉及出版审查、删改意见及处理过程\n2、涉及被限制传播或下架的作品及原因说明\n3、涉及内部审读、审查机制及具体执行细节\n（三）涉及文化领域敏感事件的材料\n1、涉及文化事件争议、舆情事件及处置过程\n2、涉及对相关人员或作品的处理意见及内部讨论\n3、涉及可能引发社会争议或群体性讨论的内容\n（四）涉及著作权及知识产权敏感信息的材料\n1、涉及未公开的版权归属、授权协议及交易条款\n2、涉及文化产品开发、改编及商业合作细节\n3、涉及可能引发纠纷的权益分配及争议情况\n（五）涉及文化单位内部管理的材料\n1、涉及文化机构内部决策、会议记录及讨论过程\n2、涉及人事安排、评价考核及内部处理情况\n3、涉及未公开的运营策略及发展规划\n（六）涉及民族、宗教、地域文化敏感内容的材料\n1、涉及可能引发民族、宗教或地域争议的文化表达\n2、涉及对特定群体带有争议性的评价或描述\n3、涉及敏感题材创作及其内部讨论情况\n（七）涉及文物与文化资源安全的材料\n1、涉及重要文物具体存放位置、安防措施等信息\n2、涉及未公开的考古发掘地点、进展及成果细节\n3、涉及文化遗产保护中的薄弱环节或风险点\n（八）涉及涉外文化交流敏感内容的材料\n1、涉及对外文化交流中的内部策略、合作细节\n2、涉及国际文化争议、版权纠纷及处理过程\n3、涉及未公开的对外文化传播安排\n（九）涉及个人名誉与隐私的文化类材料\n1、涉及文艺工作者、研究人员的负面评价或争议信息\n2、涉及未经核实的传闻性、评价性内容\n3、涉及可能对个人及相关群体造成不良影响的内容\n（十）其他不宜开放的文化类档案\n1、依法依规认定不宜公开的相关材料\n2、经鉴定认为开放后可能引发较大社会争议或不良舆情的内容', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '文化类'; }) || { name: '文化类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 8, title: '军事类档案敏感内容', content: '（一）涉及作战行动与军事部署的敏感材料\n1、涉及作战计划、战役部署、行动方案及作战指令的内容\n2、涉及部队调动、兵力部署、机动路线及战备调整的内容\n3、涉及军事演习中真实战术运用、作战方法及评估分析的内容\n4、涉及作战行动总结、战损情况及作战能力评估的内容\n（二）涉及武器装备与军事技术的材料\n1、涉及武器装备设计原理、结构图纸及技术参数的内容\n2、涉及新型装备研发过程、试验数据及阶段性成果的内容\n3、涉及军工科研项目核心技术、关键工艺及制造方法的内容\n4、涉及武器系统性能评估、测试结果及改进方案的内容\n5、涉及电子战、导弹、无人系统等关键军事技术细节\n（三）涉及军事情报与侦察反侦察的材料\n1、涉及情报来源渠道、获取方式及运作机制的内容\n2、涉及情报分析方法、模型体系及研判流程的内容\n3、涉及侦察监视系统部署、能力范围及运行机制的内容\n4、涉及密码通信、破译技术及加密体系相关内容\n5、涉及反情报、反间谍及安全防护体系的具体措施\n（四）涉及指挥通信与信息系统的材料\n1、涉及军事指挥控制体系架构及运行机制的内容\n2、涉及通信网络结构、节点布局及运行保障体系的内容\n3、涉及加密通信协议、密钥管理及信息安全机制的内容\n4、涉及战场信息系统、数据链系统及协同指挥机制的内容\n5、涉及应急通信保障方案及战时通信组织方式的内容\n（五）涉及军事人员与组织编制的材料\n1、涉及现役部队编制结构、单位序列及组织体系的内容\n2、涉及特殊作战力量、重点军事单位及其职能配置的内容\n3、涉及军官名册、关键岗位人员及其职责分布的内容\n4、涉及军事科研、技术骨干人员身份及组织关系的内容\n5、涉及训练体系、战术教育及能力建设相关数据\n（六）涉及军事设施与战略布局的材料\n1、涉及军事基地、机场、港口及后勤保障设施布局的内容\n2、涉及战略导弹阵地、雷达站及防空体系部署信息的内容\n3、涉及军事仓储体系、物资储备及保障能力配置的内容\n4、涉及军事交通网络、战略通道及调度体系的内容\n5、涉及战区划分、防御体系及区域部署结构的内容\n（七）涉及未公开军事活动与动态任务的材料\n1、涉及正在执行或尚未完成的军事任务及行动内容\n2、涉及未公开军事演习全过程及内部评估材料\n3、涉及仍处于保密期的历史军事活动档案\n4、涉及突发军事行动、应急响应及处置过程的内容\n5、涉及未公开的跨区域军事协同与联合作战活动\n（八）涉及涉外军事事务与国际军事关系的材料\n1、涉及军事合作协议、技术交流及联合行动细节的内容\n2、涉及涉外军事演习组织、实施及评估情况的内容\n3、涉及军事技术引进、输出及限制性合作的内容\n4、涉及与境外军事机构交流、沟通及协作的具体情况\n5、涉及国际军事冲突相关立场、应对策略及内部研判\n（九）涉及历史军事事件与遗留问题的材料\n1、涉及历史战役、军事行动及未完全解密档案的内容\n2、涉及军事冲突、战争事件及处理结论的内容\n3、涉及历史军事决策过程及未公开评价材料\n4、涉及仍存在争议或可能影响现实判断的历史军事信息\n5、涉及军事失败、事故及重大事件内部总结材料\n（十）涉及军事管理制度与运行机制的材料\n1、涉及内部军事管理制度、运行规则及组织机制细节\n2、涉及军事改革方案、调整过程及未公开讨论内容\n3、涉及专项军事整顿、行动方案及执行过程细节\n4、涉及军事安全保密制度及内部控制机制具体内容\n5、涉及战备管理体系及运行保障机制细节\n（十一）其他需要控制开放的军事类档案\n1、依法依规认定为涉及国家安全、国防利益的不宜公开内容\n2、经鉴定认为公开后可能泄露军事能力、作战体系或安全布局的内容\n3、涉及国家防御能力评估及敏感战略信息的其他材料\n4、涉及尚未解密或明确规定保密期限未到期的军事档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '军事类'; }) || { name: '军事类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 9, title: '经济类档案敏感内容', content: '（一）涉及国家宏观经济决策与调控的敏感材料\n1、涉及宏观经济政策制定、调整及内部论证过程的内容\n2、涉及财政政策、货币政策、产业政策的内部讨论及未公开方案\n3、涉及经济运行分析、预测模型及敏感研判结论的内容\n4、涉及重大经济决策前的论证材料、会议纪要及分歧意见\n（二）涉及财政收支与国有资产管理的材料\n1、涉及财政预算编制、执行情况及内部调整细节的内容\n2、涉及国有资产配置、处置、重组及评估的敏感信息\n3、涉及专项资金、转移支付及重点项目资金使用明细\n4、涉及尚未公开的审计结果、整改意见及风险评估报告\n（三）涉及金融市场与金融监管的材料\n1、涉及金融监管政策制定、内部研究及风险预警内容\n2、涉及银行、证券、保险等金融机构内部经营数据与风险状况\n3、涉及金融市场异常波动分析及处置措施的内部记录\n4、涉及货币发行、流动性调控及金融稳定措施细节\n（四）涉及企业经营与商业秘密的材料\n1、涉及企业核心经营数据、财务报表及盈利结构的内容\n2、涉及企业战略规划、市场布局及竞争策略的敏感信息\n3、涉及商业合同、合作协议中未公开的关键条款\n4、涉及企业技术秘密、工艺流程及核心竞争力相关内容\n（五）涉及重大项目投资与基础设施建设的材料\n1、涉及重大工程项目立项论证、投资决策及内部评估材料\n2、涉及基础设施建设资金来源、成本结构及收益测算\n3、涉及PPP项目、政府投资项目的详细运作机制\n4、涉及未公开的项目风险评估及审查意见\n（六）涉及对外经济贸易与涉外经济合作的材料\n1、涉及贸易谈判、关税调整及协议磋商的内部过程\n2、涉及进出口管制、配额管理及敏感商品流通信息\n3、涉及涉外投资合作、跨境并购及资本流动细节\n4、涉及国际经济制裁应对措施及内部策略分析\n（七）涉及价格体系与市场调控的材料\n1、涉及重要商品、能源、粮食等价格调控机制的内部资料\n2、涉及价格形成机制分析及调控措施细节\n3、涉及市场异常价格波动的研判与干预方案\n4、涉及未公开的价格监测数据及预警信息\n（八）涉及统计数据与经济运行基础数据的材料\n1、涉及尚未公开的经济统计原始数据及分项数据\n2、涉及区域经济运行详细数据及对比分析结果\n3、涉及行业运行监测数据及敏感指标变化情况\n4、涉及可能影响市场预期的未发布统计信息\n（九）涉及金融风险与经济安全的材料\n1、涉及系统性金融风险评估及预警机制细节\n2、涉及债务风险、地方政府隐性债务相关敏感信息\n3、涉及重大经济风险事件处置过程及内部研判\n4、涉及经济安全战略、应急预案及防控机制\n（十）涉及历史经济事件与政策调整过程的材料\n1、涉及重大经济改革决策过程及内部争论材料\n2、涉及历史性经济危机、调整政策的未解密档案\n3、涉及对现行政策仍可能产生影响的历史经济数据\n4、涉及尚未公开的经济政策评估与修正记录\n（十一）其他需要控制开放的经济类档案\n1、依法认定可能影响经济安全、市场秩序或金融稳定的内容\n2、涉及国家经济战略、产业安全及核心竞争力的敏感信息\n3、经鉴定认为公开后可能引发市场波动或不当预期的材料\n4、涉及尚未解密或明确规定保密期限未到期的经济档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '经济类'; }) || { name: '经济类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 10, title: '国家安全类档案敏感内容', content: '（一）涉及国家安全战略与总体布局的敏感材料\n1、涉及国家安全战略规划、顶层设计及内部论证过程的内容\n2、涉及国家安全形势研判、风险评估及战略判断的内部材料\n3、涉及国家安全重大决策形成过程及分歧意见的内容\n4、涉及总体安全观落实路径及内部实施方案\n（二）涉及国家安全体制机制与运行体系的材料\n1、涉及国家安全工作机构设置、职责分工及运行机制细节\n2、涉及国家安全协调机制、联动机制及工作流程的内容\n3、涉及安全治理体系、风险防控体系的内部设计方案\n4、涉及专项安全行动组织方式及内部工作机制\n（三）涉及情报信息与反情报体系的材料\n1、涉及国家情报来源渠道、获取方式及运作机制的内容\n2、涉及情报分析研判模型、流程及内部方法体系\n3、涉及反间谍、反渗透、反颠覆等工作机制及实施细节\n4、涉及情报人员组织结构、协作关系及身份信息\n（四）涉及关键基础设施与安全保障体系的材料\n1、涉及能源、交通、通信、水利等关键基础设施安全防护方案\n2、涉及关键信息基础设施（CII）网络结构及安全防护体系\n3、涉及数据安全体系、网络安全防护架构及运行机制\n4、涉及国家重要系统的灾备体系及应急恢复机制\n（五）涉及网络安全与信息安全的材料\n1、涉及网络攻击防御技术、监测体系及处置机制的内容\n2、涉及网络安全事件应急响应流程及处置记录\n3、涉及密码技术、加密体系及密钥管理机制的内容\n4、涉及重大网络安全漏洞、风险评估及修复方案\n（六）涉及公共安全与社会稳定的材料\n1、涉及重大突发事件、群体性事件处置过程及内部研判\n2、涉及公共安全风险预警机制及应急预案细节\n3、涉及社会治理中重点风险区域、重点问题分析材料\n4、涉及可能引发社会不稳定的风险评估与控制方案\n（七）涉及反恐怖主义与极端主义防控的材料\n1、涉及反恐行动部署、处置过程及技术手段的内容\n2、涉及恐怖活动预警信息、监测机制及研判模型\n3、涉及极端主义防控措施及内部工作机制\n4、涉及涉恐案件侦查过程及证据链分析材料\n（八）涉及国土安全与边境管理的材料\n1、涉及边境管控体系、巡逻机制及防控部署的内容\n2、涉及海关安全监管、出入境管理及风险控制措施\n3、涉及领土安全风险评估及敏感区域防护方案\n4、涉及边境突发事件处置过程及应对机制\n（九）涉及涉外安全与国际安全合作的材料\n1、涉及国际安全合作机制、交流内容及内部评估材料\n2、涉及对外安全风险分析及应对策略的内部研判\n3、涉及跨境安全事件处置及协调机制细节\n4、涉及与境外机构合作中的敏感安全信息\n（十）涉及生物、科技与新型安全领域的材料\n1、涉及生物安全风险评估及防控体系的内容\n2、涉及人工智能、量子技术等新兴领域安全评估材料\n3、涉及重大科技成果转化中的安全风险控制机制\n4、涉及关键核心技术安全保护策略及内部方案\n（十一）涉及国家安全事件与历史案例的材料\n1、涉及重大国家安全事件调查、处置及结论性材料\n2、涉及历史安全事故、危机事件的未公开档案\n3、涉及仍在影响现实安全判断的历史分析材料\n4、涉及尚未解密或存在争议的国家安全事件记录\n（十二）其他需要控制开放的国家安全类档案\n1、依法认定可能危害国家安全、利益或社会稳定的内容\n2、涉及国家安全能力体系、运行机制及核心能力暴露风险内容\n3、经鉴定认为公开后可能引发安全风险或被利用的材料\n4、涉及尚未解密或保密期限未届满的国家安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '国家安全类'; }) || { name: '国家安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 11, title: '干部人事类档案敏感内容', content: '（一）涉及干部个人基本信息与隐私的敏感材料\n1、涉及干部身份证明、家庭成员、社会关系及背景情况的详细信息\n2、涉及个人住址、联系方式、健康状况及其他隐私性内容\n3、涉及婚姻状况、家庭变动及私密生活相关记录\n4、涉及可能影响个人名誉或合法权益的内部评价材料\n（二）涉及干部任免、考核与评价的材料\n1、涉及干部任免、调动、晋升等尚未公开或内部决策过程的材料\n2、涉及干部考核结果、测评数据及内部评价意见\n3、涉及组织考察材料、推荐意见及不同意见记录\n4、涉及干部选拔任用过程中的讨论、比较及未定结论内容\n（三）涉及干部监督、审查与问责的材料\n1、涉及干部纪律审查、调查核实及处理过程的内部材料\n2、涉及违纪违法问题线索、调查取证及阶段性结论\n3、涉及组织处理、处分决定及执行过程的敏感内容\n4、涉及尚未公开的监督检查报告及整改情况\n（四）涉及重点干部与特殊岗位人员信息的材料\n1、涉及领导干部、关键岗位干部的详细履职情况\n2、涉及涉密岗位人员、特殊系统干部的身份及职责信息\n3、涉及后备干部名单、培养计划及梯队建设信息\n4、涉及重点保护对象或敏感岗位人员的组织关系信息\n（五）涉及干部档案管理与组织工作机制的材料\n1、涉及干部档案审核、整理、管理流程及内部规范\n2、涉及干部选拔任用制度、操作流程及执行细节\n3、涉及组织人事部门内部工作机制及操作办法\n4、涉及干部管理系统、信息平台及数据结构细节\n（六）涉及干部交流、挂职与境外经历的材料\n1、涉及干部跨地区、跨部门交流及任职安排的内部信息\n2、涉及挂职锻炼、专项任务及履职过程的详细记录\n3、涉及涉外培训、境外学习及交流活动的敏感信息\n4、涉及境外经历背景核查及评价材料\n（七）涉及干部薪酬、待遇与福利的材料\n1、涉及干部工资、津贴、补贴及福利待遇的具体标准\n2、涉及特殊待遇、保障政策及执行细则\n3、涉及内部薪酬结构调整及分配机制\n4、涉及可能影响公平性的待遇差异数据\n（八）涉及干部人事历史遗留问题的材料\n1、涉及历史干部调整、平反、处理及复核过程材料\n2、涉及历史遗留人事问题的调查结论及内部意见\n3、涉及对现行组织关系可能产生影响的历史档案\n4、涉及尚未完全澄清或存在争议的人事记录\n（九）涉及干部信息系统与数据安全的材料\n1、涉及干部信息管理系统结构、权限设计及运行机制\n2、涉及干部数据库字段结构及敏感数据存储方式\n3、涉及信息系统安全策略、访问控制及日志机制\n4、涉及数据接口、交换机制及安全防护措施\n（十）其他需要控制开放的干部人事类档案\n1、依法依规认定可能影响组织管理秩序或干部合法权益的内容\n2、涉及组织人事工作内部规则、策略及未公开制度文件\n3、经鉴定认为公开后可能引发不当解读或社会影响的材料\n4、涉及尚未解密或明确规定保密期限未届满的人事档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '干部人事类'; }) || { name: '干部人事类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 12, title: '司法执法类档案敏感内容', content: '（一）涉及案件侦查与调查过程的敏感材料\n1、涉及刑事、行政案件侦查、调查、取证全过程的内部材料\n2、涉及案件线索来源、侦查手段及技术措施的内容\n3、涉及尚未侦破案件的调查进展及分析研判材料\n4、涉及跨部门联合调查、协作机制及具体执行细节\n（二）涉及证据材料与取证技术的内容\n1、涉及证据收集、固定、鉴定及分析全过程材料\n2、涉及物证、书证、电子数据等证据的提取与技术方法\n3、涉及技术侦查措施（监听、监控、追踪等）的实施细节\n4、涉及鉴定机构、鉴定方法及鉴定过程的技术信息\n（三）涉及案件审理与司法裁判内部过程的材料\n1、涉及法院内部合议、讨论及裁判形成过程的材料\n2、涉及尚未公开判决案件的审理过程及争议意见\n3、涉及检察机关审查起诉阶段的内部审查意见\n4、涉及司法机关内部法律适用分析及分歧讨论内容\n（四）涉及执法行动与执法部署的材料\n1、涉及公安、司法行政等部门执法行动部署及实施方案\n2、涉及突发事件处置、应急执法及现场指挥调度内容\n3、涉及专项执法行动（如扫黑除恶等）内部计划与执行细节\n4、涉及执法协作机制及跨区域联合执法过程材料\n（五）涉及涉案人员与相关主体隐私的材料\n1、涉及犯罪嫌疑人、被告人、受害人及证人个人信息\n2、涉及涉案人员家庭情况、社会关系及隐私信息\n3、涉及未成年人涉案信息及保护性措施相关内容\n4、涉及可能影响当事人名誉、隐私及合法权益的材料\n（六）涉及司法技术与执法能力的材料\n1、涉及执法技术手段（如大数据侦查、人工智能辅助办案）\n2、涉及司法鉴定技术方法及核心技术参数\n3、涉及执法装备性能、使用方式及能力边界\n4、涉及执法信息系统结构、权限及安全机制\n（七）涉及未结案件与敏感案件的材料\n1、涉及正在审理或尚未作出终审裁判的案件材料\n2、涉及重大、复杂或社会影响较大的未决案件信息\n3、涉及可能引发社会关注或舆情风险的案件细节\n4、涉及再审、复核及申诉过程中的内部审查材料\n（八）涉及司法监督与内部管理的材料\n1、涉及司法机关内部监督检查、审务督察及整改材料\n2、涉及执法质量评估、内部问责及处理过程\n3、涉及司法人员纪律审查及内部调查材料\n4、涉及内部考核体系及评价机制细节\n（九）涉及跨境司法与国际执法合作的材料\n1、涉及国际司法协助、引渡及跨境执法合作细节\n2、涉及境外案件调查协作及信息交换内容\n3、涉及涉外司法谈判、协商及内部立场材料\n4、涉及国际敏感案件的处置策略及内部研判\n（十）涉及历史司法案件与未解密档案的材料\n1、涉及历史重大案件未公开审理或未完全解密材料\n2、涉及冤错案件调查、复核及内部评估过程\n3、涉及历史执法方式、制度调整及内部总结材料\n4、涉及仍可能影响现实司法判断的历史案件信息\n（十一）其他需要控制开放的司法执法类档案\n1、依法认定可能影响司法公正、执法安全或社会稳定的内容\n2、涉及执法能力边界、技术手段及行动模式暴露风险内容\n3、经鉴定认为公开后可能影响案件公正审理的材料\n4、涉及尚未解密或明确规定保密期限未届满的司法档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '司法执法类'; }) || { name: '司法执法类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 13, title: '纪检监察类档案敏感内容', content: '（一）涉及线索受理与初核阶段的敏感材料\n1、涉及问题线索来源、举报渠道及受理过程的内容\n2、涉及初步核查、函询、谈话等前期调查材料\n3、涉及尚未查实或正在核实中的问题线索信息\n4、涉及线索分流、处置意见及内部研判过程\n（二）涉及纪律审查与监察调查全过程材料\n1、涉及立案审查调查的过程记录及工作方案\n2、涉及调查取证、谈话笔录及内部调查材料\n3、涉及审查调查进展情况及阶段性结论\n4、涉及跨部门协作调查及联合处置机制细节\n（三）涉及涉案人员身份及个人敏感信息\n1、涉及被审查调查对象的详细身份信息及社会关系\n2、涉及涉案人员家庭情况、财产状况及隐私信息\n3、涉及证人、证言提供者及相关人员身份保护信息\n4、涉及可能影响个人名誉、隐私及合法权益的内容\n（四）涉及处分决定与组织处理过程的材料\n1、涉及纪律处分、组织处理的讨论过程及形成意见\n2、涉及处分建议、审议记录及内部不同意见\n3、涉及尚未正式公布的处理决定及执行过程\n4、涉及处分执行后的跟踪情况及内部评估材料\n（五）涉及反腐败专项工作与行动部署的材料\n1、涉及专项监督检查、巡视巡察的具体部署方案\n2、涉及反腐败专项行动的组织方式及执行细节\n3、涉及重点领域监督检查计划及内部工作安排\n4、涉及问题整改方案及督办落实过程材料\n（六）涉及巡视巡察与监督检查过程材料\n1、涉及巡视巡察工作方案、路线安排及内部部署\n2、涉及巡视发现问题的原始材料及分析报告\n3、涉及整改建议、反馈意见及内部沟通记录\n4、涉及尚未公开的巡视成果及阶段性结论\n（七）涉及干部监督与政治生态分析材料\n1、涉及干部廉政情况评估及内部监督报告\n2、涉及政治生态研判、风险分析及内部判断\n3、涉及干部监督管理中的重点关注对象信息\n4、涉及内部廉政档案及动态监督数据\n（八）涉及案件审理与内部审议过程材料\n1、涉及纪检监察机关案件审理委员会讨论记录\n2、涉及案件定性、量纪过程中的内部意见分歧\n3、涉及复核、复审及再审议过程材料\n4、涉及尚未最终定论案件的审理意见\n（九）涉及技术调查与监察手段的材料\n1、涉及电子数据取证、数据分析及技术调查方法\n2、涉及监控、追踪、信息分析等监察技术手段细节\n3、涉及监察信息系统结构、权限及运行机制\n4、涉及调查技术能力及方法体系的具体内容\n（十）涉及涉外纪检监察与国际合作材料\n1、涉及国际反腐败合作机制及内部协作内容\n2、涉及跨境追逃追赃、国际协查过程及策略\n3、涉及境外调查协作及信息交换细节\n4、涉及涉外案件研判及内部处置方案\n（十一）涉及历史案件与未解密纪检档案\n1、涉及历史重大违纪违法案件调查全过程材料\n2、涉及尚未公开或仍在复核的历史案件档案\n3、涉及案件复盘分析及内部总结材料\n4、涉及可能影响现实判断的历史监督信息\n（十二）其他需要控制开放的纪检监察类档案\n1、依法依规认定可能影响执纪安全、监督权威或社会稳定的内容\n2、涉及纪检监察工作机制、策略及未公开制度文件\n3、经鉴定认为公开后可能影响案件公正性或监督效果的材料\n4、涉及尚未解密或保密期限未届满的纪检监察档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '纪检监察类'; }) || { name: '纪检监察类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 14, title: '科技类档案敏感内容', content: '（一）涉及核心技术与关键科技能力的敏感材料\n1、涉及国家或行业核心技术原理、关键算法及实现路径的内容\n2、涉及高端制造、先进材料、精密工艺等关键技术细节\n3、涉及尚未公开或仍处于研发阶段的核心技术方案\n4、涉及技术性能极限参数及能力边界的测试数据\n（二）涉及科研项目研发全过程的材料\n1、涉及重大科研项目立项论证、技术路线选择及内部评审材料\n2、涉及科研过程中的实验记录、阶段性成果及失败数据\n3、涉及科研攻关中的关键突破路径及技术细节\n4、涉及项目验收评估、内部质询及争议性结论\n（三）涉及国家战略科技力量与布局的材料\n1、涉及国家重点实验室、科研机构的核心能力配置\n2、涉及科研资源布局、科研方向规划及内部战略设计\n3、涉及重大科技专项组织方式及任务分配机制\n4、涉及科研体系梯队建设及核心人才结构信息\n（四）涉及前沿科技与新兴技术安全的材料\n1、涉及人工智能、量子信息、生物技术等前沿领域核心方法\n2、涉及可能影响国家安全的新兴技术应用方案\n3、涉及技术融合路径及系统级架构设计\n4、涉及技术风险评估及安全边界分析\n（五）涉及军民融合与敏感技术转化的材料\n1、涉及军民两用技术转化路径及应用场景细节\n2、涉及军用技术向民用转化过程中的核心参数\n3、涉及敏感技术产业化方案及实施路径\n4、涉及技术扩散风险评估及控制措施\n（六）涉及知识产权与核心商业技术的材料\n1、涉及核心专利、专有技术及技术秘密的详细内容\n2、涉及企业或科研机构核心竞争力技术体系\n3、涉及技术授权、转让及合作中的关键条款\n4、涉及商业技术竞争策略及技术壁垒构建方式\n（七）涉及实验数据与技术测试结果的材料\n1、涉及关键实验原始数据及完整实验过程记录\n2、涉及性能测试结果、对比分析及评估报告\n3、涉及失败实验数据及技术改进路径\n4、涉及敏感设备测试方法及技术验证过程\n（八）涉及科研合作与涉外科技交流的材料\n1、涉及国际科研合作项目的内部协议及技术分工\n2、涉及涉外技术交流中的核心技术信息共享内容\n3、涉及跨国科研合作中的技术限制条款\n4、涉及技术引进、消化吸收及再创新过程细节\n（九）涉及科研人员与组织体系的材料\n1、涉及科研团队结构、核心成员及分工细节\n2、涉及关键科研人员的技术贡献及能力评估\n3、涉及科研组织内部管理机制及运行规则\n4、涉及人才梯队建设及培养体系细节\n（十）涉及科技风险与安全评估的材料\n1、涉及技术应用可能带来的安全风险评估报告\n2、涉及科技伦理审查、风险控制及合规性分析\n3、涉及重大科技系统安全漏洞及防护方案\n4、涉及技术滥用风险及防控机制\n（十一）涉及历史科研成果与未解密档案的材料\n1、涉及历史重大科研突破的未公开技术细节\n2、涉及仍处于保密期的科研项目档案\n3、涉及科技发展过程中的关键技术演进路径\n4、涉及尚未解密或仍受保护的科研成果资料\n（十二）其他需要控制开放的科技类档案\n1、依法认定可能影响国家科技安全或核心竞争力的内容\n2、涉及关键技术体系、能力结构及实现路径暴露风险内容\n3、经鉴定认为公开后可能导致技术泄露或被逆向利用的材料\n4、涉及尚未解密或保密期限未届满的科技档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '科技类'; }) || { name: '科技类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 15, title: '公共安全类档案敏感内容', content: '（一）涉及公共安全风险监测与预警的敏感材料\n1、涉及公共安全风险监测体系、指标模型及预警机制细节\n2、涉及风险评估结果、研判结论及内部预警信息\n3、涉及重大风险隐患排查、识别及处置建议的内容\n4、涉及尚未公开的安全风险等级划分及调整依据\n（二）涉及突发事件与应急处置全过程的材料\n1、涉及自然灾害、事故灾难等突发事件处置全过程记录\n2、涉及应急指挥调度、资源调配及现场决策过程\n3、涉及应急响应方案、行动路线及执行细节\n4、涉及事件初期研判、信息报送及内部沟通记录\n（三）涉及社会治安与重点领域治理的材料\n1、涉及社会治安防控体系、布控机制及运行方式\n2、涉及重点区域、重点行业治安治理措施及内部部署\n3、涉及治安形势分析、研判报告及敏感统计数据\n4、涉及未公开的专项整治行动方案及执行细节\n（四）涉及重大事故与安全事件调查的材料\n1、涉及生产安全事故、交通事故等调查全过程材料\n2、涉及事故原因分析、责任认定及内部技术鉴定\n3、涉及事故处置过程、救援指挥及应急措施细节\n4、涉及尚未公开或未最终定论的事故调查报告\n（五）涉及公共安全防控体系与运行机制的材料\n1、涉及公共安全管理体系架构及运行机制细节\n2、涉及跨部门协同防控机制及工作流程\n3、涉及安全监管制度设计及内部执行标准\n4、涉及风险防控策略及内部控制方案\n（六）涉及重点人群与重点场所管理的材料\n1、涉及重点人群分类管理、动态监测及评估信息\n2、涉及重点场所（大型活动、交通枢纽等）安全布控方案\n3、涉及敏感区域安全防护措施及运行机制\n4、涉及治安重点对象的内部管理及监测记录\n（七）涉及公共安全技术与监测系统的材料\n1、涉及视频监控、传感器网络及公共安全监测系统结构\n2、涉及大数据分析、AI预警模型及技术实现细节\n3、涉及安全指挥平台、数据接口及运行机制\n4、涉及系统漏洞、应急备份及安全防护措施\n（八）涉及反恐维稳与特殊安全行动的材料\n1、涉及反恐行动部署、策略及执行过程细节\n2、涉及维稳行动方案及内部指挥调度记录\n3、涉及特殊安全任务执行过程及阶段性总结\n4、涉及风险人员、风险事件的内部处置机制\n（九）涉及涉外公共安全与跨境协作的材料\n1、涉及跨境安全合作、信息共享及联合行动细节\n2、涉及境外安全风险输入研判及应对措施\n3、涉及国际公共安全事件协调与处置过程\n4、涉及涉外安全机制及内部沟通内容\n（十）涉及历史公共安全事件与未解密档案的材料\n1、涉及重大历史公共安全事件全过程档案\n2、涉及未公开或仍在评估的安全事件调查材料\n3、涉及历史安全制度演变及内部总结分析\n4、涉及可能影响现实安全判断的历史风险信息\n（十一）其他需要控制开放的公共安全类档案\n1、依法认定可能影响公共安全、社会秩序或应急能力的内容\n2、涉及安全防控能力、体系结构及运行机制暴露风险内容\n3、经鉴定认为公开后可能引发社会恐慌或误判的材料\n4、涉及尚未解密或保密期限未届满的公共安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '公共安全类'; }) || { name: '公共安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 16, title: '个人信息类档案敏感内容', content: '（一）涉及身份识别与敏感标识信息的材料\n1、涉及身份证号、护照号、社保号等唯一身份识别信息\n2、涉及个人生物识别信息（指纹、虹膜、人脸特征等）\n3、涉及精确住址、定位轨迹及出行记录\n4、涉及联系方式（电话、邮箱等）在非授权范围内的完整信息\n（二）涉及个人隐私与生活信息的材料\n1、涉及个人婚姻状况、家庭关系及亲属信息\n2、涉及个人健康状况、病史及体检结果等医疗信息\n3、涉及财产状况、收入水平及资产明细\n4、涉及个人消费行为、生活习惯及日常活动记录\n（三）涉及未成年人及特殊群体信息的材料\n1、涉及未成年人身份信息、学习生活及成长记录\n2、涉及特殊保护群体（如残障人士）详细个人信息\n3、涉及社会救助对象、帮扶对象的详细情况\n4、涉及可能影响弱势群体权益的敏感数据\n（四）涉及个人信用与社会评价的材料\n1、涉及个人信用记录、信用评分及评估报告\n2、涉及社会评价、内部测评及行为评价信息\n3、涉及征信系统中未公开的个人数据\n4、涉及影响个人声誉的内部评价材料\n（五）涉及职业经历与组织关系的材料\n1、涉及个人详细工作履历及岗位变动记录\n2、涉及组织内部考核评价及绩效记录\n3、涉及内部培训、晋升及任职过程材料\n4、涉及敏感行业或岗位的工作内容细节\n（六）涉及个人敏感行为与事件记录的材料\n1、涉及个人违法违规记录及调查处理情况（未公开部分）\n2、涉及个人参与敏感事件的记录及关联信息\n3、涉及个人在执法、司法或行政处理中形成的详细记录\n4、涉及可能引发社会歧视或不当解读的行为记录\n（七）涉及通信与数字行为数据的材料\n1、涉及通信记录（通话、短信、即时通信内容）\n2、涉及网络行为日志、浏览记录及平台使用数据\n3、涉及电子邮件、社交媒体账号的非公开内容\n4、涉及数字身份行为画像及分析结果\n（八）涉及个人心理与行为分析的材料\n1、涉及心理测评结果及心理健康评估报告\n2、涉及行为分析模型输出及风险判断结果\n3、涉及个人性格、倾向及敏感行为特征分析\n4、涉及可能影响个人名誉的内部心理评估\n（九）涉及跨境与特殊背景信息的材料\n1、涉及出入境记录及跨境活动详细信息\n2、涉及境外学习、工作及生活的详细记录\n3、涉及涉外背景调查及评估材料\n4、涉及可能影响国家安全或个人安全的跨境数据\n（十）其他需要控制开放的个人信息类档案\n1、依法认定可能侵害个人隐私权、名誉权或合法权益的内容\n2、涉及敏感个人数据集合、画像及关联分析结果\n3、经鉴定认为公开后可能被滥用或造成风险的数据\n4、涉及尚未脱敏或不符合公开标准的个人信息档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '个人信息类'; }) || { name: '个人信息类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 17, title: '数据安全类档案敏感内容', content: '（一）涉及重要数据与敏感数据资源的材料\n1、涉及国家重要数据资源目录、分级分类及管理规则的内容\n2、涉及重要数据采集范围、字段结构及数据标准的详细信息\n3、涉及高价值敏感数据资源的分布、规模及存储情况\n4、涉及未公开的数据资源整合、治理及共享方案\n（二）涉及数据安全治理体系与制度机制的材料\n1、涉及数据安全管理制度、标准体系及实施细则\n2、涉及数据分级分类方法、判定规则及技术标准\n3、涉及数据安全治理架构及运行机制设计\n4、涉及数据安全责任体系及内部管理流程\n（三）涉及数据流通与共享机制的材料\n1、涉及跨部门、跨行业数据共享机制及技术实现方式\n2、涉及数据交换平台架构、接口设计及运行规则\n3、涉及数据流通路径、流转规则及控制机制细节\n4、涉及敏感数据共享审批流程及内部控制措施\n（四）涉及数据存储与基础设施安全的材料\n1、涉及数据中心布局、架构设计及运行机制\n2、涉及云平台架构、资源调度及安全防护体系\n3、涉及数据备份、灾备体系及恢复机制细节\n4、涉及存储加密方式、密钥管理及安全策略\n（五）涉及数据处理与分析能力的材料\n1、涉及大数据分析模型、算法体系及实现路径\n2、涉及人工智能数据处理流程及模型结构\n3、涉及数据挖掘方法及核心分析能力细节\n4、涉及数据处理性能指标及能力边界\n（六）涉及个人信息与隐私数据处理的材料\n1、涉及个人信息处理流程、脱敏规则及技术方案\n2、涉及用户画像、行为分析及数据建模结果\n3、涉及敏感个人数据处理机制及权限控制体系\n4、涉及隐私计算、联邦学习等关键技术实现细节\n（七）涉及行业敏感数据与商业数据的材料\n1、涉及金融、医疗、能源、交通等行业核心数据结构\n2、涉及企业经营数据、交易数据及运营分析结果\n3、涉及行业数据共享机制及商业化使用路径\n4、涉及数据资产评估及数据要素定价机制\n（八）涉及网络与系统数据安全的材料\n1、涉及数据安全防护系统架构及技术实现细节\n2、涉及网络安全监测数据及攻击防御分析结果\n3、涉及日志系统、审计机制及行为追踪规则\n4、涉及安全漏洞、风险事件及处置过程数据\n（九）涉及跨境数据流动与国际合作的材料\n1、涉及跨境数据传输规则及审批机制\n2、涉及国际数据合作协议及技术实现细节\n3、涉及数据出境安全评估及风险控制措施\n4、涉及境外数据流动路径及监管策略\n（十）涉及数据安全事件与风险处置的材料\n1、涉及重大数据泄露、攻击事件的调查全过程材料\n2、涉及数据安全事故原因分析及内部复盘报告\n3、涉及应急响应机制及处置流程细节\n4、涉及风险评估模型及预警机制数据\n（十一）涉及新兴技术与前沿数据安全能力的材料\n1、涉及人工智能数据安全、模型安全及对抗技术\n2、涉及量子加密、隐私计算等前沿技术实现路径\n3、涉及数据安全自动化防护与智能决策系统结构\n4、涉及技术验证、实验数据及能力评估结果\n（十二）其他需要控制开放的数据安全类档案\n1、依法认定可能危害国家数据安全或重要数据资源安全的内容\n2、涉及数据安全能力体系、关键技术及防护机制暴露风险内容\n3、经鉴定认为公开后可能被用于攻击、滥用或逆向利用的数据材料\n4、涉及尚未解密或保密期限未届满的数据安全档案', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '数据安全类'; }) || { name: '数据安全类', controlFlag: '受控' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false },
                            { id: 18, title: '开放规则内容', content: '（一）已公开或依法可公开类\n1、已通过正式渠道发布（政府公报、官网、出版物）\n2、已超过法定保密期限且完成解密程序\n3、明确标注为“公开档案”或“公开信息”\n已纳入信息公开目录范围\n（二）非敏感一般性事务类\n1、日常行政管理、一般性工作记录\n2、不涉及决策过程、内部讨论或争议内容\n3、不涉及安全、保密、执法、经济敏感事项\n4、不影响组织运行与外部安全判断\n（三）统计汇总与概括性信息\n1、已脱敏的统计数据（宏观层面）\n2、汇总性报告（不含明细与敏感字段）\n3、年度总结类、工作概况类材料\n4、不可逆去标识化后的数据集\n（四）历史性一般档案（无现实影响）\n1、已完成历史阶段且无现实安全影响的记录\n2、不涉及未解密事项或持续影响判断的信息\n3、不涉及敏感人物、机构或能力暴露\n4、已过一定时间窗口（由行业标准或规定确定）\n（五）已脱敏或去标识化数据\n1、个人信息已完全匿名化处理\n2、关键字段已删除或不可恢复\n3、无法识别具体对象或关联关系\n4、不具备重识别风险的数据\n（六）公开性强的制度与规范类文件\n1、已公开的法律法规、政策文件\n2、已发布的制度、标准、操作规范\n3、宣传类、说明类、解释类材料\n4、不涉及内部制定过程的最终版本', type: ctrl.sensitiveTypes.find(function(t) { return t.name === '开放规则'; }) || { name: '开放规则', controlFlag: '开放' }, createdAt: '2023-10-01 10:00:00', enabled: true, selected: false }
                        ];
                    localStorage.setItem('oaas_sensitive_contents_v2', JSON.stringify(ctrl.list));
                }

                ctrl.saveData = function() {
                    localStorage.setItem('oaas_sensitive_contents_v2', JSON.stringify(ctrl.list));
                };

                ctrl.showForm = false;
                ctrl.isEdit = false;
                ctrl.formData = {};
                ctrl.selectAll = false;

                ctrl.$onInit = function() {
                    IconService.refresh();
                };

                // 批量操作相关方法
                ctrl.toggleAll = function() {
                    ctrl.list.forEach(function(item) {
                        item.selected = ctrl.selectAll;
                    });
                };

                ctrl.updateSelectAll = function() {
                    if (ctrl.list.length === 0) {
                        ctrl.selectAll = false;
                        return;
                    }
                    ctrl.selectAll = ctrl.list.every(function(item) {
                        return item.selected;
                    });
                };

                ctrl.hasSelected = function() {
                    return ctrl.list.some(function(item) {
                        return item.selected;
                    });
                };

                ctrl.batchImport = function() {
                    alert('请选择要导入的 Excel/CSV 文件');
                };

                ctrl.batchExport = function() {
                    if (!ctrl.hasSelected()) {
                        alert('将导出所有敏感内容数据');
                    } else {
                        var selectedCount = ctrl.list.filter(function(item) { return item.selected; }).length;
                        alert('将导出选中的 ' + selectedCount + ' 项敏感内容数据');
                    }
                };

                ctrl.batchDelete = function() {
                    var selectedItems = ctrl.list.filter(function(item) { return item.selected; });
                    if (selectedItems.length === 0) return;
                    
                    if (confirm('确定要删除选中的 ' + selectedItems.length + ' 项敏感内容吗？')) {
                        ctrl.list = ctrl.list.filter(function(item) { return !item.selected; });
                        ctrl.selectAll = false;
                        ctrl.saveData();
                        IconService.refresh();
                    }
                };

                ctrl.openForm = function() {
                    ctrl.isEdit = false;
                    ctrl.formData = { enabled: true };
                    ctrl.showForm = true;
                    IconService.refresh();
                };

                ctrl.editItem = function(item) {
                    ctrl.isEdit = true;
                    ctrl.formData = angular.copy(item);
                    // 确保选中正确的引用
                    ctrl.formData.type = ctrl.sensitiveTypes.find(function(t) { return t.id === item.type.id; });
                    ctrl.showForm = true;
                    IconService.refresh();
                };

                ctrl.deleteItem = function(item) {
                    if (confirm('确定要删除敏感内容 "' + item.content + '" 吗？')) {
                        var index = ctrl.list.findIndex(function(i) { return i.id === item.id; });
                        if (index > -1) {
                            ctrl.list.splice(index, 1);
                            ctrl.updateSelectAll();
                            ctrl.saveData();
                        }
                    }
                };

                ctrl.closeForm = function() {
                    ctrl.showForm = false;
                };

                ctrl.saveForm = function() {
                    if (!ctrl.formData.title) {
                        alert('请输入敏感内容标题');
                        return;
                    }
                    if (!ctrl.formData.content) {
                        alert('请输入敏感内容');
                        return;
                    }
                    if (!ctrl.formData.type) {
                        alert('请选择敏感类型');
                        return;
                    }
                    
                    if (ctrl.isEdit) {
                        var index = ctrl.list.findIndex(function(i) { return i.id === ctrl.formData.id; });
                        if (index > -1) {
                            var updatedItem = angular.copy(ctrl.formData);
                            updatedItem.selected = ctrl.list[index].selected; // 保持选中状态
                            ctrl.list[index] = updatedItem;
                        }
                    } else {
                        ctrl.formData.id = Date.now();
                        ctrl.formData.selected = false;
                        
                        var d = new Date();
                        var pad = function(n) { return n < 10 ? '0' + n : n; };
                        ctrl.formData.createdAt = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
                        
                        ctrl.list.push(angular.copy(ctrl.formData));
                    }
                    ctrl.saveData();
                    ctrl.showForm = false;
                    IconService.refresh();
                };
            }]
        });
    </script>
</body>
</html>
