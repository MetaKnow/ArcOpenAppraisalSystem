<!DOCTYPE html>
<html lang="zh-CN" ng-app="appraisalApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-OAAS档案开放鉴定系统 - 鉴定任务管理</title>
    <!-- 引入 Tailwind CSS 进行样式管理 -->
    <script src="./lib/tailwindcss.js"></script>
    <!-- 配置 Tailwind 主题颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0369A1', // 政务风主色
                        secondary: '#334155',
                        background: '#F8FAFC',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <!-- 引入 AngularJS -->
    <script src="./lib/angular.min.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="./lib/lucide.min.js"></script>
    <link rel="stylesheet" href="./main.css">
</head>
<body ng-controller="MainController as ctrl" class="h-screen overflow-hidden flex flex-col bg-slate-50">
    
    <navbar></navbar>
    <breadcrumb></breadcrumb>
    
    <!-- 主体内容区域 -->
    <main class="overflow-y-auto flex-1 p-4 md:px-8 flex flex-col gap-5 w-full box-border relative">
        <appraisal-task-manage class="flex-1 flex flex-col min-w-0 w-full"></appraisal-task-manage>
    </main>

    <script>
        var app = angular.module('appraisalApp', []);

        // 重新渲染图标的服务
        app.service('IconService', function($timeout) {
            var refreshPromise;
            this.refresh = function() {
                if (refreshPromise) $timeout.cancel(refreshPromise);
                refreshPromise = 
                $timeout(function() {
                    lucide.createIcons();
                    refreshPromise = null;
                }, 50, false);
            };
        });

        app.controller('MainController', ['IconService', '$timeout', '$rootScope', function(IconService, $timeout, $rootScope) {
            var ctrl = this;
            
            // 初始化导航状态
            $timeout(function() {
                $rootScope.$broadcast('NAVIGATE', '鉴定任务管理');
            });
        }]);

        app.component('navbar', {
            template: `
                <nav class="bg-surface shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between sticky top-0 z-50">
                    <!-- 左侧 Logo -->
                    <div class="flex items-center space-x-2 cursor-pointer flex-1 justify-start">
                        <div class="w-8 h-8 bg-primary text-white flex items-center justify-center rounded font-bold text-xl">S</div>
                        <span class="text-xl font-bold text-slate-800 tracking-wide whitespace-nowrap">MS-OAAS档案开放鉴定系统</span>
                    </div>
                    
                    <!-- 中间功能菜单 -->
                    <div class="hidden md:flex space-x-1 flex-none justify-center">
                        <div ng-repeat="item in $ctrl.filteredMenuItems" 
                             ng-click="!item.children && $ctrl.navigate(item.name)"
                             ng-class="{ 'text-primary bg-sky-50': $ctrl.currentMenu === item.name, 'text-slate-600 hover:bg-slate-50 hover:text-slate-900': $ctrl.currentMenu !== item.name }"
                             class="relative group px-4 py-2 rounded-md cursor-pointer text-sm font-medium transition-colors duration-200 flex items-center space-x-1">
                            <span>{{item.name}}</span>
                            <i ng-if="item.children" data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <!-- 二级菜单下拉框 -->
                            <div ng-if="item.children" class="absolute top-full left-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1">
                                    <div ng-repeat="child in item.children" 
                                         ng-click="$ctrl.navigate(child, item.name); $event.stopPropagation();"
                                         ng-class="{ 'text-primary bg-sky-50': $ctrl.currentSubMenu === child, 'text-slate-600 hover:bg-sky-50 hover:text-primary': $ctrl.currentSubMenu !== child }"
                                         class="px-4 py-2 transition-colors cursor-pointer block">
                                        {{child}}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧系统栏 -->
                    <div class="flex items-center space-x-5 text-slate-500 flex-1 justify-end relative">
                        <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="lock" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        <i data-lucide="sun" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                        
                        <!-- 用户切换下拉 -->
                        <div class="relative group cursor-pointer flex items-center space-x-2">
                            <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-600 text-xs font-bold overflow-hidden" title="{{$ctrl.currentUser.realName || '未登录'}}">
                                <span ng-if="!$ctrl.currentUser">未</span>
                                <span ng-if="$ctrl.currentUser">{{$ctrl.currentUser.realName.substring(0,1)}}</span>
                            </div>
                            <span class="text-sm font-medium text-slate-700 hidden lg:block">{{$ctrl.currentUser ? $ctrl.currentUser.realName : '未登录'}}</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                            
                            <div class="absolute top-full right-0 pt-2 w-48 hidden group-hover:block z-50">
                                <div class="bg-white border border-slate-200 shadow-lg rounded-md py-1 max-h-64 overflow-y-auto">
                                    <div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-100 bg-slate-50">切换用户 (演示)</div>
                                    <div ng-repeat="u in $ctrl.userList" 
                                         ng-click="$ctrl.switchUser(u); $event.stopPropagation();"
                                         class="px-4 py-2 hover:bg-sky-50 cursor-pointer text-sm flex flex-col"
                                         ng-class="{'bg-sky-50 text-primary font-medium': $ctrl.currentUser.id === u.id, 'text-slate-700': $ctrl.currentUser.id !== u.id}">
                                        <span>{{u.realName}} ({{u.username}})</span>
                                        <span class="text-xs text-slate-500 mt-0.5">{{u.userType}}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <i data-lucide="settings" class="w-5 h-5 cursor-pointer hover:text-primary transition-colors"></i>
                    </div>
                </nav>
            `,
            controller: ['IconService', '$rootScope', function(IconService, $rootScope) {
                var ctrl = this;
                ctrl.currentMenu = '工作台';
                ctrl.currentSubMenu = '';

                ctrl.menuItems = [
                    { name: '工作台' },
                    { name: '鉴定规则配置', children: ['敏感类型管理', '敏感内容管理', '通用敏感词库', '全宗敏感词库', '错检漏检库'] },
                    { name: '鉴定任务管理' },
                    { name: '系统管理', children: ['全宗配置', '用户管理', '角色权限', '元数据配置', '鉴定流程配置', '系统参数配置'] }
                ];
                
                ctrl.filteredMenuItems = [];

                // 模拟用户登录
                ctrl.userList = [];
                try {
                    ctrl.userList = JSON.parse(localStorage.getItem('oaas_user_list')) || [];
                } catch(e) {}
                
                if (ctrl.userList.length === 0) {
                    ctrl.userList = [
                        { id: 1, username: 'admin', realName: '系统管理员', userType: '馆内用户' },
                        { id: 2, username: 'zhangsan', realName: '张三', userType: '馆内用户' },
                        { id: 3, username: 'lisi', realName: '李四', userType: '形成/移交单位用户' }
                    ];
                    localStorage.setItem('oaas_user_list', JSON.stringify(ctrl.userList));
                }

                try {
                    ctrl.currentUser = JSON.parse(localStorage.getItem('oaas_current_user'));
                } catch(e) {}
                
                if (!ctrl.currentUser && ctrl.userList.length > 0) {
                    ctrl.currentUser = ctrl.userList[0];
                    localStorage.setItem('oaas_current_user', JSON.stringify(ctrl.currentUser));
                }

                // 权限过滤
                ctrl.updateMenuByRole = function() {
                    if (ctrl.currentUser && ctrl.currentUser.userType === '形成/移交单位用户') {
                        // Base allowed menus
                        var allowedMenus = ['工作台', '鉴定任务管理'];
                        
                        // Load additional menus from role permissions
                        try {
                            var permissions = JSON.parse(localStorage.getItem('oaas_role_permissions')) || [];
                            var userPerm = permissions.find(function(p) { return p.username === ctrl.currentUser.username; });
                            if (userPerm && userPerm.selectedMenus && userPerm.selectedMenus.length > 0) {
                                allowedMenus = allowedMenus.concat(userPerm.selectedMenus);
                            }
                        } catch(e) {}
                        
                        // Filter the main menu based on allowed menus
                        var newMenuItems = [];
                        
                        ctrl.menuItems.forEach(function(item) {
                            if (allowedMenus.indexOf(item.name) !== -1) {
                                newMenuItems.push(angular.copy(item));
                            } else if (item.children) {
                                var filteredChildren = item.children.filter(function(child) {
                                    return allowedMenus.indexOf(child) !== -1;
                                });
                                if (filteredChildren.length > 0) {
                                    var newItem = angular.copy(item);
                                    newItem.children = filteredChildren;
                                    newMenuItems.push(newItem);
                                }
                            }
                        });
                        
                        ctrl.filteredMenuItems = newMenuItems;
                    } else {
                        ctrl.filteredMenuItems = ctrl.menuItems;
                    }
                };

                ctrl.updateMenuByRole();

                ctrl.switchUser = function(u) {
                    ctrl.currentUser = u;
                    localStorage.setItem('oaas_current_user', JSON.stringify(u));
                    window.location.href = 'index.html'; // 切换用户后回到首页
                };
                
                ctrl.navigate = function(name, parentName) {
                    var map = {
                        '工作台': 'index.html',
                        '敏感类型管理': 'sensitive-type.html',
                        '敏感内容管理': 'sensitive-content.html',
                        '通用敏感词库': 'general-sensitive-word.html',
                        '全宗配置': 'fonds-config.html',
                        '用户管理': 'user-management.html',
                        '角色权限': 'role-permission.html',
                        '全宗敏感词库': 'fonds-sensitive-word.html',
                        '错检漏检库': 'error-omission-db.html',
                        '鉴定任务管理': 'appraisal-task.html',
                        '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html',
                        '任务审核': 'appraisal-task-audit.html'
                    };
                    var currentPath = 'index.html';
                    var href = window.location.href;
                    var sortedMapKeys = Object.keys(map).sort(function(a, b) {
                        return map[b].length - map[a].length;
                    });
                    for (var i = 0; i < sortedMapKeys.length; i++) {
                        var key = sortedMapKeys[i];
                        if (href.indexOf(map[key]) !== -1) {
                            currentPath = map[key];
                            break;
                        }
                    }
                    
                    if (map[name]) {
                        if (map[name] === currentPath) {
                            if (parentName !== undefined) {
                                ctrl.currentSubMenu = parentName ? name : '';
                                ctrl.currentMenu = parentName || name;
                                $rootScope.$broadcast('NAVIGATE', name, parentName);
                            } else {
                                $rootScope.$broadcast('NAVIGATE', name);
                            }
                            return;
                        }
                        window.location.href = map[name];
                        return;
                    }
                    if (parentName !== undefined) {
                        ctrl.currentSubMenu = parentName ? name : '';
                        ctrl.currentMenu = parentName || name;
                        $rootScope.$broadcast('NAVIGATE', name, parentName);
                    } else {
                        $rootScope.$broadcast('NAVIGATE', name);
                    }
                };

                // 监听面包屑点击回到工作台
                $rootScope.$on('NAVIGATE', function(e, name, parentName) {
                    ctrl.currentSubMenu = parentName ? name : '';
                    ctrl.currentMenu = parentName || name;
                });

                ctrl.$onInit = function() {
                    IconService.refresh();
                };
            }]
        });

        app.component('breadcrumb', {
            template: `
                <div class="bg-white border-b border-slate-200 flex items-center text-sm font-medium relative" style="height: 40px; padding-left: 1rem; padding-right: 1rem; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none;">
                    <style>
                        .custom-tab-scroll::-webkit-scrollbar { display: none; }
                    </style>
                    <div class="flex items-center h-full custom-tab-scroll w-full">
                        <div ng-repeat="tab in $ctrl.tabs" 
                             ng-click="$ctrl.goToTab(tab)"
                             ng-right-click="$ctrl.showContextMenu($event, tab)"
                             class="flex items-center h-full px-4 border-r border-slate-200 cursor-pointer transition-colors relative group flex-shrink-0"
                             ng-class="{'bg-sky-50 text-primary border-t-2 border-t-primary': tab.active, 'text-slate-600 hover:bg-slate-50 border-t-2 border-t-transparent': !tab.active}">
                            <i ng-if="tab.name === '工作台'" data-lucide="layout-grid" class="w-4 h-4 mr-2"></i>
                            <span class="select-none">{{tab.name}}</span>
                            <div ng-if="tab.name !== '工作台'" 
                                 ng-click="$ctrl.closeTab($event, tab)" 
                                 class="ml-2 w-4 h-4 rounded-full flex items-center justify-center hover:bg-slate-200 hover:text-red-500 transition-colors"
                                 ng-class="{'opacity-100': tab.active, 'opacity-0 group-hover:opacity-100': !tab.active}">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Context Menu -->
                    <div ng-if="$ctrl.contextMenu.show" 
                         class="fixed z-[100] w-32 bg-white rounded-md shadow-lg border border-slate-200 py-1"
                         ng-style="{'left': $ctrl.contextMenu.x + 'px', 'top': $ctrl.contextMenu.y + 'px'}">
                        <div ng-click="$ctrl.closeAllTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">全部关闭</div>
                        <div ng-click="$ctrl.closeOtherTabs()" class="px-4 py-2 hover:bg-slate-50 cursor-pointer text-slate-700 text-sm">关闭其他</div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$rootScope', '$scope', '$document', '$timeout', function(IconService, $rootScope, $scope, $document, $timeout) {
                var ctrl = this;
                
                var urlMap = {
                    '工作台': 'index.html',
                    '敏感类型管理': 'sensitive-type.html',
                    '敏感内容管理': 'sensitive-content.html',
                    '通用敏感词库': 'general-sensitive-word.html',
                    '全宗配置': 'fonds-config.html',
                    '用户管理': 'user-management.html',
                    '角色权限': 'role-permission.html',
                    '全宗敏感词库': 'fonds-sensitive-word.html',
                    '错检漏检库': 'error-omission-db.html',
                    '鉴定任务管理': 'appraisal-task.html',
                    '新建任务': 'appraisal-task-create.html',
                    '查看任务': 'appraisal-task-view.html',
                    '修改任务': 'appraisal-task-edit.html',
                    '元数据配置': 'metadata-config.html',
                        '鉴定流程配置': 'appraisal-process-config.html'
                };
                
                var nameMap = {};
                for (var key in urlMap) { nameMap[urlMap[key]] = key; }
                
                ctrl.contextMenu = { show: false, x: 0, y: 0, targetTab: null };
                
                var currentUrl = 'index.html';
                var pathname = window.location.pathname || '';
                var currentFile = pathname.split('/').pop() || '';
                if (nameMap[currentFile]) {
                    currentUrl = currentFile;
                } else {
                    var href = window.location.href;
                    var sortedKeys = Object.keys(urlMap).sort(function(a, b) {
                        return urlMap[b].length - urlMap[a].length;
                    });
                    for (var i = 0; i < sortedKeys.length; i++) {
                        var key = sortedKeys[i];
                        if (href.indexOf(urlMap[key]) !== -1) {
                            currentUrl = urlMap[key];
                            break;
                        }
                    }
                }
                
                var currentName = nameMap[currentUrl] || '工作台';
                
                var storedTabs = localStorage.getItem('oaas_opened_tabs');
                if (storedTabs) {
                    try {
                        ctrl.tabs = JSON.parse(storedTabs);
                    } catch(e) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                } else {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                }

                // 兼容历史缓存格式，避免异常数据导致面包屑不显示
                if (!Array.isArray(ctrl.tabs)) {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                } else {
                    ctrl.tabs = ctrl.tabs.filter(function(t) {
                        return t && typeof t.name === 'string' && typeof t.url === 'string';
                    });
                    if (ctrl.tabs.length === 0) {
                        ctrl.tabs = [{ name: '工作台', url: 'index.html', active: false }];
                    }
                }
                
                if (!ctrl.tabs.find(function(t) { return t.name === '工作台'; })) {
                    ctrl.tabs.unshift({ name: '工作台', url: 'index.html', active: false });
                }
                
                var existingTab = ctrl.tabs.find(function(t) { return t.name === currentName; });
                if (!existingTab && currentName) {
                    ctrl.tabs.push({ name: currentName, url: currentUrl, active: true });
                }
                
                ctrl.tabs.forEach(function(t) {
                    t.active = (t.name === currentName);
                });
                
                ctrl.saveTabs = function() {
                    localStorage.setItem('oaas_opened_tabs', JSON.stringify(ctrl.tabs));
                };
                
                ctrl.saveTabs();
                
                ctrl.goToTab = function(tab) {
                    if (tab.name !== currentName) {
                        window.location.href = tab.url;
                    }
                };
                
                ctrl.closeTab = function(e, tab) {
                    if (e) {
                        e.stopPropagation();
                        e.preventDefault();
                    }
                    if (tab.name === '工作台') return;
                    
                    var index = ctrl.tabs.indexOf(tab);
                    if (index > -1) {
                        ctrl.tabs.splice(index, 1);
                        ctrl.saveTabs();
                        
                        if (tab.active) {
                            var nextTab = ctrl.tabs[index] || ctrl.tabs[index - 1] || ctrl.tabs[0];
                            window.location.href = nextTab.url;
                        }
                    }
                    ctrl.contextMenu.show = false;
                };
                
                ctrl.showContextMenu = function(e, tab) {
                    e.preventDefault();
                    ctrl.contextMenu.show = true;
                    ctrl.contextMenu.x = e.clientX;
                    ctrl.contextMenu.y = e.clientY;
                    ctrl.contextMenu.targetTab = tab;
                };
                
                ctrl.closeAllTabs = function() {
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    if (currentName !== '工作台') {
                        window.location.href = 'index.html';
                    }
                };
                
                ctrl.closeOtherTabs = function() {
                    var target = ctrl.contextMenu.targetTab;
                    if (!target) return;
                    
                    ctrl.tabs = [{ name: '工作台', url: 'index.html', active: currentName === '工作台' }];
                    if (target.name !== '工作台') {
                        ctrl.tabs.push(target);
                    }
                    ctrl.saveTabs();
                    ctrl.contextMenu.show = false;
                    
                    if (currentName !== target.name && currentName !== '工作台') {
                        window.location.href = target.url;
                    } else if (currentName === target.name) {
                        // Keep current tab active
                    }
                };
                
                var closeMenuHandler = function(e) {
                    if (ctrl.contextMenu.show) {
                        $scope.$apply(function() {
                            ctrl.contextMenu.show = false;
                        });
                    }
                };
                
                $document.on('click', closeMenuHandler);
                $scope.$on('$destroy', function() {
                    $document.off('click', closeMenuHandler);
                });
                
                ctrl.$onInit = function() {
                    $timeout(function() { IconService.refresh(); }, 0);
                };
            }]
        });

        // Ensure ng-right-click is registered
        if (!app._invokeQueue.some(function(item) { return item[1] === 'directive' && item[2][0] === 'ngRightClick'; })) {
            app.directive('ngRightClick', ['$parse', function($parse) {
                return function(scope, element, attrs) {
                    var fn = $parse(attrs.ngRightClick);
                    element.bind('contextmenu', function(event) {
                        scope.$apply(function() {
                            event.preventDefault();
                            fn(scope, {$event: event});
                        });
                    });
                };
            }]);
        }

        app.component('taskCard', {
            bindings: {
                task: '<'
            },
            template: `
                <div class="bg-white p-5 rounded-xl border border-slate-200 hover:border-blue-300 hover:shadow-lg transition-all duration-300 cursor-pointer group relative flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4 mt-1 relative">
                        <h3 class="text-base font-bold text-slate-800 group-hover:text-primary transition-colors pr-8">{{$ctrl.task.title}}</h3>
                        <div class="flex items-center space-x-2 shrink-0">
                            <span class="text-xs px-2.5 py-1 rounded-full font-medium ring-1 ring-inset whitespace-nowrap shrink-0 {{$ctrl.statusBg}}">
                                {{$ctrl.statusText}}
                            </span>
                            
                            <!-- 三个点下拉菜单 -->
                            <div class="relative" ng-click="$event.stopPropagation()">
                                <button ng-click="$ctrl.toggleMenu($event)" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors focus:outline-none">
                                    <i data-lucide="more-horizontal" class="w-5 h-5"></i>
                                </button>
                                
                                <div ng-if="$ctrl.showMenu" 
                                     class="absolute right-0 mt-1 w-36 bg-white rounded-md shadow-lg border border-slate-200 py-1 z-50">
                                    <div ng-click="$ctrl.handleActionClick('view')" ng-class="$ctrl.getActionClasses('view', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="eye" class="w-4 h-4 mr-2"></i>查看任务
                                    </div>
                                    <div ng-click="$ctrl.handleActionClick('edit')" ng-class="$ctrl.getActionClasses('edit', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="edit" class="w-4 h-4 mr-2"></i>修改任务
                                    </div>
                                    <div class="border-t border-slate-100 my-1"></div>
                                    <div ng-click="$ctrl.handleActionClick('start')" ng-class="$ctrl.getActionClasses('start', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="play-circle" class="w-4 h-4 mr-2"></i>开始鉴定
                                    </div>
                                    <div ng-click="$ctrl.handleActionClick('pause')" ng-class="$ctrl.getActionClasses('pause', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="pause-circle" class="w-4 h-4 mr-2"></i>暂停鉴定
                                    </div>
                                    <div ng-click="$ctrl.handleActionClick('cancel')" ng-class="$ctrl.getActionClasses('cancel', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="x-circle" class="w-4 h-4 mr-2"></i>取消鉴定
                                    </div>
                                    <div class="border-t border-slate-100 my-1"></div>
                                    <div ng-click="$ctrl.handleActionClick('audit')" ng-class="$ctrl.getActionClasses('audit', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="clipboard-check" class="w-4 h-4 mr-2"></i>任务审核
                                    </div>
                                    <div ng-click="$ctrl.handleActionClick('generate')" ng-class="$ctrl.getActionClasses('generate', false)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="file-output" class="w-4 h-4 mr-2"></i>生成鉴定结果
                                    </div>
                                    <div class="border-t border-slate-100 my-1"></div>
                                    <div ng-click="$ctrl.handleActionClick('delete')" ng-class="$ctrl.getActionClasses('delete', true)" class="px-4 py-2 text-sm transition-colors flex items-center">
                                        <i data-lucide="trash-2" class="w-4 h-4 mr-2"></i>删除任务
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2 text-sm text-slate-500 leading-relaxed mb-6 flex-1">
                        <div class="flex items-center justify-between gap-3">
                            <span class="truncate">创建人: <span class="text-slate-600">{{$ctrl.task.creator}}</span></span>
                            <span class="shrink-0">创建时间: <span class="text-slate-600">{{$ctrl.getDateOnly($ctrl.task.time)}}</span></span>
                        </div>
                        <div class="flex items-center justify-between gap-3">
                            <span class="truncate">全宗名称: <span class="text-slate-600">{{$ctrl.task.fondsName}}</span></span>
                            <span class="shrink-0">鉴定年度: <span class="text-slate-600">{{$ctrl.task.year}}</span></span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 py-3 border-t border-slate-100 mb-4 bg-slate-50/50 rounded-lg">
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-slate-400 text-xs mb-1">档案总量</span>
                            <span class="font-semibold text-slate-700">{{$ctrl.task.total}}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center border-l border-slate-200/60">
                            <span class="text-slate-400 text-xs mb-1">控制量</span>
                            <span class="font-semibold text-slate-700">{{$ctrl.task.checked}}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center border-l border-slate-200/60">
                            <span class="text-slate-400 text-xs mb-1">开放量</span>
                            <span class="font-semibold text-slate-700">{{$ctrl.task.opened}}</span>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="flex justify-between text-xs text-slate-600 mb-2">
                            <span class="font-medium flex items-center"><i data-lucide="activity" class="w-3.5 h-3.5 mr-1 text-slate-400"></i>当前进度</span>
                            <span class="font-bold">{{$ctrl.task.progress}}%</span>
                        </div>
                        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-500 {{$ctrl.statusColor}}" ng-style="{'width': $ctrl.task.progress + '%'}"></div>
                        </div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$document', '$scope', '$timeout', function(IconService, $document, $scope, $timeout) {
                var ctrl = this;
                
                ctrl.$onInit = function() {
                    var status = ctrl.task.status || '未开始';
                    ctrl.actionRules = {
                        '未开始': ['view', 'edit', 'start', 'delete'],
                        '鉴定中': ['view', 'pause', 'cancel'],
                        '未完成': ['view', 'edit', 'start', 'delete'],
                        '已完成': ['view', 'audit', 'delete'],
                        '审核中': ['view', 'audit'],
                        '已审核': ['view', 'audit', 'generate']
                    };
                    
                    var colorMap = {
                        '未开始': { bg: 'bg-slate-50 text-slate-700 ring-slate-600/20', progress: 'bg-slate-300' },
                        '鉴定中': { bg: 'bg-blue-50 text-blue-700 ring-blue-600/20', progress: 'bg-blue-500' },
                        '未完成': { bg: 'bg-orange-50 text-orange-700 ring-orange-600/20', progress: 'bg-orange-500' },
                        '已完成': { bg: 'bg-emerald-50 text-emerald-700 ring-emerald-600/20', progress: 'bg-emerald-500' },
                        '审核中': { bg: 'bg-amber-50 text-amber-700 ring-amber-600/20', progress: 'bg-amber-500' },
                        '已审核': { bg: 'bg-purple-50 text-purple-700 ring-purple-600/20', progress: 'bg-purple-500' }
                    };
                    
                    var style = colorMap[status] || colorMap['未开始'];
                    ctrl.statusBg = style.bg;
                    ctrl.statusColor = style.progress;
                    ctrl.statusText = status;
                    
                    ctrl.showMenu = false;
                    
                    IconService.refresh();
                };

                ctrl.getDateOnly = function(value) {
                    if (value === null || value === undefined) return '';
                    var str = String(value);
                    return str.length >= 10 ? str.substring(0, 10) : str;
                };
                
                ctrl.toggleMenu = function(e) {
                    e.stopPropagation();
                    ctrl.showMenu = !ctrl.showMenu;
                    if (ctrl.showMenu) {
                        $timeout(function() { IconService.refresh(); }, 0, false);
                    }
                };

                ctrl.isActionEnabled = function(action) {
                    var status = (ctrl.task && ctrl.task.status) || '未开始';
                    var allowedActions = ctrl.actionRules[status] || ['view'];
                    return allowedActions.indexOf(action) !== -1;
                };

                ctrl.getActionClasses = function(action, isDanger) {
                    if (!ctrl.isActionEnabled(action)) {
                        return 'text-slate-300 cursor-not-allowed bg-slate-50/60';
                    }
                    if (isDanger) {
                        return 'text-red-600 hover:bg-red-50 cursor-pointer';
                    }
                    return 'text-slate-700 hover:bg-slate-50 hover:text-primary cursor-pointer';
                };

                ctrl.handleActionClick = function(action) {
                    if (!ctrl.isActionEnabled(action)) {
                        return;
                    }
                    ctrl.handleAction(action);
                };
                
                ctrl.handleAction = function(action) {
                    ctrl.showMenu = false;
                    console.log('Action:', action, 'on task:', ctrl.task.title);
                    if (action === 'view') {
                        localStorage.setItem('oaas_current_task', JSON.stringify(ctrl.task));
                        window.location.href = 'appraisal-task-view.html';
                    } else if (action === 'edit') {
                        // 模拟任务配置信息并存入 localStorage
                        var editTaskInfo = {
                            name: ctrl.task.title,
                            fonds: ctrl.task.fondsName || '市政府办公厅',
                            year: ctrl.task.year || '2023'
                        };
                        localStorage.setItem('oaas_current_edit_task', JSON.stringify(editTaskInfo));
                        window.location.href = 'appraisal-task-edit.html';
                    } else if (action === 'audit') {
                        localStorage.setItem('oaas_current_task', JSON.stringify(ctrl.task));
                        window.location.href = 'appraisal-task-audit.html';
                    }
                };
                
                var closeMenuHandler = function(e) {
                    if (ctrl.showMenu) {
                        $scope.$apply(function() {
                            ctrl.showMenu = false;
                        });
                    }
                };
                
                $document.on('click', closeMenuHandler);
                $scope.$on('$destroy', function() {
                    $document.off('click', closeMenuHandler);
                });
            }]
        });

        app.component('appraisalTaskManage', {
            template: `
                <div class="bg-white rounded-lg shadow-sm border border-slate-100 flex-1 p-5 flex flex-col">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                        <h2 class="text-lg font-bold text-slate-800">鉴定任务管理</h2>
                        <!-- 添加任务按钮 -->
                        <button ng-click="$ctrl.createNewTask()" class="bg-primary hover:bg-sky-800 text-white px-4 py-2 rounded-md text-sm transition-colors flex items-center shadow-sm">
                            <i data-lucide="plus" class="w-4 h-4 mr-1.5"></i>
                            新建任务
                        </button>
                    </div>
                    
                    <!-- 过滤和搜索栏 -->
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex space-x-3">
                            <div ng-repeat="tab in $ctrl.taskStatusTabs" 
                                 ng-click="$ctrl.setActiveTab(tab)"
                                 ng-class="{'text-primary bg-sky-50': $ctrl.activeTab === tab, 'text-slate-500 hover:text-slate-800 hover:bg-slate-50': $ctrl.activeTab !== tab}"
                                 class="cursor-pointer px-3 py-2 text-sm font-medium rounded-md transition-colors relative">
                                {{tab}}
                                <div ng-if="$ctrl.activeTab === tab" class="absolute bottom-0 left-0 w-full h-0.5 bg-primary rounded-t-full"></div>
                            </div>
                        </div>
                        <div class="flex w-64">
                            <input type="text" placeholder="请输入任务名" ng-model="$ctrl.searchText" ng-change="$ctrl.filterTasks()" class="w-full px-3 py-1.5 text-sm border border-slate-300 rounded-l-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-sky-100 transition-all" />
                            <button class="bg-primary hover:bg-sky-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-200 text-white px-4 py-1.5 rounded-r-md text-sm transition-colors flex items-center whitespace-nowrap shrink-0">
                                <i data-lucide="search" class="w-4 h-4 mr-1"></i>
                                查询
                            </button>
                        </div>
                    </div>

                    <!-- 任务卡片网格 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-6">
                        <task-card ng-repeat="task in $ctrl.paginatedTasks" task="task"></task-card>
                    </div>
                    
                    <div ng-if="$ctrl.filteredTasks.length === 0" class="text-center py-12 text-slate-500">
                        <div class="flex flex-col items-center justify-center">
                            <i data-lucide="inbox" class="w-10 h-10 text-slate-300 mb-2"></i>
                            <p>暂无符合条件的鉴定任务</p>
                        </div>
                    </div>
                    
                    <!-- 分页器 -->
                    <div class="mt-auto border-t border-slate-200 pt-4 flex items-center justify-between" ng-if="$ctrl.filteredTasks.length > 0">
                        <div class="text-sm text-slate-500">
                            共 {{$ctrl.filteredTasks.length}} 条记录
                        </div>
                        <div class="flex items-center space-x-2">
                            <button ng-click="$ctrl.prevPage()" ng-disabled="$ctrl.currentPage === 1" class="px-3 py-1.5 border border-slate-300 rounded text-sm bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">上一页</button>
                            <span class="text-sm text-slate-600 px-3">{{$ctrl.currentPage}} / {{$ctrl.totalPages}}</span>
                            <button ng-click="$ctrl.nextPage()" ng-disabled="$ctrl.currentPage === $ctrl.totalPages" class="px-3 py-1.5 border border-slate-300 rounded text-sm bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">下一页</button>
                        </div>
                    </div>
                </div>
            `,
            controller: ['IconService', '$filter', '$timeout', function(IconService, $filter, $timeout) {
                var ctrl = this;
                
                ctrl.tasks = [];
                var statuses = ['未开始', '鉴定中', '未完成', '已完成', '审核中', '已审核'];
                
                var mockFondsNames = ['市政府办公厅', '市档案馆', '市发改委', '市教育局', '市财政局', '市公安局'];
                // 模拟生成30条数据
                for (var i = 1; i <= 30; i++) {
                    var status = statuses[i % 6];
                    var progress = 0;
                    if (status === '已完成' || status === '已审核') progress = 100;
                    else if (status === '未开始') progress = 0;
                    else progress = 60;
                    
                    var day = (i < 10 ? '0' + i : i);
                    
                    ctrl.tasks.push({
                        title: '2023年度第' + i + '批档案鉴定任务',
                        creator: '管理员' + (i % 3 + 1),
                        time: '2023-10-' + day + ' 10:00',
                        fondsName: mockFondsNames[i % mockFondsNames.length],
                        year: (2021 + (i % 4)).toString(),
                        total: 10 + i * 2,
                        checked: i % 5,
                        opened: i % 3,
                        progress: progress,
                        status: status
                    });
                }

                ctrl.taskStatusTabs = ['全部', '未开始', '鉴定中', '未完成', '已完成', '审核中', '已审核'];
                ctrl.activeTab = '全部';
                ctrl.searchText = '';
                
                ctrl.currentPage = 1;
                ctrl.pageSize = 20;
                ctrl.filteredTasks = [];
                ctrl.paginatedTasks = [];

                ctrl.filterTasks = function() {
                    var filtered = ctrl.tasks;
                    
                    // Apply role permissions filter
                    var currentUser = null;
                    try {
                        currentUser = JSON.parse(localStorage.getItem('oaas_current_user'));
                    } catch(e) {}
                    
                    if (currentUser && currentUser.userType === '形成/移交单位用户') {
                        var rolePermissions = [];
                        try {
                            rolePermissions = JSON.parse(localStorage.getItem('oaas_role_permissions')) || [];
                        } catch(e) {}
                        
                        var allowedFonds = rolePermissions
                            .filter(function(rp) { return rp.username === currentUser.username; })
                            .map(function(rp) { return rp.fondsName; });
                            
                        filtered = filtered.filter(function(t) {
                            return allowedFonds.indexOf(t.fondsName) !== -1;
                        });
                    }

                    if (ctrl.activeTab !== '全部') {
                        filtered = $filter('filter')(filtered, {status: ctrl.activeTab}, true);
                    }
                    if (ctrl.searchText) {
                        filtered = $filter('filter')(filtered, ctrl.searchText);
                    }
                    ctrl.filteredTasks = filtered;
                    ctrl.totalPages = Math.ceil(ctrl.filteredTasks.length / ctrl.pageSize) || 1;
                    if (ctrl.currentPage > ctrl.totalPages) {
                        ctrl.currentPage = 1;
                    }
                    ctrl.updatePagination();
                    
                    $timeout(function() { IconService.refresh(); }, 0, false);
                };
                
                ctrl.updatePagination = function() {
                    var start = (ctrl.currentPage - 1) * ctrl.pageSize;
                    var end = start + ctrl.pageSize;
                    ctrl.paginatedTasks = ctrl.filteredTasks.slice(start, end);
                    $timeout(function() { IconService.refresh(); }, 0, false);
                };

                ctrl.setActiveTab = function(tab) {
                    ctrl.activeTab = tab;
                    ctrl.filterTasks();
                };
                
                ctrl.prevPage = function() {
                    if (ctrl.currentPage > 1) {
                        ctrl.currentPage--;
                        ctrl.updatePagination();
                    }
                };
                
                ctrl.nextPage = function() {
                    if (ctrl.currentPage < ctrl.totalPages) {
                        ctrl.currentPage++;
                        ctrl.updatePagination();
                    }
                };

                ctrl.createNewTask = function() {
                    window.location.href = 'appraisal-task-create.html';
                };

                ctrl.$onInit = function() {
                    ctrl.filterTasks();
                };
            }]
        });
    </script>
</body>
</html>
